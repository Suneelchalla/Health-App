<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HealthVault"/>
<meta name="theme-color" content="#1A73E8"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png"/>
<title>HealthVault v2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1A73E8;--bl:#E8F0FE;--bd:#0D47A1;--bm:#4A90D9;
  --green:#34A853;--gl:#E6F4EA;
  --amber:#F9AB00;--al:#FEF7E0;
  --red:#EA4335;--rl:#FCE8E6;
  --purple:#7C4DFF;--pl:#EDE7FE;
  --teal:#00897B;--tl:#E0F2F1;
  --orange:#FA7B17;--ol:#FEF3E2;
  --pink:#D81B60;--pkl:#FCE4EC;
  --g1:#F8F9FA;--g2:#E8EAED;--g3:#BDC1C6;--g4:#80868B;--g5:#5F6368;--g6:#202124;
  --w:#fff;--sh:0 2px 12px rgba(0,0,0,.1);--ss:0 1px 4px rgba(0,0,0,.08);
  --r:16px;--rs:10px;
}
html,body{height:100%;background:linear-gradient(135deg,#E8F0FE,#F0F4FF,#E3F2FD);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:0;min-height:100vh;overflow-x:hidden}
.wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;padding:12px 0 20px}
.badge-top{display:flex;align-items:center;gap:8px;background:#fff;padding:7px 16px;border-radius:24px;
  box-shadow:0 2px 12px rgba(26,115,232,.15);border:1px solid #C5D9F8}
.badge-top svg{width:20px;height:20px;stroke:var(--blue);fill:none;stroke-width:2}
.badge-top b{font-size:14px;font-weight:700;color:var(--bd)}
.badge-top small{font-size:11px;color:var(--g4);background:#F0F4FF;padding:2px 8px;border-radius:10px}

/* PHONE FRAME */
.phone{width:min(375px,100vw);height:min(812px,100dvh);background:var(--w);
  border-radius:clamp(0px,4vw,50px);overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.22),0 0 0 1px rgba(0,0,0,.06);
  position:relative;display:flex;flex-direction:column;flex-shrink:0}
.screen{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tabbar{flex-shrink:0!important;}
.screen::-webkit-scrollbar{display:none}
@media(max-width:480px){
  html,body{padding:0;align-items:flex-start}
  .wrap{padding:0;gap:0}
  .badge-top,.subnav-wrap{display:none!important}
  .phone{width:100vw;height:100dvh;border-radius:0;box-shadow:none}
  .notch{display:none!important}.status{display:none!important}
  .screen{padding-top:env(safe-area-inset-top,0)}
  .tabbar{height:calc(60px + env(safe-area-inset-bottom,0))!important;padding-bottom:env(safe-area-inset-bottom,0)}
}
/* Hide fake status bar in standalone PWA mode (added to homescreen) */
@media(display-mode:standalone){
  .notch{display:none!important}
  .status{display:none!important}
}
@media(max-width:360px){.tab span{font-size:9px}.tab svg{width:19px;height:19px}}

.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#fff;border-radius:0 0 20px 20px;z-index:20}
.status{height:50px;background:var(--w);display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:12px;font-weight:700;color:var(--g6);flex-shrink:0;z-index:10;position:relative}

/* TAB BAR */
.tabbar{height:86px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:.5px solid var(--g2);display:flex;align-items:flex-start;padding-top:10px;flex-shrink:0;width:100%}

.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;position:relative;min-width:0}
.tab svg{width:20px;height:20px;stroke-width:1.8;fill:none;transition:stroke .15s}
.tab span{font-size:9px;font-weight:600;letter-spacing:.1px;transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
.tab.on svg{stroke:var(--blue)}.tab.on span{color:var(--blue)}
.tab:not(.on) svg{stroke:var(--g4)}.tab:not(.on) span{color:var(--g4)}
.tdot{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:16px;height:2px;background:var(--blue);border-radius:2px;opacity:0;transition:opacity .15s}
.tab.on .tdot{opacity:1}

/* SHARED UI */
.sc{animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.hdr{background:var(--w);padding:14px 18px 12px;border-bottom:.5px solid var(--g2);flex-shrink:0}
.hdr-t{font-size:19px;font-weight:800;color:var(--g6);letter-spacing:-.3px}
.hdr-s{font-size:13px;color:var(--g4);margin-top:3px}
.brow{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;border-bottom:.5px solid var(--g2)}
.bk{width:34px;height:34px;background:var(--g1);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:.5px solid var(--g2);font-size:16px;flex-shrink:0}
.bk-t{font-size:15px;font-weight:700;color:var(--g6)}.bk-s{font-size:11px;color:var(--g4);margin-top:1px}
.sec{font-size:14px;font-weight:700;color:var(--g6);margin:16px 0 8px;padding:0 16px}
.card{background:var(--w);border-radius:var(--r);padding:14px;box-shadow:var(--ss);border:.5px solid var(--g2);margin-bottom:10px;cursor:pointer}
.card:active{background:var(--g1)}
.crow{display:flex;align-items:center;gap:12px}
.ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:var(--gl);color:#1B5E20}.by{background:var(--al);color:#B06000}
.br{background:var(--rl);color:#C5221F}.bb{background:var(--bl);color:var(--bd)}
.bor{background:var(--ol);color:#B85000}.bp{background:var(--pl);color:#311B92}
.btn{background:var(--blue);color:#fff;border:none;border-radius:13px;padding:13px;font-size:14px;font-weight:700;width:100%;cursor:pointer;margin-top:10px;font-family:inherit}
.btn:active{opacity:.88}
.btn2{background:var(--g1);color:var(--g6);border:.5px solid var(--g2);border-radius:13px;padding:12px;font-size:13px;font-weight:600;width:100%;cursor:pointer;margin-top:8px;font-family:inherit}
.btn2:active{background:var(--g2)}
.btn-sm{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.iban{padding:10px 14px;display:flex;gap:8px;align-items:flex-start;border-bottom:.5px solid}
.iban span:last-child{font-size:12px;font-weight:500;line-height:1.5}
.ibl{background:#E8F0FE;border-color:#C5D9F8}.ibl span:last-child{color:var(--bd)}
.iby{background:var(--al);border-color:var(--amber)}.iby span:last-child{color:#B06000}
.ibr{background:var(--rl);border-color:var(--red)}.ibr span:last-child{color:#C5221F}
.inp{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:11px;padding:12px 13px;font-size:14px;color:var(--g6);outline:none;font-family:inherit;transition:border-color .15s}
.inp:focus{border-color:var(--blue)}
.sel{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:11px;padding:12px 13px;font-size:14px;color:var(--g6);outline:none;font-family:inherit;appearance:none}
.sel:focus{border-color:var(--blue)}
.flbl{font-size:12px;font-weight:700;color:var(--g5);margin-bottom:5px}
.fld{margin-bottom:15px}
.pills{display:flex;background:var(--g1);border-radius:11px;padding:3px;border:.5px solid var(--g2)}
.popt{flex:1;padding:8px 6px;border-radius:9px;font-size:12px;font-weight:600;color:var(--g4);cursor:pointer;text-align:center;transition:all .2s}
.popt.on{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(26,115,232,.35)}
.pgrid{display:flex;background:var(--g1);border-radius:11px;padding:3px;border:.5px solid var(--g2);gap:2px}
.pgo{flex:1;padding:6px 4px;border-radius:9px;font-size:11px;font-weight:600;color:var(--g4);cursor:pointer;text-align:center;transition:all .2s}
.pgo.on{background:var(--blue);color:#fff}
.pb{padding-bottom:30px}
.p16{padding:0 16px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin:2px}

/* PWA INSTALL BANNER */
.pwa-banner{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E8EAED;
  padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:9999;
  box-shadow:0 -4px 20px rgba(0,0,0,.12);transform:translateY(100%);
  transition:transform .3s ease;max-width:480px;margin:0 auto}
.pwa-banner.show{transform:translateY(0)}
.pwa-banner-icon{width:44px;height:44px;border-radius:11px;background:#1A73E8;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pwa-banner-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2}
.pwa-banner-text{flex:1}
.pwa-banner-text b{font-size:13px;font-weight:700;color:#202124;display:block}
.pwa-banner-text small{font-size:11px;color:#80868B}
.pwa-install-btn{background:#1A73E8;color:#fff;border:none;border-radius:10px;
  padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:inherit}
.pwa-dismiss{background:none;border:none;color:#80868B;font-size:20px;cursor:pointer;
  padding:4px;flex-shrink:0;font-family:inherit}
.splash{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#1A73E8,#0D47A1);padding:40px 28px;text-align:center;position:relative;overflow:hidden}
.splash::before{content:"";position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:rgba(255,255,255,.07);border-radius:50%}
.splash::after{content:"";position:absolute;bottom:-100px;left:-60px;width:240px;height:240px;background:rgba(255,255,255,.05);border-radius:50%}
.sp-logo{width:84px;height:84px;background:rgba(255,255,255,.18);border-radius:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:2px solid rgba(255,255,255,.3);position:relative;z-index:1}
.sp-logo svg{width:46px;height:46px;stroke:#fff;fill:none;stroke-width:1.8}
.sp-name{font-size:34px;font-weight:900;color:#fff;letter-spacing:-.5px;position:relative;z-index:1}
.sp-tag{font-size:14px;color:rgba(255,255,255,.82);margin-top:12px;position:relative;z-index:1;line-height:1.55}
.sp-note{font-size:11px;color:rgba(255,255,255,.55);margin-top:28px;position:relative;z-index:1;line-height:1.5}

/* LOGIN */
.login-top{background:linear-gradient(145deg,#1A73E8,#0D47A1);padding:36px 24px 30px;color:#fff;flex-shrink:0}
.login-top-logo{width:50px;height:50px;background:rgba(255,255,255,.2);border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;border:1.5px solid rgba(255,255,255,.3)}
.login-top-logo svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2}
.login-top h1{font-size:24px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px}
.login-top p{font-size:13px;opacity:.84;line-height:1.5}
.ltabs{display:flex;background:var(--g1);border-radius:11px;padding:3px;gap:2px;margin-bottom:18px;border:.5px solid var(--g2)}
.ltab{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:700;color:var(--g4);cursor:pointer;text-align:center;transition:all .2s}
.ltab.on{background:var(--w);color:var(--g6);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.or-div{display:flex;align-items:center;gap:10px;margin:14px 0}
.or-div::before,.or-div::after{content:"";flex:1;height:.5px;background:var(--g2)}
.or-div span{font-size:11px;color:var(--g4);font-weight:600}
.soc-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--g2);background:var(--w);font-size:13px;font-weight:600;color:var(--g6);cursor:pointer;margin-bottom:9px;font-family:inherit}
.soc-btn:active{background:var(--g1)}
.soc-btn svg{width:19px;height:19px}
.err{background:var(--rl);color:#C5221F;border-radius:10px;padding:10px 13px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.guest-lnk{text-align:center;font-size:12px;color:var(--blue);cursor:pointer;margin-top:10px;font-weight:700}

/* ONBOARDING */
.ob-hdr{padding:22px 22px 14px;background:var(--w);border-bottom:.5px solid var(--g2)}
.ob-step{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.ob-title{font-size:21px;font-weight:800;color:var(--g6);letter-spacing:-.3px;margin-bottom:4px}
.ob-sub{font-size:13px;color:var(--g4);line-height:1.5}
.ob-prog{height:3px;background:var(--g2)}
.ob-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.ob-body{padding:20px}
.bt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.bt-opt{padding:13px 10px;border-radius:11px;border:1.5px solid var(--g2);cursor:pointer;text-align:center;background:var(--w)}
.bt-opt.on{border-color:var(--blue);background:var(--bl)}
.bt-opt .bti{font-size:26px;margin-bottom:5px}.bt-opt .btl{font-size:12px;font-weight:700;color:var(--g6)}
.bt-opt.on .btl{color:var(--bd)}.bt-opt .bts{font-size:10px;color:var(--g4);margin-top:1px}

/* HOME */
.hh{background:linear-gradient(145deg,#1A73E8,#0D47A1);padding:16px 18px 32px;color:#fff;position:relative;overflow:hidden}
.hh::before{content:"";position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:rgba(255,255,255,.07);border-radius:50%}
.sos{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);border-radius:22px;padding:6px 12px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:4px}
.hgreet{font-size:12px;opacity:.85;margin-bottom:2px}
.hname{font-size:21px;font-weight:800;margin-bottom:12px;letter-spacing:-.3px}
.hstats{display:flex;gap:9px;position:relative;z-index:1}
.hstat{background:rgba(255,255,255,.14);border-radius:12px;padding:8px 11px;border:1px solid rgba(255,255,255,.2)}
.hstat .sv{font-size:15px;font-weight:700}.hstat .sl{font-size:10px;opacity:.8}
.hbody{padding:0 14px;margin-top:-16px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.qa{background:var(--w);border-radius:var(--rs);padding:13px 11px;box-shadow:var(--ss);border:.5px solid var(--g2);cursor:pointer;display:flex;flex-direction:column;gap:5px}
.qa:active{transform:scale(.97);background:var(--g1)}
.qa .qi{font-size:20px}.qa .ql{font-size:12px;font-weight:700;color:var(--g6)}.qa .qs{font-size:10px;color:var(--g4)}
.med-chip{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;margin-bottom:7px}
.med-chip:last-child{margin-bottom:0}

/* FAMILY PROFILES */
.fp-scroll{display:flex;gap:10px;padding:4px 16px 4px;overflow-x:auto;flex-shrink:0}
.fp-scroll::-webkit-scrollbar{display:none}
.fp-card{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;padding:8px 12px;border-radius:12px;border:1.5px solid var(--g2);background:var(--w);min-width:72px;transition:all .2s}
.fp-card.on{border-color:var(--blue);background:var(--bl)}
.fp-card:active{opacity:.8}
.fp-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;border:2px solid rgba(0,0,0,.08)}
.fp-nm{font-size:11px;font-weight:700;color:var(--g6);text-align:center;max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fp-rl{font-size:10px;color:var(--g4);text-align:center}
.fp-add{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;padding:8px 12px;border-radius:12px;border:1.5px dashed var(--g3);background:var(--g1);min-width:72px}
.fp-add span{font-size:10px;font-weight:600;color:var(--g4)}

/* BODY EXPLORER */
.body-top{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:9px}
.pgrp{display:flex;background:var(--g1);border-radius:20px;padding:3px;border:.5px solid var(--g2)}
.pgopt{padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--g5)}
.pgopt.on{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(26,115,232,.35)}
.srch{background:var(--g1);border-radius:22px;padding:8px 13px;display:flex;align-items:center;gap:7px;margin:9px 14px;border:1px solid var(--g2)}
.srch input{border:none;background:transparent;font-size:13px;color:var(--g6);flex:1;outline:none;font-family:inherit}
.bcanv{height:340px;position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#EEF3FF,#E4EDFF)}
.bc-lbl{position:absolute;top:9px;left:11px;font-size:10px;color:var(--blue);background:rgba(255,255,255,.92);padding:4px 10px;border-radius:11px;border:.5px solid #C5D9F8;font-weight:600}
.vw-lbl{position:absolute;top:9px;right:11px;font-size:10px;color:var(--g5);background:rgba(255,255,255,.85);padding:4px 10px;border-radius:11px;border:.5px solid var(--g2);font-weight:600}
.zctrl{position:absolute;right:11px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px}
.zb{width:32px;height:32px;background:#fff;border-radius:8px;border:.5px solid var(--g2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-weight:600;color:var(--g5);box-shadow:var(--ss)}
.rh{position:absolute;bottom:9px;font-size:10px;color:var(--g4);display:flex;align-items:center;gap:3px}
.hs{cursor:pointer}
.hs .ha{fill:rgba(26,115,232,.07);stroke:rgba(26,115,232,.25);stroke-width:.5;transition:all .2s}
.hs:active .ha,.hs.sel .ha{fill:rgba(26,115,232,.2);stroke:var(--blue);stroke-width:1.5}
.pp{background:var(--w);margin:11px 14px;border-radius:var(--r);border:1.5px solid #C5D9F8;overflow:hidden;box-shadow:var(--ss)}
.pp-hdr{background:linear-gradient(135deg,#1A73E8,#0D47A1);padding:12px 15px;color:#fff}
.pp-n{font-size:16px;font-weight:800}.pp-s{font-size:11px;opacity:.85;margin-top:2px}
.sy-item{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:.5px solid var(--g2);cursor:pointer}
.sy-item:last-child{border-bottom:none}
.sy-item:active{background:var(--bl)}
.sy-e{font-size:16px;width:26px;text-align:center;flex-shrink:0}
.sy-t{flex:1}.sy-t strong{font-size:13px;color:var(--g6);display:block;font-weight:600}
.sy-t small{font-size:10px;color:var(--g4)}
.sy-arr{color:var(--g3);font-size:15px}

/* SYMPTOM CHECKER */
.prog-bar{height:3px;background:var(--g2)}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.scb{padding:14px}
.qcard{background:var(--g1);border-radius:var(--r);padding:14px;margin-bottom:12px;border:.5px solid var(--g2)}
.qlbl{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.qtxt{font-size:15px;font-weight:700;color:var(--g6);margin-bottom:12px;line-height:1.35}
.ogrid{display:flex;flex-wrap:wrap;gap:7px}
.opt{padding:7px 13px;background:#fff;border:1.5px solid var(--g2);border-radius:20px;font-size:12px;font-weight:600;color:var(--g5);cursor:pointer}

<script>
const $ = id => document.getElementById(id);
const SCR = $('SCR'), TB = $('TBAR'), SN = $('SNW');

// ── APPS SCRIPT URL (single source of truth) ─────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwvS65CljNqcnhcCUTB3_0rO5PXis_w_0fcoYLAgJBgNvlqSJhheXy9zLbwCkfWPKr/exec';

// ── PERSISTENT STORAGE ───────────────────────────────
// saveUser: writes to localStorage AND backs up to Google Sheets
function saveUser(){
  try{ localStorage.setItem('hv_user', JSON.stringify(U)); }catch(e){}
  if(U && U.email && !U.isGuest){
    try{ localStorage.setItem('hv_last_email', U.email); }catch(e){}
    // Keep local accounts registry in sync
    try{
      const accounts=loadAccounts();
      if(accounts[U.email]){ accounts[U.email].userData=U; saveAccounts(); }
    }catch(e){}
    // Fire-and-forget: push session to Sessions sheet in Google Sheets
    const logoutPwd = loadAccounts()[U.email]?.pwd || '';
    const logoutData = Object.assign({}, U);
    if(logoutPwd) logoutData._pwdHash = logoutPwd;
    appsScriptPost('saveUser', { email:U.email, userData:logoutData }).catch(()=>{});
  }
}
function loadUser(){ try{ const s=localStorage.getItem('hv_user'); return s?JSON.parse(s):null; }catch(e){return null;} }
function saveKey(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function loadKey(k){ try{ return localStorage.getItem(k)||''; }catch(e){return '';} }
// Fetch full user object from Google Sheets by email
async function loadUserFromCloud(email){
  try{
    const url = APPS_SCRIPT_URL + '?action=getUser&email=' + encodeURIComponent(email);
    const res = await fetch(url, { redirect:'follow' });
    const text = await res.text();
    if(!text || text.trim() === '') return null;
    // Strip any XSSI prefix
    const clean = text.replace(/^\)\]\}'/, '').trim();
    // If it's a login page redirect, bail out
    if(clean.startsWith('<')) { console.warn('loadUserFromCloud: got HTML — script not public'); return null; }
    let data;
    try { data = JSON.parse(clean); } catch(e){ console.warn('loadUserFromCloud parse error:', clean.substring(0,100)); return null; }
    if(data && data.userData) return data.userData;
    if(data && data.error) console.warn('loadUserFromCloud server error:', data.error);
    return null;
  }catch(e){
    console.warn('loadUserFromCloud failed:', e.message);
    return null;
  }
}

let U = loadUser() || {}, bodyView='front', bodySex='female', selPart=null, chatHistory=[], docFilterCat='all', isChatLoading=false;

    <button class="soc-btn" onclick="doGoogle()"><svg viewBox="0 0 24 24" width="19" height="19"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Continue with Google</button>

  else c.innerHTML=`

    <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:14px"><input type="checkbox" id="fc" style="margin-top:3px;cursor:pointer"/><label for="fc" style="font-size:11px;color:var(--g5);line-height:1.5;cursor:pointer">I agree to the <span style="color:var(--blue);font-weight:700">Terms</span> and <span style="color:var(--blue);font-weight:700">Privacy Policy</span>. My health data is encrypted and never shared without consent.</label></div>

    <button class="soc-btn" onclick="doGoogle()"><svg viewBox="0 0 24 24" width="19" height="19"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Sign up with Google</button>`;

function showE(m){const e=$('err-m');if(e){e.textContent=m;e.style.display='block';}}
function hideE(){const e=$('err-m');if(e)e.style.display='none';}
function hashPwd(p){ let h=0; for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;} return h.toString(36); }
function saveAccounts(){ try{localStorage.setItem('hv_accounts',JSON.stringify(window._hvAccounts||{}));}catch(e){} }
function loadAccounts(){ try{const s=localStorage.getItem('hv_accounts');window._hvAccounts=s?JSON.parse(s):{};return window._hvAccounts;}catch(e){return {};} }
function doLogin(){
  const e=$('fe')?.value.trim(), p=$('fp')?.value;
  hideE();
  if(!e||!e.includes('@')){showE('Please enter a valid email address.');return;}
  if(!p||p.length<4){showE('Password must be at least 4 characters.');return;}
  const btn=document.querySelector('#lf .btn');
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}

  const accounts=loadAccounts();
  const pwdHash=hashPwd(p);

  // ── Step 1: Check local registry (works offline / same device) ──
  if(accounts[e]){
    if(accounts[e].pwd !== pwdHash){
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      showE('Incorrect password. Please try again.');
      return;
    }
    const saved=accounts[e].userData;
    if(saved && saved.name && saved.members){
      U=saved;
      try{localStorage.setItem('hv_user',JSON.stringify(U));localStorage.setItem('hv_last_email',e);}catch(ex){}
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      go('home');
      return;
    }
  }

  // ── Step 2: Not in local registry → try cloud (cross-device login) ──
  if(btn){btn.textContent='Checking cloud…';btn.disabled=true;} 
  loadUserFromCloud(e).then(function(cloudUser){
    if(btn){btn.textContent='Signing in…';}
    if(cloudUser && cloudUser.name && cloudUser.members){
      // Cloud account found — verify password
      // If cloud has stored pwd hash, verify it; otherwise accept (first cross-device login)
      const cloudPwd = cloudUser._pwdHash;
      if(cloudPwd && cloudPwd !== pwdHash){
        if(btn){btn.textContent='Sign In';btn.disabled=false;}
        showE('Incorrect password. Please try again.');
        return;
      }
      // ✅ Login successful from cloud
      U=cloudUser;
      delete U._pwdHash; // don't keep pwd hash in active session
      accounts[e]={pwd:pwdHash, userData:U};
      saveAccounts();
      try{localStorage.setItem('hv_user',JSON.stringify(U));localStorage.setItem('hv_last_email',e);}catch(ex){}
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      go('home');
    } else {
      // ── Step 3: Cloud also has no record ──
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      showE('No account found for this email on this device or cloud. Please create a new account, or open the app on your original device first to sync.');
    }
  }).catch(function(err){
    if(btn){btn.textContent='Sign In';btn.disabled=false;}
    // Cloud unreachable — be helpful instead of blocking
    showE('Could not reach cloud to verify your account. Check your internet connection and try again. If this is a new device, open the app on your original device first.');
  });
}
function doSignup(){
  const n=$('fn')?.value.trim(),e=$('fe')?.value.trim(),p=$('fp')?.value,p2=$('fp2')?.value,c=$('fc')?.checked;
  hideE();
  if(!n){showE('Please enter your full name.');return;}
  if(!e||!e.includes('@')){showE('Please enter a valid email.');return;}
  if(!p||p.length<6){showE('Password must be at least 6 characters.');return;}
  if(p!==p2){showE('Passwords do not match.');return;}
  if(!c){showE('Please accept the Terms to continue.');return;}
  const accounts=loadAccounts();
  if(accounts[e]){showE('An account with this email already exists. Please sign in.');return;}
  U.name=n; U.email=e; U._regPwd=hashPwd(p);
  try{ localStorage.setItem('hv_last_email', e); }catch(ex){}
  go('onboard');
}
function doGoogle(){U.name='New User';U.email='user@gmail.com';try{localStorage.setItem('hv_last_email','user@gmail.com');}catch(e){}go('onboard');}
function doGuest(){U.name='Guest';U.isGuest=true;go('onboard');}
async function manualCloudSync(){
  if(!U.email || U.isGuest){
    alert('Sign in with an email account to sync data to cloud.');
    return;
  }
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '⏳ Syncing…';
  btn.disabled = true;
  try {
    // Save full session to Sessions sheet
    const syncPwd = loadAccounts()[U.email]?.pwd || '';
    const syncData = Object.assign({}, U);
    if(syncPwd) syncData._pwdHash = syncPwd;
    const r2 = await appsScriptPost('saveUser', { email: U.email, userData: syncData });
    // Save profile summary to UserProfiles sheet
    const r1 = await appsScriptPost('saveData', {
      email: U.email,
      userProfile: {
        name: U.name||'', age: U.age||'', gender: U.gender||'',
        blood: U.blood||'', bloodGroup: U.blood||'',
        conditions: U.conditions||'', allergies: U.allergies||'',
        phone: U.phone||'', country: U.country||''
      }
    });
    const err = r1.error || r2.error;
    if(err){
      btn.textContent = '❌ Failed';
      console.error('Sync error:', err, r1, r2);
      // Show the specific error so user knows what to fix
      if(err.includes('Anyone')){
        alert('Sync failed: Apps Script not public. Fix: Deploy > Edit > Who has access = Anyone');
      } else {
        alert('Sync failed: ' + err);
      }
    } else {
      btn.textContent = '✅ Synced!';
    }
  } catch(e){
    btn.textContent = '❌ Error';
    alert('Sync error: ' + e.message);
  }
  setTimeout(()=>{ btn.textContent=orig; btn.disabled=false; }, 3000);
}

function doLogout(){
  if(!confirm('Sign out of HealthVault?')) return;
  // Sync one last time before logout
  if(U.email && !U.isGuest){
    appsScriptPost('saveUser', { email:U.email, userData:U }).catch(()=>{});
  }
  try{
    localStorage.removeItem('hv_user');
    localStorage.removeItem('hv_last_email');
  }catch(e){}
  U={};
  chatHistory=[];
  go('splash');
}

    accounts[U.email]={pwd:U._regPwd, userData:U};

async function saveAllToSheets(pwdHash){
  if(!U.email || U.isGuest) return;
  // Include pwd hash in cloud backup so cross-device login can verify password
  const cloudUserData = Object.assign({}, U);
  if(pwdHash) cloudUserData._pwdHash = pwdHash;

  // Save session (with optional pwd hash) to Sessions sheet
  appsScriptPost('saveUser', { email: U.email, userData: cloudUserData })
    .then(r=>{ 
      if(r.error) console.warn('Sessions save error:', r.error);
      else console.log('Sessions saved OK');
    })
    .catch(e=>{ console.warn('Sessions save failed:', e.message); });

  // Save profile summary to UserProfiles sheet
  appsScriptPost('saveData', {
    email: U.email,
    userProfile: {
      name: U.name||'', age: U.age||'', gender: U.gender||'',
      blood: U.blood||'', bloodGroup: U.blood||'',
      conditions: U.conditions||'', allergies: U.allergies||'',
      phone: U.phone||'', country: U.country||''
    }
  }).then(r=>{ if(r.error) console.warn('UserProfiles save error:', r.error); })
    .catch(e=>{ console.warn('UserProfiles save failed:', e.message); });
}

function localSymptomAnalysis(bodyPart, desc, pain, duration){
  const part = bodyPart || 'chest';
  const partDB = SYMPTOM_DB[part] || SYMPTOM_DB.chest;
  const key = Object.keys(partDB).find(k => k !== 'default' && desc.toLowerCase().includes(k)) || 'default';
  const data = partDB[key] || partDB.default;
  const urgencyColor = pain >= 8 ? 'var(--red)' : pain >= 5 ? 'var(--amber)' : 'var(--green)';
  const urgencyLabel = pain >= 8 ? '🔴 Urgent Care Today' : pain >= 5 ? '🟡 See Doctor This Week' : '🟢 Home Care';
  return { ...data, urgencyColor, urgencyLabel };
}

function extractTextFromRx(input){
  const file = input.files[0]; if(!file) return;
  const area = document.getElementById('rx-extract-area');
  if(area) area.innerHTML=`<div style="text-align:center;padding:24px;margin-top:14px;background:var(--g1);border-radius:12px">
    <div style="font-size:36px;margin-bottom:10px">🔍</div>
    <div style="font-size:14px;font-weight:700;color:var(--bd)">Reading prescription text...</div>
    <div style="font-size:12px;color:var(--g4);margin-top:6px">This takes 10-20 seconds — please wait</div>
    <div style="margin-top:12px;background:var(--g2);border-radius:6px;height:6px;overflow:hidden">
      <div id="ocr-bar" style="height:100%;background:var(--blue);border-radius:6px;width:5%;transition:width .3s"></div>
    </div>
    <div id="ocr-pct" style="font-size:11px;color:var(--g4);margin-top:6px">Loading OCR engine...</div>
  </div>`;
  const reader = new FileReader();
  reader.onload = function(e){
    window._rxPhotoData = e.target.result;
    if(!window.Tesseract){
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js';
      s.onload = function(){ runTesseract(e.target.result, area); };
      s.onerror = function(){ showRxFallback(e.target.result, area, 'OCR library could not load. Check internet connection.'); };
      document.head.appendChild(s);
    } else {
      runTesseract(e.target.result, area);
    }
  };
  reader.readAsDataURL(file);
}

function runTesseract(dataUrl, area){
  try {
    Tesseract.recognize(dataUrl, 'eng', {
      logger: function(m){
        if(m.status === 'recognizing text'){
          const pct = Math.round((m.progress||0)*100);
          const bar = document.getElementById('ocr-bar');
          const pctEl = document.getElementById('ocr-pct');
          if(bar) bar.style.width = pct + '%';
          if(pctEl) pctEl.textContent = pct + '% — reading text...';
        } else if(m.status === 'loading tesseract core' || m.status === 'initializing tesseract'){
          const pctEl = document.getElementById('ocr-pct');
          if(pctEl) pctEl.textContent = 'Loading OCR engine...';
        }
      }
    }).then(function(result){
      showExtractedText(dataUrl, (result.data.text||'').trim(), area);
    }).catch(function(err){
      showRxFallback(dataUrl, area, 'OCR failed: ' + err.message);
    });
  } catch(e){
    showRxFallback(dataUrl, area, 'OCR error: ' + e.message);
  }
}

function showExtractedText(dataUrl, extractedText, area){
  if(!area) return;
  window._rxExtractedText = extractedText;
  const hasText = extractedText && extractedText.length > 4;
  const escaped = extractedText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  area.innerHTML=`
    <div style="margin-top:16px">
      <img src="${dataUrl}" style="width:100%;border-radius:12px;border:.5px solid var(--g2);margin-bottom:14px"/>
      <div style="margin-bottom:14px">

            <button onclick="saveRxTextOnly()" style="flex:1;background:var(--gl);color:#1B5E20;border:1.5px solid #A8D5B5;border-radius:9px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">💾 Save to Vault</button>

        <input class="inp" id="rx-med-name" placeholder="Medicine name *" style="margin-bottom:8px"/>

function showRxFallback(dataUrl, area, msg){
  if(!area) return;
  window._rxExtractedText = '';
  area.innerHTML=`

function copyRxText(){
  const text = window._rxExtractedText || '';
  if(!text){ alert('No text to copy.'); return; }
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(function(){ alert('Prescription text copied to clipboard!'); }); }
  else { const t=document.createElement('textarea'); t.value=text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('Text copied!'); }
}

function saveRxTextOnly(){
  const text = window._rxExtractedText || '';

  const vault = getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'prescription_text', icon:'📄', title:'Prescription Scanned Text', subtitle:text.substring(0,80), date:today() });
  saveVaultItems(vault);
  alert('Prescription text saved to Health Vault!');
}

function saveRxMedicine(){
  const name = (document.getElementById('rx-med-name')?.value||'').trim();
  if(!name){ alert('Please enter the medicine name.'); return; }
  const extractedText = window._rxExtractedText || '';
  const med = {

    doctor:'', notes: extractedText ? 'Prescription text: '+extractedText.substring(0,500) : '',
    photo: window._rxPhotoData||'', prescriptionText:extractedText, date:today(), active:true
  };
  const meds=getMeds(); meds.push(med); saveMeds(meds);
  const vault=getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'medicine', icon:'💊', title:'Medicine: '+name+' '+med.dosage, subtitle:'Scanned from prescription · '+med.food, date:today() });

function saveReport(existingId){
  const name = document.getElementById('rp-name')?.value.trim();
  if(!name){ alert('Please enter the report name.'); return; }
  // Collect rows
  const rowEls = document.querySelectorAll('[id^="rr-"]');
  const results = [];
  rowEls.forEach(el=>{
    const idSuffix = el.id.replace('rr-','');
    const n = document.getElementById('rr-name-'+idSuffix)?.value.trim();
    const v = document.getElementById('rr-val-'+idSuffix)?.value.trim();
    const u = document.getElementById('rr-unit-'+idSuffix)?.value.trim();
    const s = document.getElementById('rr-status-'+idSuffix)?.value||'NORMAL';
    if(n) results.push({ name:n, value:v, unit:u, status:s });
  });
  const abnormal = results.filter(r=>r.status!=='NORMAL').length;
  const report = {
    id: existingId||('r'+Date.now()),
    name,
    date: document.getElementById('rp-date')?.value||today(),
    lab: document.getElementById('rp-lab')?.value.trim()||'',
    results,
    abnormal,
    photo: window._rpPhotoData||''
  };
  const reports = getReports();
  if(existingId){
    const idx = reports.findIndex(r=>r.id===existingId);
    if(idx>=0) reports[idx]=report; else reports.push(report);
  } else {
    reports.push(report);
  }
  saveReports(reports);
  // Vault entry
  const vault = getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'lab', icon:'🧪', title:`${name}`, subtitle:`${abnormal>0?abnormal+' abnormal':'All normal'} · ${report.lab||'Lab'}`, date:report.date });
  saveVaultItems(vault);
  // Auto-save lab photo to permanent photo vault
  if(window._rpPhotoData){
    const photos=getPhotos();
    photos.push({ id:'ph'+Date.now(), cat:'doc', docCat:'Lab Report', data:window._rpPhotoData, label:'Lab Report — '+name, date:report.date });
    savePhotos(photos);
  }
  window._rpPhotoData = null;
  alert('✅ Report saved!');
  go('lab');
}

function editReport(id){ showAddReport(id); }
function deleteReport(id){
  if(!confirm('Delete this report?')) return;
  const reports = getReports().filter(r=>r.id!==id);
  saveReports(reports);
  go('lab');
}

    <button class="chat-send" onclick="sendChat()"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg></button>
  </div></div>`;
  const msgs=$('chat-msgs'); if(msgs) msgs.scrollTop=msgs.scrollHeight;
}
function msgHTML(m){
  const isBot=m.role==='bot';
  return `<div class="msg-row ${isBot?'msg-bot':'msg-user'}">
    ${isBot?`<div class="msg-av" style="background:#E8F0FE;font-size:14px">💊</div>`:''}
    <div><div class="msg-bubble">${m.text.replace(/\n/g,'<br>')}</div><div class="msg-time">${m.time}</div></div>
    ${!isBot?`<div class="msg-av" style="background:var(--bl);color:var(--bd);font-size:11px;font-weight:700">${(U.name||'U')[0].toUpperCase()}</div>`:''}
  </div>`;
}
function typingHTML(){ return '<div class="msg-row msg-bot"><div class="msg-av" style="background:#E8F0FE;font-size:14px">💊</div><div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div></div>'; }
async function sendChat(preset){
  const inp=$('chat-inp');
  const msg=preset||(inp?inp.value.trim():'');
  if(!msg||isChatLoading)return;
  isChatLoading=true;
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  chatHistory.push({role:'user',text:msg,time:now});
  if(inp)inp.value='';
  const msgs=$('chat-msgs');
  if(msgs){ msgs.innerHTML=chatHistory.map(m=>msgHTML(m)).join('')+typingHTML(); msgs.scrollTop=msgs.scrollHeight; }
  // Small delay for natural feel
  await new Promise(r=>setTimeout(r,400));
  const reply = localChatReply(msg);
  chatHistory.push({role:'bot',text:reply,time:now});
  isChatLoading=false;
  if(msgs){ msgs.innerHTML=chatHistory.map(m=>msgHTML(m)).join(''); msgs.scrollTop=msgs.scrollHeight; }
}

function rNearby(){
  const cats=['All','Hospitals','Clinics','Pharmacies','Labs'];
  SCR.innerHTML=`<div class="sc">
  <div class="hdr"><div class="hdr-t">Nearby Care</div><div class="hdr-s">Opens Google Maps with your location</div></div>

    <div id="nc-loc-sub" style="font-size:11px;color:var(--g5)">Please allow location access</div>
  </div>
  <div style="display:flex;gap:7px;padding:10px 14px;overflow-x:auto">
    ${cats.map((c,i)=>`<div class="dc ${i===0?'on':''}" onclick="ncFilter('${c}',this)">${c}</div>`).join('')}
  </div>
  <div class="p16" style="padding-top:0"><div id="nc-list"><div style="text-align:center;padding:20px;color:var(--g4);font-size:13px">Detecting location…</div></div><div class="pb"></div></div></div>`;
  let userLat=null,userLng=null,currentFilter='All';
  function buildUrl(q,lat,lng){ return lat?`https://www.google.com/maps/search/${encodeURIComponent(q)}/@${lat},${lng},15z`:`https://www.google.com/maps/search/${encodeURIComponent(q)}`; }
  function renderPlaces(filter){
    currentFilter=filter; if(!userLat){$('nc-list').innerHTML='<div style="text-align:center;padding:20px;color:var(--g4)">Waiting for location…</div>';return;}
    const qs={All:['hospitals','clinics','pharmacy','diagnostic lab'],Hospitals:['hospitals'],Clinics:['clinics near me'],Pharmacies:['pharmacy near me'],Labs:['diagnostic lab near me']};
    const icons={Hospitals:'🏥',Clinics:'🩺',Pharmacies:'🏪',Labs:'🧪'};
    const colors={Hospitals:'#E8F0FE',Clinics:'#EDE7FE',Pharmacies:'#E6F4EA',Labs:'var(--al)'};
    const types=filter==='All'?['Hospitals','Clinics','Pharmacies','Labs']:[filter];
    $('nc-list').innerHTML=types.map(type=>{const q=qs[type][0];const url=buildUrl(q,userLat,userLng);
      return `<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--g6);margin-bottom:8px">${icons[type]} ${type} near you</div>
      <div class="card" style="background:${colors[type]};border:none;cursor:pointer" onclick="window.open('${url}','_blank')">

        <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--g6)">Search ${type} on Google Maps</div>
        <div style="font-size:11px;color:var(--g5);margin-top:3px">📍 Based on your GPS location</div></div>

let walkState={active:false,watchId:null,coords:[],startTime:null,distance:0,calories:0};
function rActivity(){

  const hist=JSON.parse(localStorage.getItem('hv_walks')||'[]');

  SCR.innerHTML=`<div class="sc">

  <div class="p16" style="padding-top:16px">

        <div><div id="wt-time" style="font-size:28px;font-weight:900;color:var(--green)">0:00</div><div style="font-size:11px;color:var(--g4)">time</div></div>
        <div><div id="wt-cal" style="font-size:28px;font-weight:900;color:var(--orange)">0</div><div style="font-size:11px;color:var(--g4)">cal</div></div>
      </div>
      <div id="wt-status" style="font-size:12px;color:var(--g4);margin-bottom:14px">Press Start to begin tracking your walk</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button id="wt-start" onclick="startWalk()" style="background:var(--green);color:#fff;border:none;border-radius:13px;padding:13px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">▶ Start Walk</button>
        <button id="wt-stop" onclick="stopWalk()" style="background:var(--red);color:#fff;border:none;border-radius:13px;padding:13px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:none">⏹ Stop & Save</button>
      </div>
    </div>
    <div class="at-stats" style="margin-bottom:16px">
      <div class="at-stat"><div class="at-sv">${todayKm.toFixed(1)}</div><div class="at-sl">km today</div></div>
      <div class="at-stat"><div class="at-sv">${weekKm.toFixed(1)}</div><div class="at-sl">km this week</div></div>
      <div class="at-stat"><div class="at-sv">${hist.length}</div><div class="at-sl">total walks</div></div>
    </div>
    <div class="sec" style="padding:0">Recent Walks</div>
    ${hist.length===0?'<div class="card" style="cursor:default;text-align:center;color:var(--g4)">No walks yet. Press Start to begin! 🚶</div>':
      hist.slice().reverse().slice(0,8).map(w=>`<div class="vitem"><div class="vico">🏃</div><div style="flex:1"><div class="vt">${w.km.toFixed(2)} km · ${w.duration}</div><div class="vs">${w.date} · ${w.cal} cal</div></div><span class="badge bg">${w.km>=5?'Great!':w.km>=2?'Good':'Short'}</span></div>`).join('')}
    <div class="pb"></div>
  </div></div>`;
}
function startWalk(){
  if(!navigator.geolocation){alert('GPS not available.');return;}
  walkState={active:true,watchId:null,coords:[],startTime:Date.now(),distance:0,calories:0};
  $('wt-start').style.display='none'; $('wt-stop').style.display='';
  $('wt-status').textContent='🟢 GPS tracking active…'; $('wt-status').style.color='var(--green)';
  walkState.watchId=navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy}=pos.coords; if(accuracy>50)return;
    const pts=walkState.coords;
    if(pts.length>0){const prev=pts[pts.length-1];const d=haversine(prev.lat,prev.lng,lat,lng);if(d>0.003&&d<0.1){walkState.distance+=d;walkState.calories=Math.round(walkState.distance*65);if($('wt-dist'))$('wt-dist').textContent=walkState.distance.toFixed(2);if($('wt-cal'))$('wt-cal').textContent=walkState.calories;}}
    pts.push({lat,lng});
  },()=>{},{ enableHighAccuracy:true,maximumAge:2000,timeout:10000});
  walkState._timer=setInterval(()=>{if(!$('wt-time')){clearInterval(walkState._timer);return;}const e=Math.floor((Date.now()-walkState.startTime)/1000);$('wt-time').textContent=Math.floor(e/60)+':'+(e%60<10?'0':'')+e%60;},1000);
}
function stopWalk(){
  if(walkState.watchId!==null)navigator.geolocation.clearWatch(walkState.watchId);
  if(walkState._timer)clearInterval(walkState._timer);
  const e=Math.floor((Date.now()-walkState.startTime)/1000);
  const duration=Math.floor(e/60)+'m '+(e%60)+'s';
  if(walkState.distance>0.01){const hist=JSON.parse(localStorage.getItem('hv_walks')||'[]');hist.push({date:new Date().toDateString(),km:walkState.distance,duration,cal:walkState.calories});localStorage.setItem('hv_walks',JSON.stringify(hist));}
  walkState={active:false,watchId:null,coords:[],startTime:null,distance:0,calories:0};
  rActivity();
}
function haversine(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

// ── APP STARTUP ──────────────────────────────────────
// Strategy:
//   1. localStorage has valid session → go Home immediately (no splash at all)
//   2. localStorage empty but hv_last_email exists → show "Restoring…" then fetch from cloud
//   3. Nothing → show Splash / Get Started
(function startApp(){
  const saved = loadUser();
  if(saved && saved.name && saved.members){
    // Fully logged-in — skip splash entirely
    U = saved;
    go('home');
    return;
  }
  const lastEmail = loadKey('hv_last_email');
  if(lastEmail){
    // Show a minimal "restoring" splash while we fetch from cloud
    TB.style.display='none'; SN.style.display='none';
    SCR.innerHTML=`<div class="splash">
      <div class="sp-logo"><svg viewBox="0 0 24 24"><path d="M12 2a4 4 0 0 1 4 4v2H8V6a4 4 0 0 1 4-4z"/><path d="M8 8H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-3"/><circle cx="12" cy="15" r="2"/></svg></div>
      <div class="sp-name">HealthVault</div>
      <div class="sp-tag" style="margin-top:24px;font-size:13px">Restoring your session…</div>
    </div>`;
    loadUserFromCloud(lastEmail).then(function(cloudUser){
      if(cloudUser && cloudUser.name && cloudUser.members){
        U = cloudUser;
        try{ localStorage.setItem('hv_user', JSON.stringify(U)); }catch(e){}
        go('home');
      } else {
        go('splash');
      }
    }).catch(function(){ go('splash'); });
    return;
  }
  // No session anywhere — show splash
  go('splash');
})();

/* ── Hide fake status bar on real mobile devices ──────────────
   .notch and .status are decorative "phone frame" UI for desktop
   preview only. On a real device the OS already shows its own
   status bar, so we hide ours.
   Triggers when viewport ≤ 480px OR app is in standalone mode.  */
(function hideStatusOnDevice(){
  function check(){
    const isNarrow     = window.innerWidth <= 480;
    const isStandalone = window.navigator.standalone === true ||
                         window.matchMedia('(display-mode:standalone)').matches;
    if(isNarrow || isStandalone){
      document.querySelectorAll('.notch,.status').forEach(function(el){
        el.style.setProperty('display','none','important');
      });
      var scr = document.getElementById('SCR');
      if(scr) scr.style.paddingTop = 'env(safe-area-inset-top,0px)';
    }
  }
  check();
  window.addEventListener('resize', check);
})();
</script>
<!-- PWA Install Banner -->
<div class="pwa-banner" id="pwa-banner">
  <div class="pwa-banner-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5.5 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.5-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
  </div>
  <div class="pwa-banner-text">
    <b>Install HealthVault</b>
    <small>Add to home screen for the best experience</small>
  </div>
  <button class="pwa-install-btn" id="pwa-install-btn">Install</button>
  <button class="pwa-dismiss" id="pwa-dismiss">✕</button>
</div>

<script>
  // Register Service Worker — only on real hosting (not preview/iframe)
  if('serviceWorker' in navigator){
    const isRealHost = location.hostname !== 'www.claudeusercontent.com' &&
                       !location.hostname.includes('claude.ai') &&
                       location.protocol === 'https:';
    if(isRealHost){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.log('SW registered:', r.scope))
          .catch(e => console.warn('SW registration failed:', e));
      });
    }
  }

  // PWA Install prompt logic
  let deferredPrompt = null;
  const banner  = document.getElementById('pwa-banner');
  const installBtn = document.getElementById('pwa-install-btn');
  const dismissBtn = document.getElementById('pwa-dismiss');

  // Show banner when browser fires install event
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Only show if not already installed and not dismissed before
    if (!localStorage.getItem('pwa-dismissed')) {
      setTimeout(() => banner.classList.add('show'), 2000);
    }
  });

  // User clicks Install
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    banner.classList.remove('show');
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('PWA install:', outcome);
    deferredPrompt = null;
  });

  // User dismisses banner
  dismissBtn.addEventListener('click', () => {
    banner.classList.remove('show');
    localStorage.setItem('pwa-dismissed', '1');
  });

  // Hide banner if already installed
  window.addEventListener('appinstalled', () => {
    banner.classList.remove('show');
    deferredPrompt = null;
    console.log('HealthVault installed!');
  });
</script>
