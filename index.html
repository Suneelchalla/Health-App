<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HealthVault"/>
<meta name="theme-color" content="#1A73E8"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png"/>
<title>HealthVault v2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1A73E8;--bl:#E8F0FE;--bd:#0D47A1;--bm:#4A90D9;
  --green:#34A853;--gl:#E6F4EA;
  --amber:#F9AB00;--al:#FEF7E0;
  --red:#EA4335;--rl:#FCE8E6;
  --purple:#7C4DFF;--pl:#EDE7FE;
  --teal:#00897B;--tl:#E0F2F1;
  --orange:#FA7B17;--ol:#FEF3E2;
  --pink:#D81B60;--pkl:#FCE4EC;
  --g1:#F8F9FA;--g2:#E8EAED;--g3:#BDC1C6;--g4:#80868B;--g5:#5F6368;--g6:#202124;
  --w:#fff;--sh:0 2px 12px rgba(0,0,0,.1);--ss:0 1px 4px rgba(0,0,0,.08);
  --r:16px;--rs:10px;
}
html,body{height:100%;background:linear-gradient(135deg,#E8F0FE,#F0F4FF,#E3F2FD);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:0;min-height:100vh;overflow-x:hidden;
  overscroll-behavior:none;overscroll-behavior-y:none}
.wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;padding:12px 0 20px}
.badge-top{display:flex;align-items:center;gap:8px;background:#fff;padding:7px 16px;border-radius:24px;
  box-shadow:0 2px 12px rgba(26,115,232,.15);border:1px solid #C5D9F8}
.badge-top svg{width:20px;height:20px;stroke:var(--blue);fill:none;stroke-width:2}
.badge-top b{font-size:14px;font-weight:700;color:var(--bd)}
.badge-top small{font-size:11px;color:var(--g4);background:#F0F4FF;padding:2px 8px;border-radius:10px}

/* PHONE FRAME */
.phone{width:min(375px,100vw);height:min(812px,100dvh);background:var(--w);
  border-radius:clamp(0px,4vw,50px);overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.22),0 0 0 1px rgba(0,0,0,.06);
  position:relative;display:flex;flex-direction:column;flex-shrink:0}
.screen{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:none;overscroll-behavior-y:none}
.tabbar{flex-shrink:0!important;}
.screen::-webkit-scrollbar{display:none}
@media(max-width:480px){
  html,body{padding:0;align-items:flex-start}
  .wrap{padding:0;gap:0}
  .badge-top,.subnav-wrap{display:none!important}
  .phone{width:100vw;height:100dvh;border-radius:0;box-shadow:none}
  .notch{display:none!important}.status{display:none!important}
  .screen{padding-top:env(safe-area-inset-top,0)}
  .tabbar{height:calc(60px + env(safe-area-inset-bottom,0))!important;padding-bottom:env(safe-area-inset-bottom,0)}
}
/* Hide fake status bar in standalone PWA mode (added to homescreen) */
@media(display-mode:standalone){
  .notch{display:none!important}
  .status{display:none!important}
}
@media(max-width:360px){.tab span{font-size:9px}.tab svg{width:19px;height:19px}}

/* DARK MODE */
body.dark{background:#121212!important}
body.dark .phone{background:#1E1E1E}
body.dark .screen{background:#1E1E1E;color:#E0E0E0}
body.dark .card{background:#2C2C2C;border-color:#3A3A3A;color:#E0E0E0}
body.dark .card:active{background:#363636}
body.dark .hdr,.dark .brow{background:#2C2C2C;border-color:#3A3A3A}
body.dark .hdr-t,.dark .bk-t{color:#E0E0E0}
body.dark .hdr-s,.dark .bk-s,.dark .vt,.dark .vs{color:#AAAAAA}
body.dark .tabbar{background:rgba(30,30,30,.96);border-color:#3A3A3A}
body.dark .tab:not(.on) svg{stroke:#888}
body.dark .tab:not(.on) span{color:#888}
body.dark .inp,.dark .sel{background:#2C2C2C;border-color:#3A3A3A;color:#E0E0E0}
body.dark .g1-bg,.dark .qa,.dark .at-stat,.dark .ps,.dark .ls,.dark .vitem{background:#2C2C2C;border-color:#3A3A3A}
body.dark .sec{color:#CCCCCC}
body.dark .sit{border-color:#3A3A3A}
body.dark .sit:active{background:#363636}
body.dark .sil{color:#E0E0E0}
body.dark .qa{background:#2C2C2C;border-color:#3A3A3A}
body.dark .qa .ql{color:#E0E0E0}

.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#fff;border-radius:0 0 20px 20px;z-index:20}
.status{height:50px;background:var(--w);display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:12px;font-weight:700;color:var(--g6);flex-shrink:0;z-index:10;position:relative}

/* TAB BAR */
.tabbar{height:86px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:.5px solid var(--g2);display:flex;align-items:flex-start;padding-top:10px;flex-shrink:0;width:100%}

.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;position:relative;min-width:0}
.tab svg{width:20px;height:20px;stroke-width:1.8;fill:none;transition:stroke .15s}
.tab span{font-size:9px;font-weight:600;letter-spacing:.1px;transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
.tab.on svg{stroke:var(--blue)}.tab.on span{color:var(--blue)}
.tab:not(.on) svg{stroke:var(--g4)}.tab:not(.on) span{color:var(--g4)}
.tdot{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:16px;height:2px;background:var(--blue);border-radius:2px;opacity:0;transition:opacity .15s}
.tab.on .tdot{opacity:1}

/* SHARED UI */
.sc{animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.hdr{background:var(--w);padding:14px 18px 12px;border-bottom:.5px solid var(--g2);flex-shrink:0}
.hdr-t{font-size:19px;font-weight:800;color:var(--g6);letter-spacing:-.3px}
.hdr-s{font-size:13px;color:var(--g4);margin-top:3px}
.brow{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;border-bottom:.5px solid var(--g2)}
.bk{width:34px;height:34px;background:var(--g1);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:.5px solid var(--g2);font-size:16px;flex-shrink:0}
.bk-t{font-size:15px;font-weight:700;color:var(--g6)}.bk-s{font-size:11px;color:var(--g4);margin-top:1px}
.sec{font-size:14px;font-weight:700;color:var(--g6);margin:16px 0 8px;padding:0 16px}
.card{background:var(--w);border-radius:var(--r);padding:14px;box-shadow:var(--ss);border:.5px solid var(--g2);margin-bottom:10px;cursor:pointer}
.card:active{background:var(--g1)}
.crow{display:flex;align-items:center;gap:12px}
.ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:var(--gl);color:#1B5E20}.by{background:var(--al);color:#B06000}
.br{background:var(--rl);color:#C5221F}.bb{background:var(--bl);color:var(--bd)}
.bor{background:var(--ol);color:#B85000}.bp{background:var(--pl);color:#311B92}
.btn{background:var(--blue);color:#fff;border:none;border-radius:13px;padding:13px;font-size:14px;font-weight:700;width:100%;cursor:pointer;margin-top:10px;font-family:inherit}
.btn:active{opacity:.88}
.btn2{background:var(--g1);color:var(--g6);border:.5px solid var(--g2);border-radius:13px;padding:12px;font-size:13px;font-weight:600;width:100%;cursor:pointer;margin-top:8px;font-family:inherit}
.btn2:active{background:var(--g2)}
.btn-sm{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.iban{padding:10px 14px;display:flex;gap:8px;align-items:flex-start;border-bottom:.5px solid}
.iban span:last-child{font-size:12px;font-weight:500;line-height:1.5}
.ibl{background:#E8F0FE;border-color:#C5D9F8}.ibl span:last-child{color:var(--bd)}
.iby{background:var(--al);border-color:var(--amber)}.iby span:last-child{color:#B06000}
.ibr{background:var(--rl);border-color:var(--red)}.ibr span:last-child{color:#C5221F}
.inp{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:11px;padding:12px 13px;font-size:14px;color:var(--g6);outline:none;font-family:inherit;transition:border-color .15s}
.inp:focus{border-color:var(--blue)}
.sel{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:11px;padding:12px 13px;font-size:14px;color:var(--g6);outline:none;font-family:inherit;appearance:none}
.sel:focus{border-color:var(--blue)}
.flbl{font-size:12px;font-weight:700;color:var(--g5);margin-bottom:5px}
.fld{margin-bottom:15px}
.pills{display:flex;background:var(--g1);border-radius:11px;padding:3px;border:.5px solid var(--g2)}
.popt{flex:1;padding:8px 6px;border-radius:9px;font-size:12px;font-weight:600;color:var(--g4);cursor:pointer;text-align:center;transition:all .2s}
.popt.on{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(26,115,232,.35)}
.pgrid{display:flex;background:var(--g1);border-radius:11px;padding:3px;border:.5px solid var(--g2);gap:2px}
.pgo{flex:1;padding:6px 4px;border-radius:9px;font-size:11px;font-weight:600;color:var(--g4);cursor:pointer;text-align:center;transition:all .2s}
.pgo.on{background:var(--blue);color:#fff}
.pb{padding-bottom:30px}
.p16{padding:0 16px}
.pwd-wrap{position:relative;display:flex;align-items:center}
.pwd-wrap .inp{padding-right:42px;width:100%}
.pwd-eye{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:var(--g4);display:flex;align-items:center;padding:4px;-webkit-tap-highlight-color:transparent}
.pwd-eye:active{color:var(--blue)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin:2px}

/* PWA INSTALL BANNER */
.pwa-banner{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E8EAED;
  padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:9999;
  box-shadow:0 -4px 20px rgba(0,0,0,.12);transform:translateY(100%);
  transition:transform .3s ease;max-width:480px;margin:0 auto}
.pwa-banner.show{transform:translateY(0)}
.pwa-banner-icon{width:44px;height:44px;border-radius:11px;background:#1A73E8;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pwa-banner-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2}
.pwa-banner-text{flex:1}
.pwa-banner-text b{font-size:13px;font-weight:700;color:#202124;display:block}
.pwa-banner-text small{font-size:11px;color:#80868B}
.pwa-install-btn{background:#1A73E8;color:#fff;border:none;border-radius:10px;
  padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:inherit}
.pwa-dismiss{background:none;border:none;color:#80868B;font-size:20px;cursor:pointer;
  padding:4px;flex-shrink:0;font-family:inherit}
.splash{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#1A73E8,#0D47A1);padding:40px 28px;text-align:center;position:relative;overflow:hidden;animation:splashFadeIn .35s ease}
@keyframes splashFadeIn{from{opacity:0}to{opacity:1}}
@keyframes splashLogoIn{0%{transform:scale(0.15) rotate(-20deg);opacity:0}55%{transform:scale(1.18) rotate(4deg);opacity:1}75%{transform:scale(0.93) rotate(-2deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes splashTextIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.splash::before{content:"";position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:rgba(255,255,255,.07);border-radius:50%}
.splash::after{content:"";position:absolute;bottom:-100px;left:-60px;width:240px;height:240px;background:rgba(255,255,255,.05);border-radius:50%}
.sp-logo{width:84px;height:84px;background:rgba(255,255,255,.18);border-radius:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:2px solid rgba(255,255,255,.3);position:relative;z-index:1;animation:splashLogoIn .75s cubic-bezier(0.34,1.56,0.64,1) .1s both}
.sp-logo svg{width:46px;height:46px;stroke:#fff;fill:none;stroke-width:1.8}
.sp-name{font-size:34px;font-weight:900;color:#fff;letter-spacing:-.5px;position:relative;z-index:1;animation:splashTextIn .5s ease .65s both}
.sp-tag{font-size:14px;color:rgba(255,255,255,.82);margin-top:12px;position:relative;z-index:1;line-height:1.55;animation:splashTextIn .5s ease .82s both}
.sp-note{font-size:11px;color:rgba(255,255,255,.55);margin-top:28px;position:relative;z-index:1;line-height:1.5;animation:splashTextIn .5s ease 1s both}



/* LOGIN */
.login-top{background:linear-gradient(145deg,#1A73E8,#0D47A1);padding:36px 24px 30px;color:#fff;flex-shrink:0}
.login-top-logo{width:50px;height:50px;background:rgba(255,255,255,.2);border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;border:1.5px solid rgba(255,255,255,.3)}
.login-top-logo svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2}
.login-top h1{font-size:24px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px}
.login-top p{font-size:13px;opacity:.84;line-height:1.5}
.ltabs{display:flex;background:var(--g1);border-radius:11px;padding:3px;gap:2px;margin-bottom:18px;border:.5px solid var(--g2)}
.ltab{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:700;color:var(--g4);cursor:pointer;text-align:center;transition:all .2s}
.ltab.on{background:var(--w);color:var(--g6);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.or-div{display:flex;align-items:center;gap:10px;margin:14px 0}
.or-div::before,.or-div::after{content:"";flex:1;height:.5px;background:var(--g2)}
.or-div span{font-size:11px;color:var(--g4);font-weight:600}
.soc-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--g2);background:var(--w);font-size:13px;font-weight:600;color:var(--g6);cursor:pointer;margin-bottom:9px;font-family:inherit}
.soc-btn:active{background:var(--g1)}
.soc-btn svg{width:19px;height:19px}
.err{background:var(--rl);color:#C5221F;border-radius:10px;padding:10px 13px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.guest-lnk{text-align:center;font-size:12px;color:var(--blue);cursor:pointer;margin-top:10px;font-weight:700}

/* ONBOARDING */
.ob-hdr{padding:22px 22px 14px;background:var(--w);border-bottom:.5px solid var(--g2)}
.ob-step{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.ob-title{font-size:21px;font-weight:800;color:var(--g6);letter-spacing:-.3px;margin-bottom:4px}
.ob-sub{font-size:13px;color:var(--g4);line-height:1.5}
.ob-prog{height:3px;background:var(--g2)}
.ob-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.ob-body{padding:20px}
.bt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.bt-opt{padding:13px 10px;border-radius:11px;border:1.5px solid var(--g2);cursor:pointer;text-align:center;background:var(--w)}
.bt-opt.on{border-color:var(--blue);background:var(--bl)}
.bt-opt .bti{font-size:26px;margin-bottom:5px}.bt-opt .btl{font-size:12px;font-weight:700;color:var(--g6)}
.bt-opt.on .btl{color:var(--bd)}.bt-opt .bts{font-size:10px;color:var(--g4);margin-top:1px}

/* HOME */
.hh{background:linear-gradient(145deg,#1A73E8,#0D47A1);padding:16px 18px 28px;color:#fff;position:relative}
.hh::before{content:"";position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:rgba(255,255,255,.07);border-radius:50%}
.sos{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);min-width:72px;border-radius:22px;padding:6px 12px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:4px}
.hgreet{font-size:12px;opacity:.85;margin-bottom:2px}
.hname{font-size:21px;font-weight:800;margin-bottom:12px;letter-spacing:-.3px}
.hstats{display:flex;gap:9px;position:relative;z-index:1}
.hstat{background:rgba(255,255,255,.14);border-radius:12px;padding:8px 11px;border:1px solid rgba(255,255,255,.2);cursor:pointer;flex:1}
.hstat .sv{font-size:15px;font-weight:700}.hstat .sl{font-size:10px;opacity:.8}
.hbody{padding:12px 14px 0}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.qa{background:var(--w);border-radius:var(--rs);padding:13px 11px;box-shadow:var(--ss);border:.5px solid var(--g2);cursor:pointer;display:flex;flex-direction:column;gap:5px}
.qa:active{transform:scale(.97);background:var(--g1)}
.qa .qi{font-size:20px}.qa .ql{font-size:12px;font-weight:700;color:var(--g6)}.qa .qs{font-size:10px;color:var(--g4)}
/* Smart alert cards */
.h-alert{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;margin-bottom:8px;cursor:pointer;border:1px solid transparent}
.h-alert:active{opacity:.88}
.h-alert-ico{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.h-alert-body{flex:1;min-width:0}
.h-alert-title{font-size:12px;font-weight:700;line-height:1.3}
.h-alert-sub{font-size:11px;margin-top:1px;opacity:.85}
.h-alert.amber{background:#FEF7E0;border-color:#F9AB00}.h-alert.amber .h-alert-title{color:#7B4700}.h-alert.amber .h-alert-sub{color:#9A5A00}
.h-alert.blue{background:#E8F0FE;border-color:#C5D9F8}.h-alert.blue .h-alert-title{color:#0D47A1}.h-alert.blue .h-alert-sub{color:#1A5BB5}
.h-alert.green{background:#E6F4EA;border-color:#A8D5B5}.h-alert.green .h-alert-title{color:#1B5E20}.h-alert.green .h-alert-sub{color:#2D7A4F}
.h-alert.red{background:#FCE8E6;border-color:#F7C1C1}.h-alert.red .h-alert-title{color:#C5221F}.h-alert.red .h-alert-sub{color:#A01B18}
/* Progress widget */
.h-progress-card{background:var(--w);border-radius:var(--r);padding:13px 14px;box-shadow:0 2px 12px rgba(0,0,0,.1);border:.5px solid var(--g2);margin-bottom:10px}
.h-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.h-progress-row:last-child{margin-bottom:0}
.h-prog-label{font-size:12px;font-weight:600;color:var(--g6);width:90px;flex-shrink:0}
.h-prog-bar{flex:1;height:7px;background:var(--g2);border-radius:4px;overflow:hidden}
.h-prog-fill{height:100%;border-radius:4px;transition:width .5s ease}
.h-prog-val{font-size:11px;font-weight:700;color:var(--g5);width:36px;text-align:right;flex-shrink:0}
/* Upcoming widget */
.h-upcoming{background:var(--w);border-radius:var(--r);box-shadow:var(--ss);border:.5px solid var(--g2);overflow:hidden;margin-bottom:10px}
.h-upcoming-hdr{padding:10px 14px;border-bottom:.5px solid var(--g2);font-size:13px;font-weight:700;color:var(--g6);display:flex;justify-content:space-between;align-items:center}
.h-upcoming-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:.5px solid var(--g2);cursor:pointer}
.h-upcoming-item:last-child{border-bottom:none}
.h-upcoming-item:active{background:var(--g1)}
.h-upcoming-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.h-upcoming-text{flex:1;font-size:12px;font-weight:600;color:var(--g6);line-height:1.4}
.h-upcoming-days{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0}
/* Vitals snapshot */
.h-vitals-row{display:flex;gap:8px;margin-bottom:10px}
.h-vital-card{flex:1;background:var(--w);border-radius:11px;padding:10px 11px;box-shadow:var(--ss);border:.5px solid var(--g2);cursor:pointer;text-align:center}
.h-vital-card:active{background:var(--g1)}
.h-vital-icon{font-size:18px;margin-bottom:3px}
.h-vital-val{font-size:15px;font-weight:800;color:var(--g6)}
.h-vital-label{font-size:9px;color:var(--g4);margin-top:1px}
/* Doctor visit summary */
.visit-summary{background:var(--w);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.visit-summary-hdr{background:linear-gradient(135deg,#0D47A1,#1565C0);padding:14px 16px;color:#fff}
.visit-summary-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:.5px solid var(--g2)}
.visit-summary-row:last-child{border-bottom:none}
.visit-summary-label{font-size:11px;font-weight:700;color:var(--g4);width:80px;flex-shrink:0;padding-top:1px}
.visit-summary-val{font-size:12px;color:var(--g6);flex:1;line-height:1.6}
.med-chip{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;margin-bottom:7px}
.med-chip:last-child{margin-bottom:0}

/* FAMILY PROFILES */
.fp-scroll{display:flex;gap:10px;padding:4px 16px 4px;overflow-x:auto;flex-shrink:0}
.fp-scroll::-webkit-scrollbar{display:none}
.fp-card{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;padding:8px 12px;border-radius:12px;border:1.5px solid var(--g2);background:var(--w);min-width:72px;transition:all .2s}
.fp-card.on{border-color:var(--blue);background:var(--bl)}
.fp-card:active{opacity:.8}
.fp-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;border:2px solid rgba(0,0,0,.08)}
.fp-nm{font-size:11px;font-weight:700;color:var(--g6);text-align:center;max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fp-rl{font-size:10px;color:var(--g4);text-align:center}
.fp-add{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;padding:8px 12px;border-radius:12px;border:1.5px dashed var(--g3);background:var(--g1);min-width:72px}
.fp-add span{font-size:10px;font-weight:600;color:var(--g4)}

/* BODY EXPLORER */
.body-top{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:9px}
.pgrp{display:flex;background:var(--g1);border-radius:20px;padding:3px;border:.5px solid var(--g2)}
.pgopt{padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--g5)}
.pgopt.on{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(26,115,232,.35)}
.srch{background:var(--g1);border-radius:22px;padding:8px 13px;display:flex;align-items:center;gap:7px;margin:9px 14px;border:1px solid var(--g2)}
.srch input{border:none;background:transparent;font-size:13px;color:var(--g6);flex:1;outline:none;font-family:inherit}
.bcanv{height:340px;position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#EEF3FF,#E4EDFF)}
.bc-lbl{position:absolute;top:9px;left:11px;font-size:10px;color:var(--blue);background:rgba(255,255,255,.92);padding:4px 10px;border-radius:11px;border:.5px solid #C5D9F8;font-weight:600}
.vw-lbl{position:absolute;top:9px;right:11px;font-size:10px;color:var(--g5);background:rgba(255,255,255,.85);padding:4px 10px;border-radius:11px;border:.5px solid var(--g2);font-weight:600}
.zctrl{position:absolute;right:11px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px}
.zb{width:32px;height:32px;background:#fff;border-radius:8px;border:.5px solid var(--g2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-weight:600;color:var(--g5);box-shadow:var(--ss)}
.rh{position:absolute;bottom:9px;font-size:10px;color:var(--g4);display:flex;align-items:center;gap:3px}
.hs{cursor:pointer}
.hs .ha{fill:rgba(26,115,232,.07);stroke:rgba(26,115,232,.25);stroke-width:.5;transition:all .2s}
.hs:active .ha,.hs.sel .ha{fill:rgba(26,115,232,.2);stroke:var(--blue);stroke-width:1.5}
.pp{background:var(--w);margin:11px 14px;border-radius:var(--r);border:1.5px solid #C5D9F8;overflow:hidden;box-shadow:var(--ss)}
.pp-hdr{background:linear-gradient(135deg,#1A73E8,#0D47A1);padding:12px 15px;color:#fff}
.pp-n{font-size:16px;font-weight:800}.pp-s{font-size:11px;opacity:.85;margin-top:2px}
.sy-item{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:.5px solid var(--g2);cursor:pointer}
.sy-item:last-child{border-bottom:none}
.sy-item:active{background:var(--bl)}
.sy-e{font-size:16px;width:26px;text-align:center;flex-shrink:0}
.sy-t{flex:1}.sy-t strong{font-size:13px;color:var(--g6);display:block;font-weight:600}
.sy-t small{font-size:10px;color:var(--g4)}
.sy-arr{color:var(--g3);font-size:15px}

/* SYMPTOM CHECKER */
.prog-bar{height:3px;background:var(--g2)}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.scb{padding:14px}
.qcard{background:var(--g1);border-radius:var(--r);padding:14px;margin-bottom:12px;border:.5px solid var(--g2)}
.qlbl{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.qtxt{font-size:15px;font-weight:700;color:var(--g6);margin-bottom:12px;line-height:1.35}
.ogrid{display:flex;flex-wrap:wrap;gap:7px}
.opt{padding:7px 13px;background:#fff;border:1.5px solid var(--g2);border-radius:20px;font-size:12px;font-weight:600;color:var(--g5);cursor:pointer}
.opt:active,.opt.on{border-color:var(--blue);color:var(--blue);background:var(--bl)}
.prow{display:flex;gap:3px;justify-content:space-between;padding:4px 0}
.pn{width:25px;height:25px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--g2);color:var(--g5)}
.eb{background:var(--red);border-radius:var(--r);padding:12px;margin-bottom:12px;color:#fff;display:flex;gap:9px}
.ei{font-size:20px;flex-shrink:0}.et{font-size:13px;font-weight:800;margin-bottom:3px}.es{font-size:11px;opacity:.9;line-height:1.4}

/* RESULTS */
.rsec{background:var(--w);border-radius:var(--r);padding:14px;margin-bottom:9px;box-shadow:var(--ss);border:.5px solid var(--g2)}
.rtitle{font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.cause{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px}
.cdot{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0}
.cause strong{font-size:13px;color:var(--g6);display:block;margin-bottom:2px}
.cause small{font-size:11px;color:var(--g4);line-height:1.4}
.sci{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--gl);border-radius:8px;margin-bottom:5px;font-size:12px;color:#1B5E20;font-weight:600}

/* SCANNER */
.upz{border:2px dashed var(--g3);border-radius:var(--r);padding:28px 18px;text-align:center;cursor:pointer;margin:14px;background:var(--g1)}
.upz:active{border-color:var(--blue);background:var(--bl)}
.br2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 14px 14px}
.bol{border:1.5px solid var(--blue);color:var(--blue);background:#fff;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.ocard{background:var(--w);border-radius:var(--r);border:.5px solid var(--g2);overflow:hidden;box-shadow:var(--ss);margin-bottom:11px}
.ocr-ch{background:linear-gradient(135deg,#1A73E8,#0D47A1);padding:11px 15px;color:#fff}
.ocr-ch strong{font-size:13px;font-weight:800;display:block}
.ocr-ch span{font-size:10px;opacity:.85}
.ocf{padding:9px 15px;border-bottom:.5px solid var(--g2);display:flex;align-items:center}
.ocf:last-child{border-bottom:none}
.ocfl{font-size:10px;color:var(--g4);width:70px;flex-shrink:0;font-weight:600}
.ocfv{font-size:13px;color:var(--g6);font-weight:600;flex:1}
.ocfe{font-size:14px;color:var(--g3);cursor:pointer;padding:4px}
.tc{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;background:var(--bl);color:var(--bd);border-radius:18px;font-size:10px;font-weight:700;margin:2px}
.cbar{height:4px;background:var(--g2);border-radius:2px;margin:5px 15px 9px}
.cfill{height:100%;border-radius:2px;background:var(--green)}

/* LAB */
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px}
.ls{background:var(--w);border-radius:var(--rs);padding:12px;border:.5px solid var(--g2);box-shadow:var(--ss)}
.lsv{font-size:20px;font-weight:800}.lsl{font-size:10px;color:var(--g4);margin-top:2px}
.tcrd{background:var(--w);border-radius:var(--rs);margin:0 14px 9px;border:.5px solid var(--g2);overflow:hidden;box-shadow:var(--ss)}
.tcrd-h{padding:10px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--g2)}
.tcrd-n{font-size:13px;font-weight:700;color:var(--g6)}
.trow{display:flex;align-items:center;padding:8px 13px;gap:9px;border-bottom:.5px solid var(--g2)}
.trow:last-child{border-bottom:none}
.trn{flex:1;font-size:12px;color:var(--g6)}.trv{font-size:13px;font-weight:800}
.trr{font-size:10px;color:var(--g4);min-width:56px;text-align:right}
.vh{color:var(--red)}.vl{color:var(--blue)}.vn{color:var(--green)}
.ib{margin:5px 13px;padding:9px 11px;border-radius:8px;font-size:11px;font-weight:500;line-height:1.5}

/* VAULT */
.vitem{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--w);border-radius:var(--rs);margin-bottom:7px;border:.5px solid var(--g2);cursor:pointer}
.vitem:active{background:var(--g1)}
.vico{font-size:20px;width:34px;text-align:center;flex-shrink:0}
.vt{font-size:13px;font-weight:600;color:var(--g6)}.vs{font-size:11px;color:var(--g4);margin-top:1px}
.vd{font-size:10px;color:var(--g4);text-align:right;flex-shrink:0}

/* PROFILE */
.ph{background:linear-gradient(145deg,#1A73E8,#0D47A1);padding:26px 18px 20px;text-align:center;color:#fff}
.pav{width:70px;height:70px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;margin:0 auto 9px;border:2.5px solid rgba(255,255,255,.4)}
.pnm{font-size:19px;font-weight:800;margin-bottom:2px}
.pmt{font-size:12px;opacity:.8}
.pgr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px}
.ps{background:var(--w);border-radius:var(--rs);padding:12px;border:.5px solid var(--g2);box-shadow:var(--ss)}
.psv{font-size:17px;font-weight:800;color:var(--blue)}.psl{font-size:10px;color:var(--g4);margin-top:2px}
.sit{display:flex;align-items:center;padding:13px 14px;border-bottom:.5px solid var(--g2);cursor:pointer;gap:11px}
.sit:active{background:var(--g1)}
.sii{font-size:17px;width:22px;text-align:center}.sil{font-size:14px;color:var(--g6);font-weight:500;flex:1}
.siv{font-size:12px;color:var(--g4)}.sia{color:var(--g3);font-size:15px}

/* EMERGENCY */
.emfh{background:var(--red);padding:20px 18px;color:#fff}
.emfp{font-size:12px;font-weight:700;opacity:.9;margin-bottom:3px}
.emft{font-size:22px;font-weight:900;margin-bottom:7px;letter-spacing:-.3px}
.emfs{font-size:13px;opacity:.9;line-height:1.4}
.emb{background:var(--red);color:#fff;border:none;border-radius:15px;padding:16px;font-size:16px;font-weight:800;width:100%;cursor:pointer;margin-bottom:11px;display:flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;box-shadow:0 4px 16px rgba(234,67,53,.35)}
.emb:active{opacity:.88}

/* MEDICINE INTERACTIONS */
.int-level{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:11px;margin-bottom:9px;border:1.5px solid}
.int-sev{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.int-t{font-size:13px;font-weight:700;flex:1}.int-s{font-size:11px;margin-top:2px;line-height:1.4}
.int-mild{background:#E6F4EA;border-color:#A8D5B5}.int-mild .int-t{color:#1B5E20}.int-mild .int-s{color:#2D7A4F}
.int-mod{background:var(--al);border-color:#F9AB00}.int-mod .int-t{color:#B06000}.int-mod .int-s{color:#7B4700}
.int-sev-c{background:var(--rl);border-color:var(--red)}.int-sev-c .int-t{color:#C5221F}.int-sev-c .int-s{color:#960000}
.med-search-wrap{padding:0 14px 10px}
.med-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bl);color:var(--bd);border-radius:20px;font-size:11px;font-weight:700;margin:3px;cursor:pointer}
.med-tag span{font-size:13px;line-height:1}

/* NEARBY CARE */
.nc-map{height:160px;background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border-radius:var(--r);margin:0 14px 12px;display:flex;align-items:center;justify-content:center;border:.5px solid #90CAF9;position:relative;overflow:hidden}
.nc-map-bg{position:absolute;inset:0;opacity:.3}
.nc-pin{width:36px;height:36px;background:var(--red);border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(234,67,53,.4)}
.nc-pin-inner{transform:rotate(45deg);font-size:16px}
.nc-item{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--w);border-radius:var(--rs);margin-bottom:8px;border:.5px solid var(--g2)}
.nc-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nc-name{font-size:13px;font-weight:700;color:var(--g6)}
.nc-meta{font-size:11px;color:var(--g4);margin-top:2px}
.nc-dist{font-size:12px;font-weight:700;color:var(--blue);margin-left:auto;text-align:right;flex-shrink:0}
.nc-open{display:block;font-size:10px;color:var(--green);font-weight:600}

/* ACTIVITY TRACKER */
.at-ring{width:120px;height:120px;position:relative;margin:0 auto 14px}
.at-ring svg{width:100%;height:100%}
.at-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.at-steps{font-size:22px;font-weight:800;color:var(--g6)}
.at-goal{font-size:11px;color:var(--g4)}
.at-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 14px 14px}
.at-stat{background:var(--w);border-radius:var(--rs);padding:11px 9px;border:.5px solid var(--g2);text-align:center;box-shadow:var(--ss)}
.at-sv{font-size:16px;font-weight:800;color:var(--blue)}.at-sl{font-size:10px;color:var(--g4);margin-top:2px}
.week-bars{display:flex;align-items:flex-end;gap:6px;height:70px;padding:0 14px;margin-bottom:14px}
.wbar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wbar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
.wbar-lbl{font-size:10px;color:var(--g4);font-weight:600}

/* INSURANCE */
.ins-card{background:linear-gradient(135deg,#1A73E8,#0D47A1);border-radius:var(--r);padding:18px;margin:0 14px 12px;color:#fff}
.ins-name{font-size:16px;font-weight:800;margin-bottom:2px}
.ins-num{font-size:13px;opacity:.8;margin-bottom:12px}
.ins-row{display:flex;justify-content:space-between}
.ins-field{font-size:11px;opacity:.75}.ins-val{font-size:13px;font-weight:700;margin-top:2px}
.exp-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--w);border-radius:var(--rs);margin-bottom:7px;border:.5px solid var(--g2)}
.exp-cat{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.exp-name{font-size:13px;font-weight:600;color:var(--g6)}.exp-date{font-size:11px;color:var(--g4);margin-top:1px}
.exp-amt{font-size:14px;font-weight:800;color:var(--g6);margin-left:auto}
.exp-stat{font-size:10px;font-weight:700;display:block;margin-top:2px;text-align:right}

/* SKIN TRACKER */
.skin-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 14px 12px}
.skin-photo{border-radius:11px;overflow:hidden;border:.5px solid var(--g2);cursor:pointer}
.skin-photo-img{height:100px;background:linear-gradient(135deg,#FFF3E0,#FFE0B2);display:flex;align-items:center;justify-content:center;font-size:32px}
.skin-photo-meta{padding:8px 9px;background:var(--w)}
.skin-photo-date{font-size:11px;font-weight:700;color:var(--g6)}
.skin-photo-note{font-size:10px;color:var(--g4);margin-top:1px}
.skin-change{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:3px}

/* VACCINATION */
.vac-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--w);border-radius:var(--rs);margin-bottom:7px;border:.5px solid var(--g2)}
.vac-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.vac-name{font-size:13px;font-weight:700;color:var(--g6)}.vac-date{font-size:11px;color:var(--g4);margin-top:1px}
.vac-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;margin-left:auto;flex-shrink:0}

/* FOOD INTERACTIONS */
.food-int-item{border-radius:11px;border:1.5px solid var(--g2);overflow:hidden;margin-bottom:9px;background:var(--w)}
.food-int-hdr{padding:10px 13px;display:flex;align-items:center;gap:9px}
.food-int-hdr-ico{font-size:20px;flex-shrink:0}
.food-int-hdr-t{font-size:13px;font-weight:700;color:var(--g6);flex:1}
.food-int-body{padding:0 13px 12px}
.food-avoid{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:.5px solid var(--g2)}
.food-avoid:last-child{border-bottom:none}
.food-avoid-ico{font-size:16px;flex-shrink:0;margin-top:1px}
.food-avoid-t{font-size:12px;color:var(--g6);flex:1}.food-avoid-t small{display:block;font-size:10px;color:var(--g4);margin-top:1px}
.food-avoid-sev{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0}

/* AI CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 13px}
.chat-msgs::-webkit-scrollbar{display:none}
.msg-row{display:flex;gap:8px;margin-bottom:12px}
.msg-row.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1.5px solid rgba(0,0,0,.08)}
.msg-bubble{max-width:78%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.5}
.msg-bot .msg-bubble{background:var(--g1);color:var(--g6);border:.5px solid var(--g2);border-bottom-left-radius:4px}
.msg-user .msg-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10px;color:var(--g4);margin-top:4px;text-align:right}
.chat-input-wrap{padding:10px 13px;border-top:.5px solid var(--g2);background:var(--w);display:flex;gap:8px;align-items:flex-end}
.chat-inp{flex:1;background:var(--g1);border:1.5px solid var(--g2);border-radius:20px;padding:9px 14px;font-size:13px;color:var(--g6);outline:none;font-family:inherit;resize:none;max-height:80px;min-height:38px}

<script>
const $ = id => document.getElementById(id);
const SCR = $('SCR'), TB = $('TBAR'), SN = $('SNW');

// -- APPS SCRIPT URL (single source of truth) ---------
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwvS65CljNqcnhcCUTB3_0rO5PXis_w_0fcoYLAgJBgNvlqSJhheXy9zLbwCkfWPKr/exec';

// appsScriptPost: central helper for Google Apps Script POST calls.
// action = action name (e.g. saveUser, saveData), payload = data object.
// Returns parsed JSON response or { error: '...' } on failure.
async function appsScriptPost(action, payload){
  const url = (window._APPS_SCRIPT_URL || APPS_SCRIPT_URL);
  try{
    const res = await fetch(url, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...payload })
    });
    const text = await res.text();
    if(!text || !text.trim()) return { error: 'Empty response from server' };
    const clean = text.replace(/^[)\]\x27}]+/, '').trim();
    if(clean.startsWith('<')) return { error: 'Apps Script not deployed as public web app' };
    return JSON.parse(clean);
  } catch(e){
    return { error: e.message };
  }
}

// -- PERSISTENT STORAGE -------------------------------
// saveUser: writes to localStorage AND backs up to Google Sheets
function saveUser(){
  try{ localStorage.setItem('hv_user', JSON.stringify(U)); }catch(e){}
  if(U && U.email && !U.isGuest){
    try{ localStorage.setItem('hv_last_email', U.email); }catch(e){}
    // Keep local accounts registry in sync
    try{
      const accounts=loadAccounts();
      if(accounts[U.email]){ accounts[U.email].userData=U; saveAccounts(); }
    }catch(e){}
    // Fire-and-forget: push session to Sessions sheet in Google Sheets
    const logoutPwd = loadAccounts()[U.email]?.pwd || '';
    const logoutData = Object.assign({}, U);
    if(logoutPwd) logoutData._pwdHash = logoutPwd;
    appsScriptPost('saveUser', { email:U.email, userData:logoutData }).catch(()=>{});
  }
}
function loadUser(){ try{ const s=localStorage.getItem('hv_user'); return s?JSON.parse(s):null; }catch(e){return null;} }
function saveKey(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function loadKey(k){ try{ return localStorage.getItem(k)||''; }catch(e){return '';} }
// Fetch full user object from Google Sheets by email
async function loadUserFromCloud(email){
  try{
    const url = APPS_SCRIPT_URL + '?action=getUser&email=' + encodeURIComponent(email);
    const res = await fetch(url, { redirect:'follow' });
    const text = await res.text();
    if(!text || text.trim() === '') return null;
    // Strip any XSSI prefix
    const clean = text.replace(/^[)\]\x27}]+/, '').trim();
    // If it's a login page redirect, bail out
    if(clean.startsWith('<')) { console.warn('loadUserFromCloud: got HTML -- script not public'); return null; }
    let data;
    try { data = JSON.parse(clean); } catch(e){ console.warn('loadUserFromCloud parse error:', clean.substring(0,100)); return null; }
    if(data && data.userData) return data.userData;
    if(data && data.error) console.warn('loadUserFromCloud server error:', data.error);
    return null;
  }catch(e){
    console.warn('loadUserFromCloud failed:', e.message);
    return null;
  }
}

let U = loadUser() || {}, bodyView='front', bodySex='female', selPart=null, chatHistory=[], docFilterCat='all', isChatLoading=false;

// Restore saved AI URLs
if(loadKey('hv_as_url')) window._APPS_SCRIPT_URL = loadKey('hv_as_url');
if(loadKey('hv_oai_key')) window._OPENAI_KEY = loadKey('hv_oai_key');

const AUTH = ['splash','login','onboard'];

// Prevent back-swipe / back button from exiting the app
window.addEventListener('popstate', function(e){
  // Always push a new state so there's always something to go back to
  window.history.pushState({hvScreen:'home'}, '', window.location.href);
  // Navigate to home if we were on an auth screen, otherwise go back in nav history
  if(_navHistory.length > 1){
    _navHistory.pop(); // remove current
    const prev = _navHistory[_navHistory.length - 1] || 'home';
    _navHistory.pop(); // remove prev so go() re-adds it
    go(prev);
  } else {
    go('home');
  }
});
// Seed history on startup so first popstate has something to catch
window.history.pushState({hvScreen:'init'}, '', window.location.href);

function goProfile(){ go('profile'); }
// Navigation history stack for back-button support
const _navHistory = [];

function goBack(){
  if(_navHistory.length > 1){
    _navHistory.pop(); // remove current
    const prev = _navHistory.pop(); // get previous
    go(prev);
  } else {
    go('home');
  }
}

function go(s) {
  const isAuth = AUTH.includes(s);
  TB.style.display = isAuth ? 'none' : 'flex';
  SN.style.display = isAuth ? 'none' : 'flex';
  // Push browser history entry so swipe-back navigates within app instead of exiting
  if(!isAuth) window.history.pushState({hvScreen:s}, '', window.location.href);
  ['home','body','scan','lab','tips','more','search','profile','family','appointments'].forEach(t => {
    const e = $('T-'+t); if(e) e.className = 'tab'+(t===s?' on':'');
  });
  SCR.scrollTop = 0;
  // Track history (cap at 20 to avoid memory bloat)
  _navHistory.push(s);
  if(_navHistory.length > 20) _navHistory.shift();
  // Map screen name → function name string, resolved at call time via window[]
  // This allows functions defined in later <script> blocks to be found correctly
  const map = {
    splash:'rSplash', login:'rLogin', onboard:'rOnboard',
    home:'rHome', body:'rBody', scan:'rScan', lab:'rLab',
    more:'rMore', profile:'rProfile', family:'rFamily',
    symptom:'rSymptom', ocr:'rOCR', results:'rResults', emergency:'rEmergency',
    vault:'rVault', interactions:'rInteractions', chatbot:'rChatbot',
    nearby:'rNearby', activity:'rActivity', insurance:'rInsurance',
    skin:'rSkin', doclocker:'rDocLocker', vaccines:'rVaccines', foodint:'rFoodInt',
    pediatric:'rPediatric', elderly:'rElderly',
    vitals:'rVitals', search:'rSearch', healthscore:'rHealthScore',
    menstrual:'rMenstrual', appointments:'rAppointments',
    water:'rWater', reminders:'rReminders',
    tips:'rTips', doctorvisit:'rDoctorVisit'
  };
  if(map[s] && typeof window[map[s]]==='function') window[map[s]]();
  else if(map[s]) console.warn('Screen function not yet defined:',map[s]);
}

  <div style="position:relative;z-index:1;margin-top:48px;width:100%">
    <button class="btn" style="background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.5);margin-top:0" onclick="go('login')">Get Started</button>
  </div>
  <div class="sp-note">Your data is encrypted end-to-end.<br>We never sell your health information.</div>
  </div>`;
}

/* == LOGIN == */
/* -- Password eye-toggle helper -------------------- */
function togglePwd(inputId, btn){
  const inp = document.getElementById(inputId);
  if(!inp) return;
  const show = inp.type === 'password';

function showE(m){const e=$('err-m');if(e){e.textContent=m;e.style.display='block';}}
function hideE(){const e=$('err-m');if(e)e.style.display='none';}
// Synchronous djb2 fallback (only used if SubtleCrypto unavailable -- e.g. old browsers)
function hashPwdSync(p){ let h=0; for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;} return 'djb2_'+h.toString(36); }

// Async SHA-256 via SubtleCrypto (available in all modern browsers and PWAs)
async function hashPwd(p){
  try{
    const enc = new TextEncoder().encode(p);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return 'sha256_'+Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    return hashPwdSync(p);
  }
}

// Compare hash -- handles both old djb2 hashes and new sha256 hashes for backwards compatibility
function hashesMatch(stored, candidate){
  if(!stored || !candidate) return false;
  if(stored === candidate) return true;
  // Legacy: stored is djb2 (no prefix), candidate is new sha256 -- they can never match, handled below
  return false;
}
function saveAccounts(){ try{localStorage.setItem('hv_accounts',JSON.stringify(window._hvAccounts||{}));}catch(e){} }
function loadAccounts(){ try{const s=localStorage.getItem('hv_accounts');window._hvAccounts=s?JSON.parse(s):{};return window._hvAccounts;}catch(e){return {};} }
async function doLogin(){
  const e=$('fe')?.value.trim(), p=$('fp')?.value;
  hideE();
  if(!e||!e.includes('@')){showE('Please enter a valid email address.');return;}
  if(!p||p.length<4){showE('Password must be at least 4 characters.');return;}
  const btn=document.querySelector('#lf .btn');
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}

  const accounts=loadAccounts();
  const pwdHash=await hashPwd(p);
  // Also compute legacy djb2 hash to support accounts created before the upgrade
  const legacyHash=hashPwdSync(p);

  // -- Step 1: Check local registry (works offline / same device) --
  if(accounts[e]){
    const storedPwd = accounts[e].pwd || '';
    const pwdOk = storedPwd === pwdHash || storedPwd === legacyHash ||
                  // Upgrade legacy djb2 hash to sha256 transparently
                  (storedPwd.startsWith('djb2_') && storedPwd === legacyHash) ||
                  (storedPwd === legacyHash.replace('djb2_',''));
    if(!pwdOk){
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      showE('Incorrect password. Please try again.');
      return;
    }
    // Silently upgrade legacy hash to SHA-256 on successful login
    if(!storedPwd.startsWith('sha256_')){ accounts[e].pwd = pwdHash; saveAccounts(); }
    const saved=accounts[e].userData;
    if(saved && saved.name && saved.members){
      U=saved;
      try{localStorage.setItem('hv_user',JSON.stringify(U));localStorage.setItem('hv_last_email',e);}catch(ex){}
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      go('home');
      return;
    }
  }

  // -- Step 2: Not in local registry → try cloud (cross-device login) --
  if(btn){btn.textContent='Checking cloud…';btn.disabled=true;} 
  loadUserFromCloud(e).then(function(cloudUser){
    if(btn){btn.textContent='Signing in…';}
    if(cloudUser && cloudUser.name && cloudUser.members){
      // Cloud account found -- verify password
      // If cloud has stored pwd hash, verify it; otherwise accept (first cross-device login)
      const cloudPwd = cloudUser._pwdHash;
      if(cloudPwd && cloudPwd !== pwdHash){
        if(btn){btn.textContent='Sign In';btn.disabled=false;}
        showE('Incorrect password. Please try again.');
        return;
      }
      // ✅ Login successful from cloud
      U=cloudUser;
      delete U._pwdHash; // don't keep pwd hash in active session
      accounts[e]={pwd:pwdHash, userData:U};
      saveAccounts();
      try{localStorage.setItem('hv_user',JSON.stringify(U));localStorage.setItem('hv_last_email',e);}catch(ex){}
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      go('home');
    } else {
      // -- Step 3: Cloud also has no record --
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      showE('No account found for this email on this device or cloud. Please create a new account, or open the app on your original device first to sync.');
    }
  }).catch(function(err){
    if(btn){btn.textContent='Sign In';btn.disabled=false;}
    // Cloud unreachable -- be helpful instead of blocking
    showE('Could not reach cloud to verify your account. Check your internet connection and try again. If this is a new device, open the app on your original device first.');
  });
}

async function manualCloudSync(){
  if(!U.email || U.isGuest){
    alert('Sign in with an email account to sync data to cloud.');
    return;
  }
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '⏳ Syncing…';
  btn.disabled = true;
  try {
    const syncPwd = loadAccounts()[U.email]?.pwd || '';
    const syncData = Object.assign({}, U);
    if(syncPwd) syncData._pwdHash = syncPwd;
    // 1. Save full session (includes all localStorage-based data in U object)
    const r2 = await appsScriptPost('saveUser', { email: U.email, userData: syncData });
    // 2. Save profile summary to UserProfiles sheet
    const r1 = await appsScriptPost('saveData', {
      email: U.email,
      userProfile: {
        name: U.name||'', age: U.age||'', gender: U.gender||'',
        blood: U.blood||'', bloodGroup: U.blood||'',
        conditions: U.conditions||'', allergies: U.allergies||'',
        phone: U.phone||'', country: U.country||''
      }
    });
    // 3. Sync each vital reading that hasn't been synced yet
    const vitals = getVitals();
    const unsynced = vitals.filter(v => !v._synced);
    for(const v of unsynced){
      const rv = await appsScriptPost('saveVital',{ email:U.email, userName:U.name, type:v.type, value:v.value, unit:'', note:v.note||'' });
      if(!rv.error) v._synced = true;
    }
    if(unsynced.length){ saveVitals(vitals); }

    const err = r1.error || r2.error;
    if(err){
      btn.textContent = '❌ Failed';
      if(err.includes('Anyone')){
        alert('Sync failed: Apps Script not public. Fix: Deploy → Edit → Who has access = Anyone');
      } else {
        alert('Sync failed: ' + err);
      }
    } else {
      btn.textContent = '✅ Synced!';
    }
  } catch(e){
    btn.textContent = '❌ Error';
    alert('Sync error: ' + e.message);
  }
  setTimeout(()=>{ btn.textContent=orig; btn.disabled=false; }, 3000);
}

/* ===================================================================
   DAILY CLEANUP + MEDICINE EXPIRY
   Runs once per calendar day on app open. Handles:
   1. Past appointment pruning (> 90 days old)
   2. Stale hv_taken_* key removal (previous days)
   3. Water log trimming (keep 30 days)
   4. Walk log trimming (keep 365 entries per member)
   5. Medicine course auto-expiry based on duration field
=================================================================== */

/* Convert "5 days" / "2 weeks" / "1 month" → number of days.
   Returns null for ongoing/indefinite strings -- those never auto-expire. */
function parseDurationToDays(str){
  if(!str) return null;
  const s = str.toLowerCase().trim();
  if(/ongoing|indefinite|continue|long.?term|chronic|lifelong|as\s+directed|as\s+needed|prn|sos/.test(s)) return null;
  const num = parseFloat(s);
  if(isNaN(num)) return null;
  if(/week/.test(s))  return Math.round(num * 7);
  if(/month/.test(s)) return Math.round(num * 30);
  if(/year/.test(s))  return Math.round(num * 365);
  if(/day/.test(s) || /^\d+$/.test(s.trim())) return Math.round(num);
  return null;
}

function runDailyCleanup(){
  const t = today();
  if(loadKey('hv_cleanup_date') === t) return; // already ran today
  saveKey('hv_cleanup_date', t);

  // 0. Prune past appointments older than 90 days across all members
  try{
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 90);
    const cutoffISO = cutoff.toISOString();
    (U.members||[{id:'self'}]).forEach(m=>{
      const savedActive = U.activeMember;
      U.activeMember = m.id;
      const appts = getAppointments();
      const pruned = appts.filter(a => a.datetime >= cutoffISO);
      if(pruned.length < appts.length) saveAppointments(pruned);
      U.activeMember = savedActive;
    });
  }catch(e){}

  // 1. Remove stale hv_taken_* keys (old dates) -- today's key is preserved
  try{
    const toDelete = [];
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && k.startsWith('hv_taken_') && k !== 'hv_taken_' + t) toDelete.push(k);
    }
    toDelete.forEach(k => localStorage.removeItem(k));
  }catch(e){}

  // 2. Trim water log -- keep only last 30 days
  try{
    const log = getWaterLog();
    const cutoffStr = new Date(Date.now() - 30*86400000).toISOString().split('T')[0];
    let changed = false;
    Object.keys(log).forEach(d => { if(d < cutoffStr){ delete log[d]; changed = true; } });
    if(changed) saveWaterLog(log);
  }catch(e){}

  // 3. Trim walk log -- keep last 365 entries per member
  try{
    (U.members||[{id:'self'}]).forEach(m=>{
      const savedActive = U.activeMember;
      U.activeMember = m.id;
      const walks = getWalks();
      if(walks.length > 365) saveWalks(walks.slice(-365));
      U.activeMember = savedActive;
    });
  }catch(e){}

  // 4. Auto-expire medicines whose duration course has finished
  //    Medicine stays in list as inactive (shown as "Course ended") -- never deleted
  //    Medicines with "Ongoing", no date, or unparseable duration are NEVER expired
  try{
    (U.members||[{id:'self'}]).forEach(m=>{
      const savedActive = U.activeMember;
      U.activeMember = m.id;
      const meds = getMeds();
      let changed = false;
      meds.forEach(med => {
        if(med.active === false || !med.date) return;
        const days = parseDurationToDays(med.duration);
        if(!days) return;
        const endDate = new Date(med.date);
        endDate.setDate(endDate.getDate() + days);
        const endStr = endDate.toISOString().split('T')[0];
        if(t > endStr){ med.active = false; med.endedOn = endStr; changed = true; }
      });
      if(changed) saveMeds(meds);
      U.activeMember = savedActive;
    });
  }catch(e){}
}

function localSymptomAnalysis(bodyPart, desc, pain, duration){
  const part = bodyPart || 'chest';
  const partDB = SYMPTOM_DB[part] || SYMPTOM_DB.chest;
  const key = Object.keys(partDB).find(k => k !== 'default' && desc.toLowerCase().includes(k)) || 'default';
  const data = partDB[key] || partDB.default;
  const urgencyColor = pain >= 8 ? 'var(--red)' : pain >= 5 ? 'var(--amber)' : 'var(--green)';
  const urgencyLabel = pain >= 8 ? '🔴 Urgent Care Today' : pain >= 5 ? '🟡 See Doctor This Week' : '🟢 Home Care';
  return { ...data, urgencyColor, urgencyLabel };

  const waterPct     = Math.min(Math.round((glassesToday/waterGoal)*100),100);

  const hVitals      = getVitals();
  const latestBP     = hVitals.filter(v=>v.type==='bp').slice(-1)[0];
  const latestSugar  = hVitals.filter(v=>v.type==='sugar').slice(-1)[0];
  const latestWeight = hVitals.filter(v=>v.type==='weight').slice(-1)[0];
  const hasVitals    = !!(latestBP||latestSugar||latestWeight);

  const now_         = new Date();
  const appts        = getAppointments().filter(a=>new Date(a.datetime)>now_).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
  const nextAppt     = appts[0];

  // -- Smart alert cards (contextual, only shown when relevant) --
  const alerts = [];

  // Medicine adherence alert
  if(totalSlots>0 && now_.getHours()>=8){
    if(medPct===100){
      alerts.push({type:'green',icon:'✅',title:'All medicines taken today!',sub:'Great job staying on track.',action:"go('scan')"});
    } else if(now_.getHours()>=20 && medPct<100){
      alerts.push({type:'amber',icon:'⚠️',title:`${totalSlots-takenCount} medicine${totalSlots-takenCount>1?'s':''} not yet taken today`,sub:'Tap to mark them as taken before bed.',action:"go('scan')"});
    } else if(now_.getHours()>=14 && medPct===0){
      alerts.push({type:'amber',icon:'💊',title:'No medicines marked taken today',sub:'Tap to log your morning dose.',action:"go('scan')"});
    }
  }

  // Upcoming appointment in ≤3 days
  if(nextAppt){
    const daysLeft = Math.round((new Date(nextAppt.datetime)-now_)/(1000*60*60*24));
    if(daysLeft<=3){
      const when = daysLeft===0?'Today':daysLeft===1?'Tomorrow':`In ${daysLeft} days`;
      const time = new Date(nextAppt.datetime).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
      alerts.push({type:'blue',icon:'📅',title:`Appointment ${when} -- Dr. ${nextAppt.doctor}`,sub:`${time}${nextAppt.hospital?' . '+nextAppt.hospital:''}`,action:"go('appointments')"});
    }
  }

  // Vaccine due in ≤3 days (any child member)
  (U.members||[]).forEach(mem=>{
    const role=(mem.role||'').toLowerCase();
    if(role!=='child'&&(parseInt(mem.age)||0)>=18) return;
    let vacData={};
    try{vacData=JSON.parse(localStorage.getItem('hv_childvac_'+mem.id)||'{}');}catch(e){}
    if(!vacData.dob) return;
    INDIA_VAC_SCHEDULE.forEach(vac=>{
      if(vacData.records?.[vac.id]?.date) return;
      const dueDate=addDays(vacData.dob,vac.offset);
      const daysLeft=Math.round((new Date(dueDate)-now_)/(1000*60*60*24));
      if(daysLeft>=0&&daysLeft<=3){
        alerts.push({type:'blue',icon:'💉',title:`${vac.name} due in ${daysLeft===0?'today':daysLeft+' days'}`,sub:`For ${mem.name} . Due ${fmtDate(dueDate)}`,action:"go('vaccines')"});
      }
    });
  });

  // Water -- only show if water reminders are on and goal not met after midday
  if(waterOn && glassesToday<waterGoal && now_.getHours()>=12){
    alerts.push({type:'blue',icon:'💧',title:`${glassesToday} of ${waterGoal} glasses -- keep hydrating`,sub:'Tap to log a glass of water.',action:"go('water')"});
  }

  const alertHTML = alerts.slice(0,3).map(a=>
    `<div class="h-alert ${a.type}" onclick="go('${a.action.replace(/go\('|'\)/g,'')}')" >
      <div class="h-alert-ico">${a.icon}</div>
      <div class="h-alert-body">
        <div class="h-alert-title">${a.title}</div>
        <div class="h-alert-sub">${a.sub}</div>
      </div>
      <div style="font-size:14px;opacity:.5">›</div>
    </div>`
  ).join('');

  // -- Progress bars ------------------------------------
  const showMedProgress  = totalSlots > 0;
  const showWaterProgress= waterOn;
  const progressHTML = (showMedProgress||showWaterProgress) ? `
  <div class="h-progress-card">
    <div style="font-size:12px;font-weight:700;color:var(--g6);margin-bottom:10px">Today's Progress</div>
    ${showMedProgress?`
    <div class="h-progress-row" onclick="go('scan')" style="cursor:pointer">
      <div class="h-prog-label">💊 Medicines</div>
      <div class="h-prog-bar"><div class="h-prog-fill" style="width:${medPct}%;background:${medPct===100?'var(--green)':'var(--blue)'}"></div></div>
      <div class="h-prog-val" style="color:${medPct===100?'var(--green)':'var(--blue)'}">${takenCount}/${totalSlots}</div>
    </div>`:''}
    ${showWaterProgress?`
    <div class="h-progress-row" onclick="go('water')" style="cursor:pointer">
      <div class="h-prog-label">💧 Hydration</div>
      <div class="h-prog-bar"><div class="h-prog-fill" style="width:${waterPct}%;background:${waterPct>=100?'var(--green)':'#1A73E8'}"></div></div>
      <div class="h-prog-val" style="color:${waterPct>=100?'var(--green)':'#1A73E8'}">${glassesToday}/${waterGoal}</div>
    </div>`:''}
  </div>` : '';

  // -- Upcoming section (appointments + child vaccines in next 7 days) --
  const upcomingItems = [];
  appts.slice(0,2).forEach(a=>{
    const daysLeft=Math.round((new Date(a.datetime)-now_)/(1000*60*60*24));
    const when=daysLeft===0?'Today':daysLeft===1?'Tomorrow':`${daysLeft}d`;
    upcomingItems.push({
      dot:'var(--blue)',text:`Dr. ${a.doctor}${a.hospital?' . '+a.hospital:''}`,
      days:when,daysBg:'var(--bl)',daysColor:'var(--bd)',action:"go('appointments')"
    });
  });
  (U.members||[]).forEach(mem=>{
    const role=(mem.role||'').toLowerCase();
    if(role!=='child'&&(parseInt(mem.age)||0)>=18) return;
    let vacData={};
    try{vacData=JSON.parse(localStorage.getItem('hv_childvac_'+mem.id)||'{}');}catch(e){}
    if(!vacData.dob) return;
    INDIA_VAC_SCHEDULE.forEach(vac=>{
      if(vacData.records?.[vac.id]?.date) return;
      const dueDate=addDays(vacData.dob,vac.offset);
      const daysLeft=Math.round((new Date(dueDate)-now_)/(1000*60*60*24));
      if(daysLeft>=0&&daysLeft<=7){
        upcomingItems.push({dot:'var(--amber)',text:`${vac.name} -- ${mem.name}`,days:daysLeft===0?'Today':`${daysLeft}d`,daysBg:'var(--al)',daysColor:'#B06000',action:"go('vaccines')"});
      }
    });
  });
  const upcomingHTML = upcomingItems.length ? `
  <div class="h-upcoming">
    <div class="h-upcoming-hdr">📋 Upcoming <span style="font-size:11px;font-weight:400;color:var(--g4)">${upcomingItems.length} item${upcomingItems.length>1?'s':''}</span></div>
    ${upcomingItems.slice(0,4).map(it=>`
    <div class="h-upcoming-item" onclick="${it.action}">
      <div class="h-upcoming-dot" style="background:${it.dot}"></div>
      <div class="h-upcoming-text">${it.text}</div>
      <div class="h-upcoming-days" style="background:${it.daysBg};color:${it.daysColor}">${it.days}</div>
    </div>`).join('')}
  </div>` : '';

  // -- Vitals snapshot (only if user has recorded at least one) --
  const vitalsHTML = hasVitals ? `
  <div style="margin-bottom:10px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:var(--g6)">Recent Vitals</div>
      <button onclick="go('vitals')" style="font-size:11px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;padding:4px 0">+ Log →</button>
    </div>
    <div class="h-vitals-row">
      ${latestBP?`<div class="h-vital-card" onclick="go('vitals')"><div class="h-vital-icon">❤️</div><div class="h-vital-val" style="font-size:13px">${latestBP.value}</div><div class="h-vital-label">Blood Pressure</div></div>`:''}
      ${latestSugar?`<div class="h-vital-card" onclick="go('vitals')"><div class="h-vital-icon">🩸</div><div class="h-vital-val">${latestSugar.value}</div><div class="h-vital-label">Blood Sugar</div></div>`:''}
      ${latestWeight?`<div class="h-vital-card" onclick="go('vitals')"><div class="h-vital-icon">⚖️</div><div class="h-vital-val">${latestWeight.value}</div><div class="h-vital-label">Weight (kg)</div></div>`:''}
    </div>
  </div>` : '';

  // -- Header stats (dynamic) ---------------------------
  const statMedLabel = totalSlots>0 ? `${takenCount}/${totalSlots} taken` : `${hMeds.length} saved`;
  const statApptLabel= nextAppt ? `Next: ${new Date(nextAppt.datetime).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}` : `${reports.length} reports`;
  const statWaterLabel= waterOn ? `${glassesToday}/${waterGoal} 💧` : `${U.age||'--'} yrs`;

  // -- Quick action grid -- contextual ------------------
  const cycleOrMenstrual = U.gender==='female'
    ? `<div class="qa" onclick="go('menstrual')"><div class="qi">🌸</div><div class="ql">Cycle Tracker</div><div class="qs">Period &amp; fertility</div></div>`
    : `<div class="qa" onclick="go('activity')"><div class="qi">🏃</div><div class="ql">Activity</div><div class="qs">Steps &amp; fitness</div></div>`;

  const mainRepRows = recentReports.length===0
    ? ''
    : `<div style="display:flex;align-items:center;justify-content:space-between">
        <div class="sec" style="margin-bottom:8px">Recent Reports</div>
        <button onclick="go('lab')" style="font-size:11px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;margin-right:2px;padding:4px 8px">View all →</button>
      </div>
      ${recentReports.map(r=>{
        const badge=r.abnormal>0?r.abnormal+' Abnormal':'Normal';
        const cls=r.abnormal>0?'by':'bg';
        return `<div class="card" onclick="go('lab')"><div class="crow">
          <div class="ic" style="background:#EDE7F6">🧪</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--g6)">${r.name}</div>
          <div style="font-size:11px;color:var(--g4)">${fmtDate(r.date)} . ${r.lab||'--'}</div></div>
          <div class="badge ${cls}">${badge}</div>
        </div></div>`;
      }).join('')}`;

  SCR.innerHTML=`<div class="sc">
  ${famBar}
  <div class="hh">
    <div class="hgreet">${greet}</div>
    <div class="hname">Hello, ${first}</div>
    <button class="sos" onclick="showSOSContacts()" style="font-size:13px;padding:9px 16px;font-weight:800;letter-spacing:.3px;box-shadow:0 0 0 3px rgba(255,255,255,.2),0 4px 12px rgba(197,34,31,.5)">🆘 SOS</button>
    <div class="hstats">
      <div class="hstat" onclick="go('scan')"><div class="sv">${statMedLabel}</div><div class="sl">Medicines</div></div>
      <div class="hstat" onclick="go('appointments')"><div class="sv">${statApptLabel}</div><div class="sl">${nextAppt?'Appointment':'Reports'}</div></div>
      <div class="hstat" onclick="${waterOn?"go('water')":"go('profile')"}"><div class="sv">${statWaterLabel}</div><div class="sl">${waterOn?'Hydration':'Age'}</div></div>
    </div>
  </div>
  <div class="hbody">
    ${alertHTML ? `<div style="margin-bottom:10px">${alertHTML}</div>` : ''}
    ${progressHTML}
    ${upcomingHTML}
    ${renderTodayMedWidget()}
    ${vitalsHTML}
    <div class="sec">Quick Actions</div>
    <div class="qa-grid">
      <div class="qa" onclick="go('body')"><div class="qi">🫀</div><div class="ql">Body Explorer</div><div class="qs">Tap any body part</div></div>
      <div class="qa" onclick="go('symptom')"><div class="qi">✅</div><div class="ql">Symptom Checker</div><div class="qs">Local analysis</div></div>
      <div class="qa" onclick="go('scan')"><div class="qi">💊</div><div class="ql">Add Medicine</div><div class="qs">Manual or photo</div></div>
      <div class="qa" onclick="go('lab')"><div class="qi">🧪</div><div class="ql">Lab Reports</div><div class="qs">Add &amp; track</div></div>
      <div class="qa" onclick="go('appointments')"><div class="qi">📅</div><div class="ql">Appointments</div><div class="qs">Doctor visits</div></div>
      <div class="qa" onclick="go('nearby')"><div class="qi">📍</div><div class="ql">Nearby Care</div><div class="qs">Hospitals, clinics</div></div>
      ${cycleOrMenstrual}
      <div class="qa" onclick="go('water')"><div class="qi">💧</div><div class="ql">Hydration</div><div class="qs">Water tracker</div></div>
    </div>
    ${mainRepRows}
    <div class="pb"></div>
  </div></div>`;
}

    </div>

function runLocalAnalysis(){
  const desc = (document.getElementById('sym-desc')?.value || symState.desc || '').trim();
  if(!symState.bodyPart){ alert('Please select a body area.'); return; }
  symState.desc = desc;
  const result = localSymptomAnalysis(symState.bodyPart, desc, symState.pain, symState.duration);
  // Save to vault
  const vault = getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'symptom', icon:'🩺', title:`${symState.bodyPart} -- ${desc||'symptom check'}`, subtitle:`Pain ${symState.pain}/10 . ${symState.duration}`, date:today() });
  saveVaultItems(vault);
  // Sync to Google Sheets if logged in
  if(U.email && !U.isGuest){
    appsScriptPost('saveSymptom',{ email:U.email, userName:U.name, bodyPart:symState.bodyPart, symptom:desc||'symptom check', painLevel:symState.pain, duration:symState.duration, aiAnalysis:result?.urgencyLabel||'' }).catch(()=>{});
  }
  rResults(result, symState);
}

function renderMedListInline(){
  const meds = getMeds();
  if(!meds.length) return '<div style="text-align:center;padding:12px;color:var(--g4);font-size:12px;background:var(--g1);border-radius:10px">No medicines yet. Add one above.</div>';
  return meds.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 11px;background:#fff;border-radius:10px;margin-bottom:7px;border:.5px solid var(--g2)">
    <div style="font-size:18px">💊</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700;color:var(--g6)">${m.name} ${m.dosage||''}</div>
      <div style="font-size:10px;color:var(--g4)">${m.use?'<span style="color:var(--teal);font-weight:600">'+m.use+'</span> . ':''}${m.food||''} . ${m.duration||''} . ${[m.morning?'🌅':'',m.afternoon?'☀️':'',m.night?'🌙':''].filter(Boolean).join(' ')||'As directed'}</div>
    </div>
    <button onclick="deleteMedInline('${m.id}')" style="background:var(--rl);border:none;border-radius:8px;padding:5px 8px;font-size:12px;cursor:pointer;color:#C5221F">🗑️</button>
  </div>`).join('') + '<div class="pb"></div>';
}

function deleteMedInline(id){
  if(!confirm('Remove this medicine?')) return;
  saveMeds(getMeds().filter(m=>m.id!==id));
  const el = document.getElementById('scan-med-list');
  if(el) el.innerHTML = renderMedListInline();
}
