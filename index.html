  const hist=Object.entries(log).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);
  SCR.innerHTML=`<div class="sc">
  <div class="brow"><div class="bk" onclick="goBack()">←</div><div style="flex:1"><div class="bk-t">💧 Water Tracker</div><div class="bk-s">Stay hydrated · ${glasses}/${goal} glasses today</div></div></div>
  <div class="p16" style="padding-top:20px">
    <div style="text-align:center;margin-bottom:20px">
      <div class="water-ring">
        <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="54" fill="none" stroke="var(--g2)" stroke-width="8"/><circle cx="60" cy="60" r="54" fill="none" stroke="var(--blue)" stroke-width="8" stroke-dasharray="${dash} ${circumference}" stroke-dashoffset="${circumference/4}" stroke-linecap="round" transform="rotate(-90 60 60)"/></svg>
        <div class="water-ring-center"><div class="water-count">${glasses}</div><div class="water-goal">of ${goal} glasses</div></div>
      </div>
      <div style="font-size:12px;color:var(--g5);margin-top:8px">${pct>=100?'🎉 Daily goal reached!':pct>=50?'💪 Halfway there!':'💧 Keep drinking!'}</div>
    </div>
    <div class="glass-grid">
      ${Array.from({length:goal},(_, i)=>`<div class="glass-btn ${i<glasses?'filled':''}" onclick="logWater(${i+1})"><span style="font-size:22px">${i<glasses?'💧':'🫙'}</span><span>Glass ${i+1}</span></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn" style="margin-top:0;flex:1" onclick="addWaterGlass()">+ Drink a Glass</button>
      <button class="btn2" style="margin-top:0;flex:1" onclick="resetWaterToday()">Reset Today</button>
    </div>
    <div style="font-size:13px;font-weight:700;color:var(--g6);margin-bottom:10px">⚙️ Reminder Settings</div>
    <div class="card" style="cursor:default;border:1.5px solid ${on?'var(--blue)':'var(--g2)'}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div><div style="font-size:13px;font-weight:700;color:var(--g6)">Hourly Water Reminders</div><div style="font-size:11px;color:var(--g4);margin-top:1px">Push notification every hour</div></div>
        <div onclick="toggleWaterReminder(this)" style="width:46px;height:26px;background:${on?'var(--blue)':'var(--g2)'};border-radius:13px;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0">
          <div style="position:absolute;top:3px;${on?'right:3px':'left:3px'};width:20px;height:20px;background:#fff;border-radius:50%;transition:all .25s;box-shadow:0 1px 4px rgba(0,0,0,.25)"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">
        <div><div class="flbl">Remind every</div>
          <select class="sel" id="water-interval" onchange="saveKey('hv_water_interval',this.value);scheduleWaterReminder()" style="padding:8px 10px;font-size:12px">
            ${[['30','Every 30 min'],['60','Every 1 hour'],['90','Every 1.5 hrs'],['120','Every 2 hours']].map(([v,l])=>`<option value="${v}" ${loadKey('hv_water_interval')===(v)?'selected':''}>${l}</option>`).join('')}
          </select></div>

          <select class="sel" id="water-goal" onchange="saveKey('hv_water_goal',this.value);rWater()" style="padding:8px 10px;font-size:12px">
            ${[6,7,8,10,12].map(n=>`<option value="${n}" ${goal===n?'selected':''}>${n} glasses</option>`).join('')}
          </select></div>
      </div>
    </div>

    <div class="pb"></div>
  </div></div>`;
}
function addWaterGlass(){
  const log=getWaterLog(); const t=today();
  log[t]=(log[t]||0)+1; saveWaterLog(log); rWater();
}
function logWater(n){
  const log=getWaterLog(); log[today()]=n; saveWaterLog(log); rWater();
}
function resetWaterToday(){
  if(!confirm('Reset today\'s water count?')) return;
  const log=getWaterLog(); log[today()]=0; saveWaterLog(log); rWater();
}
async function toggleWaterReminder(sw){
  const on=loadKey('hv_water_on')==='1';
  if(!on){
    const granted=await requestNotifPermission();
    if(!granted){ alert('Please allow notifications to use water reminders.'); return; }
    saveKey('hv_water_on','1');
    scheduleWaterReminder();
    fireNotification('💧 Water Reminders On','You\'ll get hourly reminders to drink water.','water-setup');
  } else {
    saveKey('hv_water_on','0');
    if(_waterTimer){ clearInterval(_waterTimer); _waterTimer=null; }

        ${['General','Cardiologist','Dentist','Dermatologist','Orthopaedic','Eye Doctor','Gynaecologist','Neurologist','Paediatrician','ENT','Other'].map(s=>`<option ${ex&&ex.specialty===s?'selected':''}>${s}</option>`).join('')}
      </select></div>
    <div class="fld"><div class="flbl">Hospital / Clinic</div><input class="inp" id="appt-hosp" placeholder="e.g. Apollo Hospital, Chennai" value="${ex?ex.hospital:''}"/></div>
    <div class="fld"><div class="flbl">Date & Time *</div><input class="inp" id="appt-dt" type="datetime-local" value="${ex?ex.datetime.slice(0,16):defDT}"/></div>
    <div class="fld"><div class="flbl">Notes</div><input class="inp" id="appt-notes" placeholder="e.g. Bring blood reports, fasting required" value="${ex?ex.notes:''}"/></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px;background:var(--gl);border-radius:10px;cursor:pointer" onclick="if(event.target.tagName!=='INPUT'){document.getElementById('appt-rem').click();}">
      <input type="checkbox" id="appt-rem" style="width:18px;height:18px;cursor:pointer" ${ex&&ex.reminder?'checked':''}/>
      <label for="appt-rem" onclick="event.stopPropagation()" style="font-size:13px;font-weight:600;color:#1B5E20;cursor:pointer">🔔 Remind me 1 hour before</label>
    </div>
    <button class="btn" onclick="saveAppt(${existingId?`'${existingId}'`:'null'})">✅ ${ex?'Update':'Save'} Appointment</button>
    <button class="btn2" onclick="this.closest('[id]')?.remove()||this.closest('[style*=fixed]')?.remove()">Cancel</button>
  </div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}
function saveAppt(existingId){
  if(window._apptSaving) return; window._apptSaving=true;
  existingId = existingId || null;
  const doc=document.getElementById('appt-doc')?.value.trim();
  if(!doc){alert('Please enter the doctor name.');return;}
  const dt=document.getElementById('appt-dt')?.value;
  if(!dt){alert('Please select date and time.');return;}
  const appt={
    id:existingId||('ap'+Date.now()),
    doctor:doc, specialty:document.getElementById('appt-spec')?.value||'General',
    hospital:document.getElementById('appt-hosp')?.value.trim()||'',
    datetime:new Date(dt).toISOString(),
    notes:document.getElementById('appt-notes')?.value.trim()||'',
    reminder:document.getElementById('appt-rem')?.checked||false
  };
  const appts=getAppointments();
  if(existingId){ const i=appts.findIndex(a=>a.id===existingId); if(i>=0)appts[i]=appt; else appts.push(appt); }
  else appts.push(appt);
  saveAppointments(appts);
  // Schedule reminder — push to SW so it survives tab close
  if(appt.reminder){
    if(Notification.permission==='granted'){
      const ms=new Date(appt.datetime)-Date.now()-3600000;
      if(ms>0){
        // Store in SW via message so reminder survives page close
        if('serviceWorker' in navigator){
          navigator.serviceWorker.ready.then(reg=>{
            if(reg.active) reg.active.postMessage({
              type:'SET_APPT_REMINDER',
              clientId: getClientId(),
              id: appt.id,
              fireAt: new Date(appt.datetime).getTime()-3600000,
              title:'📅 Appointment in 1 hour',
              body:`Dr. ${appt.doctor}${appt.hospital?' · '+appt.hospital:''}`
            });
          }).catch(()=>{});
        }
        // Page-side fallback (works while app is open)
        setTimeout(()=>fireNotification(`📅 Appointment in 1 hour`,`Dr. ${appt.doctor}${appt.hospital?' · '+appt.hospital:''}`,'appt-'+appt.id),ms);
      }
    } else {
      requestNotifPermission().then(granted=>{
        if(!granted) alert('Please allow notifications to receive appointment reminders.');
      });
    }
  }
  document.getElementById('appt-overlay')?.remove();
  window._apptSaving=false;
  rAppointments();
}
function viewAppt(id){ showAddAppt(id); }
function deleteAppt(id){
  if(!confirm('Delete this appointment?'))return;
  saveAppointments(getAppointments().filter(a=>a.id!==id));
  // Also clear the SW reminder for this appointment
  if('serviceWorker' in navigator){
    navigator.serviceWorker.ready.then(reg=>{
      if(reg.active) reg.active.postMessage({ type:'CLEAR_APPT_REMINDER', clientId:getClientId(), id });
    }).catch(()=>{});
  }
  rAppointments();
}

/* ══ 6. MENSTRUAL CYCLE TRACKER ══ */
function rMenstrual(){
  if(U.gender!=='female'){
    SCR.innerHTML=`<div class="sc"><div class="brow"><div class="bk" onclick="goBack()">←</div><div style="flex:1"><div class="bk-t">Cycle Tracker</div></div></div><div class="p16" style="padding-top:30px;text-align:center"><div style="font-size:48px;margin-bottom:14px">🌸</div><div style="font-size:15px;font-weight:700;color:var(--g6);margin-bottom:8px">Not available</div><div style="font-size:13px;color:var(--g4);margin-bottom:20px">Cycle tracking is available when your profile gender is set to Female.</div><button class="btn" onclick="go('profile')">Go to Profile</button><button class="btn2" onclick="goBack()">Go Back</button></div></div>`;
    return;
  }
  const cycles=getCycles();
  const today_=today();
  // Calculate predictions from last 3 cycles
  let avgLen=28,lastStart=null,nextPeriod=null,fertileStart=null,fertileEnd=null,ovulDay=null;
  if(cycles.length>=1){
    lastStart=cycles[cycles.length-1].start;
    if(cycles.length>=2){
      const lens=[];
      for(let i=1;i<cycles.length;i++){
        const d=(new Date(cycles[i].start)-new Date(cycles[i-1].start))/(1000*60*60*24);
        if(d>18&&d<45) lens.push(d);
      }
      if(lens.length) avgLen=Math.round(lens.reduce((s,v)=>s+v,0)/lens.length);
    }
    const next=new Date(lastStart); next.setDate(next.getDate()+avgLen);
    nextPeriod=next.toISOString().split('T')[0];
    const ov=new Date(next); ov.setDate(ov.getDate()-14);
    ovulDay=ov.toISOString().split('T')[0];
    const fs=new Date(ov); fs.setDate(fs.getDate()-5);
    fertileStart=fs.toISOString().split('T')[0];
    fertileEnd=ovulDay;
  }
  // Build calendar — preserve navigation state across re-renders
  // Only reset to current month on very first load (both undefined)
  if(window._calViewYear == null || window._calViewMonth == null){
    const now_=new Date();
    window._calViewYear  = now_.getFullYear();
    window._calViewMonth = now_.getMonth();
  }
  const yr=window._calViewYear; const mo=window._calViewMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  // Mark period days — use actual end if given, else estimate from flow type
  const periodDays=new Set();
  const estimatedCycles=new Set(); // track which cycles have estimated end dates
  cycles.forEach(cy=>{
    const s=new Date(cy.start);
    let endDate;
    if(cy.end){
      endDate=new Date(cy.end);
    } else {
      // Estimate from flow type: Light=3d, Medium=5d, Heavy=7d
      const flowDays={'Light':3,'Medium':5,'Heavy':7}[cy.flow||'Medium']||5;
      endDate=new Date(s.getTime()+flowDays*86400000);
      estimatedCycles.add(cy.id);
    }
    for(let d=new Date(s);d<=endDate;d.setDate(d.getDate()+1)) periodDays.add(d.toISOString().split('T')[0]);
  });
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let calHTML=days.map(d=>`<div class="cycle-day-hdr">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) calHTML+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls='cycle-day'; let title=d;
    if(periodDays.has(ds)) cls+=' period';
    else if(ds===ovulDay) cls+=' ovulation';
    else if(fertileStart&&ds>=fertileStart&&ds<=fertileEnd) cls+=' fertile';
    else if(nextPeriod&&ds===nextPeriod) cls+=' predicted';
    if(ds===today_) cls+=' today-ring';
    calHTML+=`<div class="${cls}" onclick="logPeriodDay('${ds}')" title="${ds}">${title}</div>`;
  }
  SCR.innerHTML=`<div class="sc">
  <div class="brow"><div class="bk" onclick="goBack()">←</div><div style="flex:1"><div class="bk-t">🌸 Cycle Tracker</div><div class="bk-s">Period tracking & fertility predictions</div></div></div>
  <div class="iban iby"><span>🔒</span><span>All data stored privately on this device only. Never shared.</span></div>
  <div class="p16" style="padding-top:14px">
    ${lastStart?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px">
      <div style="background:#FCE4EC;border-radius:11px;padding:11px;text-align:center;border:1px solid #F48FB1"><div style="font-size:18px">📅</div><div style="font-size:10px;font-weight:700;color:#880E4F;margin-top:4px">Last Period</div><div style="font-size:11px;color:#880E4F">${fmtDate(lastStart)}</div></div>
      <div style="background:#FCE4EC;border-radius:11px;padding:11px;text-align:center;border:1px solid #F48FB1"><div style="font-size:18px">🔮</div><div style="font-size:10px;font-weight:700;color:#880E4F;margin-top:4px">Next Period</div><div style="font-size:11px;color:#880E4F">${nextPeriod?fmtDate(nextPeriod):'—'}</div></div>
      <div style="background:#EDE7FE;border-radius:11px;padding:11px;text-align:center;border:1px solid #CE93D8"><div style="font-size:18px">🌿</div><div style="font-size:10px;font-weight:700;color:#4A148C;margin-top:4px">Cycle Length</div><div style="font-size:11px;color:#4A148C">${avgLen} days avg</div></div>
    </div>`:''}
    <!-- Month navigation -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="cycleCalNav(-1)" style="background:var(--g1);border:.5px solid var(--g2);border-radius:10px;padding:7px 14px;font-size:16px;cursor:pointer;font-family:inherit;color:var(--g6)">‹</button>
      <div style="font-size:14px;font-weight:700;color:var(--g6)">${new Date(yr,mo,1).toLocaleString('en-IN',{month:'long',year:'numeric'})}</div>
      <button onclick="cycleCalNav(1)" ${yr===new Date().getFullYear()&&mo===new Date().getMonth()?'disabled style="opacity:.35;cursor:default"':''} style="background:var(--g1);border:.5px solid var(--g2);border-radius:10px;padding:7px 14px;font-size:16px;cursor:pointer;font-family:inherit;color:var(--g6)">›</button>
    </div>
    <div class="cycle-cal">${calHTML}</div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px">
      <span style="font-size:10px;display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--red);border-radius:50%;display:inline-block"></span>Period</span>
      <span style="font-size:10px;display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--pink);border-radius:50%;display:inline-block"></span>Ovulation</span>
      <span style="font-size:10px;display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:#FCE4EC;border:1px solid #F48FB1;border-radius:50%;display:inline-block"></span>Fertile window</span>
      <span style="font-size:10px;display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--rl);border:1.5px dashed var(--red);border-radius:50%;display:inline-block"></span>Predicted</span>
    </div>
    <button class="btn" onclick="showLogPeriod()">+ Log Period</button>
    <div style="margin:16px 0 10px">
      <div style="font-size:13px;font-weight:700;color:var(--g6)">Period History (${cycles.length})</div>
    </div>
    ${cycles.length?cycles.slice().reverse().slice(0,6).map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 13px;background:#fff;border-radius:10px;border:.5px solid var(--g2);margin-bottom:7px">
      <span style="font-size:20px">🌸</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--g6)">${fmtDate(c.start)}${c.end?' → '+fmtDate(c.end):'<span style="color:var(--g4);font-weight:400"> · end not logged</span>'}</div>
      <div style="font-size:10px;color:var(--g4)">${c.flow||'Medium flow'}${c.symptoms?' · '+c.symptoms:''}</div></div>
      <button onclick="deleteCycle('${c.id}')" style="background:var(--rl);border:none;border-radius:7px;padding:4px 7px;font-size:11px;cursor:pointer;color:#C5221F">🗑️</button>
    </div>`).join(''):
    '<div style="text-align:center;padding:16px;color:var(--g4);font-size:12px;background:var(--g1);border-radius:10px">No periods logged yet. Tap + Log Period to start.</div>'}
    <div class="pb"></div>
  </div></div>`;
}
function cycleCalNav(dir){
  // Navigate months: dir=-1 for prev, +1 for next
  // Don't allow going past current month
  const now = new Date();
  let m = (window._calViewMonth||0) + dir;
  let y = window._calViewYear||now.getFullYear();
  if(m < 0){ m = 11; y--; }
  else if(m > 11){ m = 0; y++; }
  // Cap at current month
  if(y > now.getFullYear() || (y === now.getFullYear() && m > now.getMonth())){
    y = now.getFullYear(); m = now.getMonth();
  }
  window._calViewYear = y;
  window._calViewMonth = m;
  rMenstrual();
}

function logPeriodDay(ds){
  // Only allow logging past/today dates
  if(ds > today()) return;
  showLogPeriod(ds);
}
function showLogPeriod(preDate){
  // Remove any existing log overlay first (prevent stacking)
  document.getElementById('cy-log-overlay')?.remove();

  const overlay = document.createElement('div');
  overlay.id = 'cy-log-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center';

  // Check if a cycle already exists that overlaps this date
  const existing = getCycles();
  const prefill  = preDate || today();

  const sheet = document.createElement('div');
  sheet.style.cssText = 'background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:480px';
  sheet.innerHTML =
    '<div style="width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:0 auto 18px"></div>'
   +'<div style="font-size:17px;font-weight:800;color:var(--g6);margin-bottom:16px">🌸 Log Period</div>'
   +'<div class="fld"><div class="flbl">Start Date *</div><input class="inp" id="cy-start" type="date" value="'+prefill+'"/></div>'
   +'<div class="fld"><div class="flbl">End Date <span style="font-weight:400;color:var(--g4)">(optional — estimated from flow if blank)</span></div><input class="inp" id="cy-end" type="date"/></div>'
      +'<div class="fld"><div class="flbl">Flow</div><div style="display:flex;gap:7px" id="flow-btns">'
   +'<button class="flow-btn" onclick="setCyFlow(\'Light\',this)">Light</button>'
   +'<button class="flow-btn on" onclick="setCyFlow(\'Medium\',this)">Medium</button>'
   +'<button class="flow-btn" onclick="setCyFlow(\'Heavy\',this)">Heavy</button>'
   +'</div></div>'
   +'<div class="fld"><div class="flbl">Symptoms (optional)</div><input class="inp" id="cy-sym" placeholder="e.g. cramps, headache, mood swings, bloating"/></div>'
   +'<div id="cy-dup-warn" style="display:none;background:var(--rl);color:#C5221F;border-radius:10px;padding:10px 13px;font-size:12px;margin-bottom:10px;line-height:1.5"></div>'
   +'<button class="btn" id="cy-save-btn" onclick="saveCycle()">✅ Save Period</button>'
   +'<button class="btn2" onclick="document.getElementById(&quot;cy-log-overlay&quot;).remove()">Cancel</button>';

  overlay.appendChild(sheet);
  overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  window._cyFlow = 'Medium';
  window._cySaving = false; // debounce flag
}

function setCyFlow(flow, btn){
  document.querySelectorAll('#flow-btns .flow-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  window._cyFlow = flow;
}
function saveCycle(){
  // Debounce — prevent double-tap saves
  if(window._cySaving) return;
  window._cySaving = true;

  const startVal = document.getElementById('cy-start')?.value;
  const endVal   = document.getElementById('cy-end')?.value;
  const warnEl   = document.getElementById('cy-dup-warn');
  const saveBtn  = document.getElementById('cy-save-btn');

  if(!startVal){
    alert('Please select a start date.');
    window._cySaving = false;
    return;
  }

  // Validate: end must be after start
  if(endVal && endVal < startVal){
    if(warnEl){ warnEl.textContent = '⚠️ End date cannot be before start date.'; warnEl.style.display='block'; }
    window._cySaving = false;
    return;
  }

  // Duplicate check — look for any cycle with the same start date
  const cycles = getCycles();
  const dupExact = cycles.find(cy => cy.start === startVal);
  if(dupExact){
    if(warnEl){
      warnEl.innerHTML = '⚠️ <b>Duplicate entry.</b> A period starting on <b>' + fmtDate(startVal) + '</b> is already logged. Please delete the existing entry first, or choose a different start date.';
      warnEl.style.display = 'block';
    }
    window._cySaving = false;
    return;
  }

  // Overlap check — does this start date fall inside any existing cycle's range?
  const overlap = cycles.find(cy => {
    const cEnd = cy.end || cy.start; // if no end, treat as single-day
    return startVal >= cy.start && startVal <= cEnd;
  });
  if(overlap){
    if(warnEl){
      warnEl.innerHTML = '⚠️ <b>Overlapping period.</b> The date <b>' + fmtDate(startVal) + '</b> falls within an already-logged period (' + fmtDate(overlap.start) + ' → ' + fmtDate(overlap.end||overlap.start) + '). Check your history below.';
      warnEl.style.display = 'block';
    }
    window._cySaving = false;
    return;
  }

  // All good — save
  const entry = {
    id:       'cy' + Date.now(),
    start:    startVal,
    end:      endVal || '',
    flow:     window._cyFlow || 'Medium',
    symptoms: document.getElementById('cy-sym')?.value.trim() || ''
  };
  cycles.push(entry);
  // Sort by start date so history is always chronological
  cycles.sort((a,b) => a.start < b.start ? -1 : a.start > b.start ? 1 : 0);
  saveCycles(cycles);

  // Show brief success feedback before closing
  if(saveBtn){ saveBtn.textContent = '✅ Saved!'; saveBtn.style.background = 'var(--green)'; }
  setTimeout(() => {
    document.getElementById('cy-log-overlay')?.remove();
    // Navigate calendar to the month of the saved entry so user sees it
    const d = new Date(startVal);
    window._calViewYear  = d.getFullYear();
    window._calViewMonth = d.getMonth();
    rMenstrual();
  }, 600);
}
function deleteCycle(id){
  if(!confirm('Delete this period log?')) return;
  const remaining = getCycles().filter(cy => cy.id !== id);
  saveCycles(remaining);
  rMenstrual();
}

function findInteractions(medNames){
  const normalised=medNames.map(n=>n.toLowerCase().replace(/\s*(tablet|cap|capsule|mg|ml|tab|sr|xr)\b.*/gi,'').trim());
  const results=[];
  for(let i=0;i<normalised.length;i++){
    for(let j=i+1;j<normalised.length;j++){
      const a=normalised[i],b=normalised[j];
      const hit=INTERACTION_DB.find(r=>
        (a.includes(r.a)||r.a.includes(a))&&(b.includes(r.b)||r.b.includes(b))||
        (b.includes(r.a)||r.a.includes(b))&&(a.includes(r.b)||r.b.includes(a))
      );
      if(hit) results.push({med1:medNames[i],med2:medNames[j],...hit});
    }
  }
  return results;
}

async function extractBillWithGemini(base64,dataUrl,apiKey,res){
  try{
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[
        {inline_data:{mime_type:'image/jpeg',data:base64}},
        {text:`Read this hospital/pharmacy bill or receipt. Extract: HOSPITAL: [name], DATE: [date], TOTAL: [total amount in numbers only], DESCRIPTION: [brief description of what was billed, e.g. "Consultation + medicines" or "Lab tests"]. Respond in exactly that format, nothing else.`}
      ]}]})
    });
    if(!resp.ok) throw new Error('API error');
    const data=await resp.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const hosp=(text.match(/HOSPITAL:\s*(.+)/i)||[])[1]?.trim()||'';
    const date=(text.match(/DATE:\s*(.+)/i)||[])[1]?.trim()||today();
    const totalRaw=(text.match(/TOTAL:\s*([\d,\.]+)/i)||[])[1]||'';
    const total=totalRaw.replace(/,/g,'');
    const desc=(text.match(/DESCRIPTION:\s*(.+)/i)||[])[1]?.trim()||'Hospital bill';
    // Normalise date
    let normDate=today();
    try{ const pd=new Date(date); if(!isNaN(pd)) normDate=pd.toISOString().split('T')[0]; }catch(e){}
    if(res) res.innerHTML=`
      <div style="background:var(--gl);border-radius:11px;padding:13px;margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:#1B5E20;margin-bottom:8px">✅ Bill read successfully</div>
        <img src="${dataUrl}" style="width:100%;border-radius:9px;margin-bottom:10px;border:.5px solid var(--g2)"/>
        <div style="font-size:11px;color:#2D7A4F;line-height:1.8"><b>Hospital:</b> ${hosp||'—'}<br><b>Date:</b> ${date}<br><b>Amount:</b> ₹${total||'—'}<br><b>Description:</b> ${desc}</div>
      </div>
      <button class="btn" onclick="prefillExpenseFromBill('${hosp.replace(/'/g,"\\'")}','${total}','${normDate}','${desc.replace(/'/g,"\\'")}')">✅ Add to Expenses</button>`;
  }catch(e){
    if(res) res.innerHTML=`<div style="background:var(--rl);border-radius:11px;padding:12px;font-size:12px;color:#C5221F">Could not read bill automatically. Please enter manually.</div><button class="btn2" style="margin-top:8px" onclick="this.closest('[id]')?.remove()||this.closest('[style*=fixed]')?.remove();showAddExpense()">✏️ Enter Manually</button>`;
  }
}
function prefillExpenseFromBill(hospital,amount,date,description){
  document.querySelector('[style*="position:fixed"]')?.remove();

// ── PER-USER CLIENT ID ─────────────────────────────
// Each browser/device gets a unique ID stored in localStorage.
// This is sent with every SW schedule message so the SW can fire
// notifications only to the correct user's tab, preventing leakage
// to other users on shared hosting.
function getClientId(){
  let id = loadKey('hv_client_id');
  if(!id){ id = 'hv_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); saveKey('hv_client_id', id); }
  return id;
}

// Push full reminder schedule into the Service Worker so it can fire
// notifications independently when the page/tab is closed.
// clientId ensures only THIS user's tab receives the notifications.
function pushReminderScheduleToSW(){
  if(!('serviceWorker' in navigator)) return;
  const meds=getMeds().filter(m=>m.active!==false);
  const schedule=[];
  [{slot:'morning',hour:8},{slot:'afternoon',hour:14},{slot:'night',hour:21}].forEach(({slot,hour})=>{
    const due=meds.filter(m=>m[slot]);
    if(due.length) schedule.push({ slot, hour, names: due.map(m=>m.name+(m.dosage?' '+m.dosage:'')).join(', ') });
  });
  navigator.serviceWorker.ready.then(reg=>{
    if(reg.active) reg.active.postMessage({ type:'SET_MED_SCHEDULE', schedule, clientId: getClientId() });
  }).catch(()=>{});
  // Also push current taken state so SW can skip already-taken slots
  syncTakenSlotsToSW();
}

function pushWaterScheduleToSW(){
  if(!('serviceWorker' in navigator)) return;
  const interval=parseInt(loadKey('hv_water_interval')||'60');
  const start=parseInt(loadKey('hv_water_start')||'8');
  const end=parseInt(loadKey('hv_water_end')||'22');
  const goal=parseInt(loadKey('hv_water_goal')||'8');
  navigator.serviceWorker.ready.then(reg=>{
    if(reg.active) reg.active.postMessage({ type:'SET_WATER_SCHEDULE', interval, start, end, goal, clientId: getClientId() });
  }).catch(()=>{});
}

// ── STARTUP: schedule reminders on app open ─────────
(function initReminders(){
  if(loadKey('hv_reminders_on')==='1' && Notification.permission==='granted'){
    scheduleAllMedReminders();
    // Push schedule to SW — wait until SW is active (may not be on first install)
    if('serviceWorker' in navigator){
      navigator.serviceWorker.ready.then(()=>{
        pushReminderScheduleToSW();
        // Also re-push when a new SW takes control (e.g. after update or first install)
        navigator.serviceWorker.addEventListener('controllerchange', ()=> pushReminderScheduleToSW());
      }).catch(()=>{});
    }
  }
  if(loadKey('hv_water_on')==='1' && Notification.permission==='granted'){
    // Push water schedule to SW first (no double-fire: scheduleWaterReminder() skips when SW active)
    if('serviceWorker' in navigator){
      navigator.serviceWorker.ready.then(()=>{
        pushWaterScheduleToSW();
        navigator.serviceWorker.addEventListener('controllerchange', ()=> pushWaterScheduleToSW());
      }).catch(()=>{});
    }
    scheduleWaterReminder(); // fallback for non-SW browsers
  }
  if(loadKey('hv_tips_notif_on')==='1' && Notification.permission==='granted'){
    if('serviceWorker' in navigator){
      navigator.serviceWorker.ready.then(()=> pushTipsScheduleToSW()).catch(()=>{});
    }
  }
  // Vaccine reminders — check on every app open + push schedule to SW
  if(loadKey('hv_vac_reminders_on')==='1' && Notification.permission==='granted'){
    checkVaccineReminders(); // immediate check for today
    if('serviceWorker' in navigator){
      navigator.serviceWorker.ready.then(()=>{
        pushVacRemindersToSW();
        navigator.serviceWorker.addEventListener('controllerchange', ()=> pushVacRemindersToSW());
      }).catch(()=>{});
    }
  }
  // Listen for SW-fired actions and targeted notifications
  if('serviceWorker' in navigator){
    navigator.serviceWorker.addEventListener('message', e=>{
      if(!e.data) return;
      // SHOW_NOTIFICATION: SW asks this tab to show a notification.
      // Only show if the clientId matches this browser session (multi-user isolation).
      if(e.data.type==='SHOW_NOTIFICATION'){
        if(e.data.clientId !== getClientId()) return; // not for this user
        if(Notification.permission==='granted'){
          const iconPath=(location.pathname.replace(/\/[^/]*$/,'')||'')+'/icon-192.png';
          navigator.serviceWorker.ready.then(reg=>{
            reg.showNotification(e.data.title,{
              body:e.data.body, icon:iconPath, badge:iconPath,
              tag:e.data.tag, vibrate:[200,100,200], renotify:true,
              actions:e.data.actions||[]
            });
          }).catch(()=>{});
        }
        return;
      }
      if(e.data.type==='MED_TAKEN'){
        if(e.data.clientId && e.data.clientId !== getClientId()) return;
        const taken=getTakenToday();
        const slot=e.data.tag?.replace('med-','');
        getMeds().filter(m=>m[slot]).forEach(m=>{ const sid=m.id+'-'+slot[0]; if(!taken.includes(sid)) taken.push(sid); });
        setTakenToday(taken);
      }
      if(e.data.type==='WATER_DRUNK'){
        if(e.data.clientId && e.data.clientId !== getClientId()) return;
        addWaterGlass();
      }
    });
  }
})();

const TIP_META = {
  food:      {label:'🥗 Food',       color:'#34A853', grad:'#2E7D32', light:'#E6F4EA', dark:'#1B5E20'},
  exercise:  {label:'🏃 Exercise',   color:'#FA7B17', grad:'#E65100', light:'#FEF3E2', dark:'#B85000'},
  sleep:     {label:'🌙 Sleep',      color:'#7C4DFF', grad:'#4527A0', light:'#EDE7FE', dark:'#311B92'},
  hydration: {label:'💧 Hydration',  color:'#1A73E8', grad:'#0D47A1', light:'#E8F0FE', dark:'#0D47A1'},
  mental:    {label:'🧘 Mental',     color:'#00897B', grad:'#004D40', light:'#E0F2F1', dark:'#004D40'},
  preventive:{label:'🩺 Preventive', color:'#EA4335', grad:'#B71C1C', light:'#FCE8E6', dark:'#C5221F'},
};

let _tipsFilter = 'all';

function getTipOfDay(){
  // Pick a deterministic tip for today using date as seed — cycles through all tips
  const allTips = Object.entries(HEALTH_TIPS).flatMap(([cat, tips]) =>
    tips.map(t => ({...t, cat}))
  );
  const seed = new Date().toISOString().split('T')[0].replace(/-/g,'');
  const idx = parseInt(seed) % allTips.length;
  return allTips[idx];
}

function rTips(){
  const todayTip = getTipOfDay();
  const meta = TIP_META[todayTip.cat];
  const notifOn = loadKey('hv_tips_notif_on') === '1';
  const notifTime = loadKey('hv_tips_notif_time') || '08:00';

  const cats = ['all', ...Object.keys(TIP_META)];

  SCR.innerHTML = `<div class="sc">
  <div class="hdr">
    <div class="hdr-t">💡 Daily Health Tips</div>
    <div class="hdr-s">100+ expert tips · Food, sleep, exercise & more</div>
  </div>

  <!-- Tip of the Day -->
  <div style="background:linear-gradient(135deg,${meta.color},${meta.grad});margin:14px;border-radius:16px;padding:18px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:rgba(255,255,255,.1);border-radius:50%"></div>
    <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.5px;margin-bottom:6px">TODAY'S TIP</div>
    <div style="font-size:15px;font-weight:800;color:#fff;margin-bottom:6px;line-height:1.35">${todayTip.t}</div>
    <div style="font-size:12px;color:rgba(255,255,255,.88);line-height:1.6">${todayTip.b}</div>
    <div style="margin-top:10px;display:inline-block;background:rgba(255,255,255,.2);border-radius:10px;padding:3px 10px;font-size:10px;font-weight:700;color:#fff">${TIP_META[todayTip.cat].label}</div>
  </div>

  <!-- Notification toggle -->
  <div style="margin:0 14px 14px">
    <div class="tip-notif-banner">
      <span style="font-size:22px">🔔</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#1B5E20">Daily tip notification</div>
        <div style="font-size:11px;color:#2D7A4F;margin-top:2px">Get a health tip pushed to your phone every day</div>
      </div>
      <div onclick="toggleTipsNotif(this)" id="tips-sw"
           style="width:46px;height:26px;background:${notifOn ? 'var(--green)' : 'var(--g2)'};border-radius:13px;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0">
        <div style="position:absolute;top:3px;${notifOn ? 'right:3px' : 'left:3px'};width:20px;height:20px;background:#fff;border-radius:50%;transition:all .25s;box-shadow:0 1px 4px rgba(0,0,0,.25)"></div>
      </div>
    </div>
    ${notifOn ? `<div style="display:flex;align-items:center;gap:10px;background:#fff;border-radius:11px;padding:12px;border:.5px solid var(--g2)">
      <span style="font-size:14px">⏰</span>
      <div style="flex:1;font-size:13px;font-weight:600;color:var(--g6)">Notification time</div>
      <input type="time" value="${notifTime}" onchange="saveTipsTime(this.value)"
             style="background:var(--g1);border:1.5px solid var(--g2);border-radius:9px;padding:6px 10px;font-size:13px;color:var(--g6);outline:none;font-family:inherit"/>
    </div>` : ''}
    ${Notification.permission === 'denied' ? '<div style="background:var(--rl);border-radius:10px;padding:10px;font-size:12px;color:#C5221F;margin-top:8px">⚠️ Notifications blocked. Enable them in browser settings for this site.</div>' : ''}
  </div>

  <!-- Category filter pills -->
  <div style="padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:4px">
    ${cats.map(c => {
      const m = c === 'all' ? {label:'✨ All', color:'var(--blue)', light:'var(--bl)', dark:'var(--bd)'} : TIP_META[c];
      const on = _tipsFilter === c;
      return `<div class="tip-cat-pill" onclick="filterTips('${c}')"
        style="background:${on ? m.color : 'transparent'};color:${on ? '#fff' : m.dark};border-color:${m.color};opacity:${on ? 1 : 0.75}">
        ${m.label}</div>`;
    }).join('')}
  </div>

  <!-- Tips list -->
  <div class="p16 pb" id="tips-list">
    ${renderTipsList()}
  </div>
  </div>`;
}

function renderTipsList(){
  const entries = Object.entries(HEALTH_TIPS);
  let html = '';
  for(const [cat, tips] of entries){
    if(_tipsFilter !== 'all' && _tipsFilter !== cat) continue;
    const m = TIP_META[cat];
    html += `<div style="font-size:13px;font-weight:700;color:var(--g6);margin:14px 0 8px">${m.label}</div>`;
    for(const tip of tips){
      html += `<div class="tip-card">
        <div class="tip-card-accent" style="background:${m.color}"></div>
        <div style="padding-left:10px">
          <div style="font-size:13px;font-weight:700;color:var(--g6);margin-bottom:4px">${tip.t}</div>
          <div style="font-size:12px;color:var(--g5);line-height:1.6">${tip.b}</div>
        </div>
      </div>`;
    }
  }
  return html;
}

function filterTips(cat){
  _tipsFilter = cat;
  const list = document.getElementById('tips-list');
  if(list) list.innerHTML = renderTipsList();
  // Re-render pills
  const pills = document.querySelectorAll('.tip-cat-pill');
  const cats = ['all', ...Object.keys(TIP_META)];
  pills.forEach((p, i) => {
    const c = cats[i];
    const m = c === 'all' ? {label:'✨ All', color:'var(--blue)', light:'var(--bl)', dark:'var(--bd)'} : TIP_META[c];
    const on = _tipsFilter === c;
    p.style.background = on ? m.color : 'transparent';
    p.style.color = on ? '#fff' : m.dark;
    p.style.opacity = on ? '1' : '0.75';
  });
}

async function toggleTipsNotif(sw){
  const on = loadKey('hv_tips_notif_on') === '1';
  if(!on){
    const granted = await requestNotifPermission();
    if(!granted){ alert('Please allow notifications to receive daily health tips.'); return; }
    saveKey('hv_tips_notif_on', '1');
    pushTipsScheduleToSW();
    fireNotification('💡 Daily Tips On', 'You\'ll get a health tip notification every morning!', 'tips-setup');
  } else {
    saveKey('hv_tips_notif_on', '0');
    navigator.serviceWorker && navigator.serviceWorker.ready.then(reg => {
      reg.active && reg.active.postMessage({type: 'CLEAR_TIPS_SCHEDULE', clientId: getClientId()});
    }).catch(()=>{});
  }
  rTips();
}

function saveTipsTime(val){
  saveKey('hv_tips_notif_time', val);
  pushTipsScheduleToSW();
}

function pushTipsScheduleToSW(){
  if(!('serviceWorker' in navigator)) return;
  const [h, m] = (loadKey('hv_tips_notif_time') || '08:00').split(':').map(Number);
  navigator.serviceWorker.ready.then(reg => {
    if(reg.active) reg.active.postMessage({
      type: 'SET_TIPS_SCHEDULE',
      hour: h,
      minute: m || 0,
      clientId: getClientId()
    });
  }).catch(()=>{});
}

// saveMeds SW push is now handled directly inside the saveMeds definition above (infinite recursion fix)
</script>
