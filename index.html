function extractTextFromRx(input){
  const file = input.files[0]; if(!file) return;
  const area = document.getElementById('rx-extract-area');
  if(area) area.innerHTML=`<div style="text-align:center;padding:24px;margin-top:14px;background:var(--g1);border-radius:12px">
    <div style="font-size:36px;margin-bottom:10px">🔍</div>
    <div style="font-size:14px;font-weight:700;color:var(--bd)">Reading prescription…</div>
    <div style="font-size:12px;color:var(--g4);margin-top:6px">Using AI vision to read handwriting & printed text</div>
    <div style="margin-top:12px;background:var(--g2);border-radius:6px;height:6px;overflow:hidden">
      <div id="ocr-bar" style="height:100%;background:var(--blue);border-radius:6px;width:10%;transition:width .4s"></div>
    </div>
    <div id="ocr-pct" style="font-size:11px;color:var(--g4);margin-top:6px">Processing image…</div>
  </div>`;
  const reader = new FileReader();
  reader.onload = function(e){
    window._rxPhotoData = e.target.result;
    const base64 = e.target.result.split(',')[1];
    const geminiKey = loadKey('hv_gemini_key') || loadKey('gemini_key') || '';
    if(geminiKey){
      runGeminiOCR(base64, e.target.result, area, geminiKey);
    } else {
      // Fall back to Tesseract with a prompt to set Gemini key
      const bar=document.getElementById('ocr-bar'); if(bar) bar.style.width='30%';
      const pct=document.getElementById('ocr-pct'); if(pct) pct.textContent='Using basic OCR (add Gemini key in Profile for better results)…';
      loadAndRunTesseract(e.target.result, area);
    }
  };
  reader.readAsDataURL(file);
}

async function runGeminiOCR(base64, dataUrl, area, apiKey){
  const bar=document.getElementById('ocr-bar'); const pct=document.getElementById('ocr-pct');
  if(bar) bar.style.width='40%';
  if(pct) pct.textContent='Analysing prescription with Gemini AI…';
  try{
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{parts:[
          {inline_data:{mime_type:'image/jpeg',data:base64}},
          {text:`You are a medical prescription reader. Carefully read this prescription image (which may have handwritten and printed text) and extract ALL text you can see.

Return the information in this EXACT format:
PATIENT: [patient name]
DATE: [date if visible]
DOCTOR: [doctor name and clinic]
MEDICINES:
- [Medicine 1 name] [dosage] - [timing e.g. 1-0-1 or 1 tab twice daily] - [duration if written]
- [Medicine 2 name] [dosage] - [timing] - [duration]
(list all medicines)
DIAGNOSIS/COMPLAINT: [chief complaint or diagnosis if written]
OTHER NOTES: [any other instructions or notes]
RAW TEXT: [all other readable text from the prescription]

Be very careful with medicine names -- read them character by character. Common medicines in India include Augmentin, Aceclofenac, Paracetamol, Amoxicillin, Omeprazole etc. If timing is written as 1-0-1 it means morning-afternoon-night.`}
        ]}]
      })
    });
    if(bar) bar.style.width='80%';
    if(!resp.ok){ const e=await resp.json(); throw new Error(e.error?.message||'Gemini API error '+resp.status); }
    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if(bar) bar.style.width='100%';
    if(pct) pct.textContent='Done!';
    showExtractedText(dataUrl, text, area, true);
  }catch(err){
    if(pct) pct.textContent='Gemini failed, trying basic OCR…';
    if(bar) bar.style.width='50%';
    // Fall back to Tesseract
    loadAndRunTesseract(dataUrl, area);
  }
}

function loadAndRunTesseract(dataUrl, area){
  if(!window.Tesseract){
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js';
    s.onload = function(){ runTesseract(dataUrl, area); };
    s.onerror = function(){ showRxFallback(dataUrl, area, 'OCR library could not load. Check internet connection.'); };
    document.head.appendChild(s);
  } else {
    runTesseract(dataUrl, area);
  }
}

function runTesseract(dataUrl, area){
  try {
    Tesseract.recognize(dataUrl, 'eng', {
      logger: function(m){
        if(m.status === 'recognizing text'){
          const pct = Math.round((m.progress||0)*100);
          const bar = document.getElementById('ocr-bar');
          const pctEl = document.getElementById('ocr-pct');
          if(bar) bar.style.width = pct + '%';
          if(pctEl) pctEl.textContent = pct + '% -- reading text...';
        } else if(m.status === 'loading tesseract core' || m.status === 'initializing tesseract'){
          const pctEl = document.getElementById('ocr-pct');
          if(pctEl) pctEl.textContent = 'Loading OCR engine...';
        }
      }
    }).then(function(result){
      showExtractedText(dataUrl, (result.data.text||'').trim(), area);
    }).catch(function(err){
      showRxFallback(dataUrl, area, 'OCR failed: ' + err.message);
    });
  } catch(e){
    showRxFallback(dataUrl, area, 'OCR error: ' + e.message);
  }
}

function showExtractedText(dataUrl, extractedText, area, isGemini){
  if(!area) return;
  window._rxExtractedText = extractedText;
  const hasText = extractedText && extractedText.length > 4;
  const escaped = extractedText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Try to auto-parse medicines from Gemini structured output
  let parsedMeds = [];
  let patientInfo = '';
  if(isGemini && hasText){
    // Extract patient name
    const patMatch = extractedText.match(/PATIENT:\s*(.+)/i);
    if(patMatch) patientInfo = patMatch[1].trim();
    // Extract doctor
    const docMatch = extractedText.match(/DOCTOR:\s*(.+)/i);
    const docName = docMatch ? docMatch[1].trim() : '';
    // Extract medicines section
    const medsMatch = extractedText.match(/MEDICINES:\s*([\s\S]*?)(?:DIAGNOSIS|OTHER NOTES|RAW TEXT|$)/i);
    if(medsMatch){
      const lines = medsMatch[1].split('\n').map(l=>l.trim()).filter(l=>l.startsWith('-')||l.startsWith('*'));
      lines.forEach(line=>{
        const clean = line.replace(/^[-*]\s*/,'').trim();
        if(clean.length > 2){
          // Try to split: name+dosage | timing | duration
          const parts = clean.split(/\s*-\s*/);
          const nameAndDose = (parts[0]||'').trim();
          const timing = (parts[1]||'').trim();
          const duration = (parts[2]||'').trim();
          // Parse timing like 1-0-1, 1-1-1, 1-0-0
          let morning=false,afternoon=false,night=false;
          const timingClean = timing.replace(/\s/g,'');
          const timeParts = timingClean.match(/^(\d)[--](\d)[--](\d)/);
          if(timeParts){ morning=timeParts[1]!=='0'; afternoon=timeParts[2]!=='0'; night=timeParts[3]!=='0'; }
          else if(/morning|am/i.test(timing)) morning=true;
          else if(/night|pm/i.test(timing)) night=true;
          else if(/twice|bd/i.test(timing)){ morning=true; night=true; }
          else if(/thrice|tds/i.test(timing)){ morning=true; afternoon=true; night=true; }
          // Split name from dosage (e.g. "Augmentin 625mg")
          const nameDoseMatch = nameAndDose.match(/^([A-Za-z][A-Za-z\s\-\.]+?)\s+(\d[\d\.]+\s*(?:mg|ml|mcg|g|iu|%)?)?$/i);
          const medName = nameDoseMatch ? nameDoseMatch[1].trim() : nameAndDose.replace(/\d[\d\.]*\s*(?:mg|ml|mcg|g|iu|%)?/i,'').trim()||nameAndDose;
          const medDose = nameDoseMatch ? (nameDoseMatch[2]||'').trim() : (nameAndDose.match(/\d[\d\.]*\s*(?:mg|ml|mcg|g|iu|%)?/i)||[''])[0].trim();
          if(medName.length>1) parsedMeds.push({name:medName, dosage:medDose, morning, afternoon, night, duration:duration||'As prescribed', doctor:docName, timing});
        }
      });
    }
  }

  const geminiSummaryHTML = isGemini && hasText ? `
    <div style="background:var(--gl);border-radius:11px;padding:12px;border:1px solid #A8D5B5;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#1B5E20;margin-bottom:5px">✨ AI Vision Result ${patientInfo?'. Patient: <b>'+patientInfo+'</b>':''}</div>
      <div style="font-size:11px;color:#2D7A4F">Gemini AI read this prescription. Review the extracted text below and correct if needed before saving.</div>
    </div>` : '';

  const parsedMedsHTML = parsedMeds.length ? `
    <div style="background:#fff;border-radius:11px;border:1.5px solid var(--blue);padding:13px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--bd);margin-bottom:8px">💊 ${parsedMeds.length} medicine${parsedMeds.length>1?'s':''} detected -- tap to add:</div>
      ${parsedMeds.map((m,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--g2)">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:var(--g6)">${m.name} ${m.dosage}</div>
          <div style="font-size:10px;color:var(--g4)">${m.timing||''} ${m.duration?'. '+m.duration:''}</div>
        </div>
        <button onclick="prefillMedFromRx(${i})" style="background:var(--bl);color:var(--bd);border:1.5px solid #C5D9F8;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">+ Add</button>
      </div>`).join('')}
    </div>` : '';

  window._rxParsedMeds = parsedMeds;

  area.innerHTML=`
    <div style="margin-top:16px">
      <img src="${dataUrl}" style="width:100%;border-radius:12px;border:.5px solid var(--g2);margin-bottom:14px"/>
      ${geminiSummaryHTML}
      ${parsedMedsHTML}
      <div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:700;color:var(--g6);margin-bottom:8px">${hasText ? '📄 Extracted text:' : '⚠️ Could not read text clearly'}</div>
        ${hasText ? `<div style="background:var(--g1);border-radius:10px;padding:13px;border:1.5px solid var(--g2);font-size:12px;color:var(--g6);line-height:1.9;white-space:pre-wrap;max-height:220px;overflow-y:auto">${escaped}</div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button onclick="copyRxText()" style="flex:1;background:var(--bl);color:var(--bd);border:1.5px solid #C5D9F8;border-radius:9px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">📋 Copy Text</button>
            <button onclick="saveRxTextOnly()" style="flex:1;background:var(--gl);color:#1B5E20;border:1.5px solid #A8D5B5;border-radius:9px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">💾 Save to Vault</button>
          </div>` :
          `<div style="background:var(--al);border-radius:10px;padding:13px;font-size:12px;color:#B06000;line-height:1.6">Try a clearer, well-lit photo in focus. You can still save the photo and enter details manually below.</div>`}
      </div>
      <div style="background:#fff;border-radius:11px;border:1.5px solid var(--g2);padding:13px;margin-bottom:10px">
        <div style="font-size:12px;font-weight:700;color:var(--g6);margin-bottom:8px">💊 Add a medicine manually:</div>
        <input class="inp" id="rx-med-name" placeholder="Medicine name *" style="margin-bottom:8px"/>
        <input class="inp" id="rx-med-dose" placeholder="Dosage e.g. 500mg" style="margin-bottom:8px"/>
        <div style="display:flex;gap:8px;margin-bottom:0px">
          <select class="sel" id="rx-med-food" style="flex:1"><option>After food</option><option>Before food</option><option>With food</option><option>As directed</option></select>
          <input class="inp" id="rx-med-dur" placeholder="Duration e.g. 5 days" style="flex:1"/>
        </div>
      </div>
      <button class="btn" onclick="saveRxMedicine()">✅ Save Medicine + Prescription</button>
      <button class="btn2" onclick="showScanTab('manual')">✏️ Switch to Manual Entry</button>
    </div>`;
}

function prefillMedFromRx(index){
  const m = (window._rxParsedMeds||[])[index];
  if(!m) return;
  // Switch to manual tab with prefilled data
  showScanTab('manual');
  setTimeout(function(){
    const nameEl=document.getElementById('med-name');
    if(nameEl){ nameEl.value=m.name; }
    const doseEl=document.getElementById('med-dose');
    if(doseEl) doseEl.value=m.dosage||'';
    const durEl=document.getElementById('med-dur');
    if(durEl) durEl.value=m.duration||'';
    const docEl=document.getElementById('med-doc');
    if(docEl) docEl.value=m.doctor||'';
    const mEl=document.getElementById('med-m'); if(mEl) mEl.checked=m.morning||false;
    const aEl=document.getElementById('med-a'); if(aEl) aEl.checked=m.afternoon||false;
    const nEl=document.getElementById('med-n'); if(nEl) nEl.checked=m.night||false;
    // Auto-lookup use
    if(nameEl) autoLookupMedUse(m.name);
  },100);
}

function showRxFallback(dataUrl, area, msg){
  if(!area) return;
  window._rxExtractedText = '';
  area.innerHTML=`
    <div style="margin-top:14px">
      <img src="${dataUrl}" style="width:100%;border-radius:12px;border:.5px solid var(--g2);margin-bottom:12px"/>
      <div class="card" style="background:var(--al);cursor:default;margin-bottom:10px">
        <div style="font-size:12px;font-weight:700;color:#B06000;margin-bottom:4px">⚠️ ${msg}</div>

      </div>
      <button class="btn" onclick="showScanTab('manual')">✏️ Manual Entry</button>
    </div>`;
}

function copyRxText(){
  const text = window._rxExtractedText || '';
  if(!text){ alert('No text to copy.'); return; }
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(function(){ alert('Prescription text copied to clipboard!'); }); }
  else { const t=document.createElement('textarea'); t.value=text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('Text copied!'); }
}

function saveRxTextOnly(){
  const text = window._rxExtractedText || '';
  if(!text){ alert('No text to save.'); return; }
  const vault = getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'prescription_text', icon:'📄', title:'Prescription Scanned Text', subtitle:text.substring(0,80), date:today() });
  saveVaultItems(vault);
  alert('Prescription text saved to Health Vault!');
}

function saveRxMedicine(){
  if(window._rxMedSaving) return; window._rxMedSaving=true;
  const name = (document.getElementById('rx-med-name')?.value||'').trim();
  if(!name){ alert('Please enter the medicine name.'); return; }
  const extractedText = window._rxExtractedText || '';
  const med = {
    id: 'm'+Date.now(), name,
    dosage: (document.getElementById('rx-med-dose')?.value||'').trim(),
    morning:false, afternoon:false, night:false,
    duration: (document.getElementById('rx-med-dur')?.value||'As prescribed').trim(),
    food: document.getElementById('rx-med-food')?.value||'As directed',
    doctor:'', notes: extractedText ? 'Prescription text: '+extractedText.substring(0,500) : '',
    photo: window._rxPhotoData||'', prescriptionText:extractedText, date:today(), active:true
  };
  const meds=getMeds(); meds.push(med); saveMeds(meds);
  const vault=getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'medicine', icon:'💊', title:'Medicine: '+name+' '+med.dosage, subtitle:'Scanned from prescription . '+med.food, date:today() });
  saveVaultItems(vault);
  // Auto-save prescription photo to permanent photo vault
  if(window._rxPhotoData){
    const photos=getPhotos();
    photos.push({ id:'ph'+Date.now(), cat:'doc', docCat:'Prescription', data:window._rxPhotoData, label:'Prescription -- '+name, date:today() });
    savePhotos(photos);
  }
  window._rxPhotoData=null; window._rxExtractedText=null;
  alert('Medicine saved with prescription photo and extracted text!');
  go('scan');
}

function previewMedPhoto(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    window._medPhotoData=e.target.result;
    const prev=document.getElementById('med-photo-preview');
    if(prev) prev.innerHTML='<img src="'+e.target.result+'" style="width:100%;border-radius:10px;margin-top:8px;border:.5px solid var(--g2)"/>';
    const zone=document.getElementById('med-photo-zone');
    if(zone) zone.innerHTML='<div style="font-size:11px;color:var(--green);font-weight:700;padding:8px">Photo attached</div>';
  };
  reader.readAsDataURL(file);
}

async function autoLookupMedUse(name){
  name=(name||'').trim();
  if(!name) return;
  const useInp=document.getElementById('med-use');
  const st=document.getElementById('med-use-status');
  if(!useInp) return;
  // If already filled in, don't overwrite
  if(useInp.value.trim()) return;
  // 1. Check local DB first (instant)
  const key=name.toLowerCase().replace(/\s*(tablet|cap|capsule|syrup|injection|mg|ml|mcg|tab|sr|xr|er|cr|od|bd|tds|qid)\b.*/gi,'').trim();
  const localMatch=Object.keys(MED_USE_DB).find(k=>key.includes(k)||k.includes(key));
  if(localMatch){
    useInp.value=MED_USE_DB[localMatch];
    if(st) st.textContent='✅ auto-filled';
    setTimeout(()=>{ if(st) st.textContent=''; },2500);
    return;
  }
  // 2. Try OpenFDA drug label API (free, no key needed)
  if(st) st.textContent='🔍 Looking up…';
  try{
    const q=encodeURIComponent(name.split(' ')[0]);
    const url=`https://api.fda.gov/drug/label.json?search=openfda.generic_name:"${q}"&limit=1`;
    const res=await fetch(url,{signal:AbortSignal.timeout(5000)});
    if(res.ok){
      const data=await res.json();
      const hit=data.results?.[0];
      if(hit){
        // Try to get a short purpose from indications_and_usage or purpose
        const raw=(hit.purpose?.[0]||hit.indications_and_usage?.[0]||'').replace(/<[^>]*>/g,'').trim();
        if(raw){
          // Trim to first sentence / 120 chars
          const sentence=raw.split(/[.\n]/)[0].replace(/\s+/g,' ').trim().slice(0,120);
          if(sentence.length>10){
            useInp.value=sentence;
            if(st) st.textContent='✅ from FDA';
            setTimeout(()=>{ if(st) st.textContent=''; },2500);
            return;
          }
        }
      }
    }
  }catch(e){}
  if(st) st.textContent='';
}

function saveMedicine(){
  if(window._medSaving) return; window._medSaving=true;
  const name=(document.getElementById('med-name')?.value||'').trim();
  if(!name){ window._medSaving=false; alert('Please enter the medicine name.'); return; }
  // Duplicate check: same name already active?
  const existing=getMeds().find(m=>m.active!==false && m.name.toLowerCase()===name.toLowerCase());
  if(existing){ window._medSaving=false; alert('⚠️ "'+name+'" is already in your medicine list.\nIf this is a new course, please delete or update the existing entry first.'); return; }
  const med={
    id:'m'+Date.now(), name,
    use:(document.getElementById('med-use')?.value||'').trim(),
    dosage:(document.getElementById('med-dose')?.value||'').trim(),
    morning:document.getElementById('med-m')?.checked||false,
    afternoon:document.getElementById('med-a')?.checked||false,
    night:document.getElementById('med-n')?.checked||false,
    duration:(document.getElementById('med-dur')?.value||'Ongoing').trim(),
    food:document.getElementById('med-food')?.value||'As directed',
    doctor:(document.getElementById('med-doc')?.value||'').trim(),
    notes:(document.getElementById('med-notes')?.value||'').trim(),
    photo:window._medPhotoData||'', date:today(), active:true
  };
  const meds=getMeds(); meds.push(med); saveMeds(meds);
  const vault=getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'medicine', icon:'💊', title:'Medicine added: '+name+' '+med.dosage, subtitle:med.food+' . '+med.duration, date:today() });
  saveVaultItems(vault);
  // Auto-save medicine photo to permanent photo vault
  if(window._medPhotoData){
    const photos=getPhotos();
    photos.push({ id:'ph'+Date.now(), cat:'doc', docCat:'Prescription', data:window._medPhotoData, label:'Prescription photo -- '+name, date:today() });
    savePhotos(photos);
  }
  window._medPhotoData=null;
  // Sync to Google Sheets if logged in
  if(U.email && !U.isGuest){
    appsScriptPost('saveMed',{ email:U.email, userName:U.name, medicine:med }).catch(()=>{});
  }
  ['med-name','med-use','med-dose','med-dur','med-doc','med-notes'].forEach(function(id){ const el=document.getElementById(id); if(el) el.value=''; });
  const usSt=document.getElementById('med-use-status'); if(usSt) usSt.textContent='';
  ['med-m','med-a','med-n'].forEach(function(id){ const el=document.getElementById(id); if(el) el.checked=false; });
  const zone=document.getElementById('med-photo-zone');
  if(zone) zone.innerHTML='<div style="font-size:20px;margin-bottom:3px">📷</div><div style="font-size:11px;color:var(--g4)">Tap to attach prescription photo</div>';
  const prev=document.getElementById('med-photo-preview'); if(prev) prev.innerHTML='';
  const list=document.getElementById('scan-med-list'); if(list) list.innerHTML=renderMedListInline();
  window._medSaving=false;
  alert('✅ Medicine saved!');
}

function saveReport(existingId){
  if(window._reportSaving) return; window._reportSaving=true;
  const name = document.getElementById('rp-name')?.value.trim();
  if(!name){ window._reportSaving=false; alert('Please enter the report name.'); return; }
  // Collect rows
  const rowEls = document.querySelectorAll('[id^="rr-"]');
  const results = [];
  rowEls.forEach(el=>{
    const idSuffix = el.id.replace('rr-','');
    const n = document.getElementById('rr-name-'+idSuffix)?.value.trim();
    const v = document.getElementById('rr-val-'+idSuffix)?.value.trim();
    const u = document.getElementById('rr-unit-'+idSuffix)?.value.trim();
    const s = document.getElementById('rr-status-'+idSuffix)?.value||'NORMAL';
    if(n) results.push({ name:n, value:v, unit:u, status:s });
  });
  const abnormal = results.filter(r=>r.status!=='NORMAL').length;
  const report = {
    id: existingId||('r'+Date.now()),
    name,
    date: document.getElementById('rp-date')?.value||today(),
    lab: document.getElementById('rp-lab')?.value.trim()||'',
    results,
    abnormal,
    photo: window._rpPhotoData||''
  };
  const reports = getReports();
  if(existingId){
    const idx = reports.findIndex(r=>r.id===existingId);
    if(idx>=0) reports[idx]=report; else reports.push(report);
  } else {
    reports.push(report);
  }
  saveReports(reports);
  // Vault entry
  const vault = getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'lab', icon:'🧪', title:`${name}`, subtitle:`${abnormal>0?abnormal+' abnormal':'All normal'} . ${report.lab||'Lab'}`, date:report.date });
  saveVaultItems(vault);
  // Auto-save lab photo to permanent photo vault
  if(window._rpPhotoData){
    const photos=getPhotos();
    photos.push({ id:'ph'+Date.now(), cat:'doc', docCat:'Lab Report', data:window._rpPhotoData, label:'Lab Report -- '+name, date:report.date });
    savePhotos(photos);
  }
  window._rpPhotoData = null;
  window._reportSaving=false;
  alert('✅ Report saved!');
  go('lab');
}

  if(!meds.length) return '<div class="card" style="cursor:default;text-align:center;color:var(--g4);font-size:13px">No medicines added yet.</div>';
  return meds.map(m=>`<div class="card" style="cursor:default;padding:11px 13px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--g6)">${m.name} ${m.dosage||''}</div>
        <div style="font-size:11px;color:var(--g4);margin-top:2px">${m.use?'<span style="color:var(--teal);font-weight:600">'+m.use+'</span> . ':''}${m.food} . ${m.duration} . ${[m.morning?'Morning':'',m.afternoon?'Afternoon':'',m.night?'Night':''].filter(Boolean).join(', ')||'As directed'}</div>
        ${m.doctor?`<div style="font-size:10px;color:var(--g4);margin-top:1px">Dr: ${m.doctor}</div>`:''}
        ${m.notes?`<div style="font-size:10px;color:var(--g4);margin-top:1px">${m.notes}</div>`:''}
        ${m.photo?`<img src="${m.photo}" style="width:80px;height:60px;object-fit:cover;border-radius:7px;margin-top:7px;border:.5px solid var(--g2)"/>`:'' }
      </div>

function deleteVaultItem(id){
  const vault = getVaultItems().filter(v=>v.id!==id);
  saveVaultItems(vault);
  rVault();
}
function clearVault(){
  if(!confirm('Clear all activity log entries?')) return;
  saveVaultItems([]);
  rVault();
}
function deleteMed(id){
  if(!confirm('Remove this medicine?')) return;
  saveMeds(getMeds().filter(m=>m.id!==id));
  rVault();
}
function editMed(id){
  const meds = getMeds();
  const m = meds.find(x=>x.id===id);
  if(!m) return;
  window._editMedId = id;
  window._medPhotoData = m.photo||'';
  // Navigate to scan tab with prefilled data
  go('scan');
  setTimeout(()=>{
    document.getElementById('med-name').value=m.name||'';
    document.getElementById('med-use').value=m.use||'';
    document.getElementById('med-dose').value=m.dosage||'';
    document.getElementById('med-m').checked=m.morning||false;
    document.getElementById('med-a').checked=m.afternoon||false;
    document.getElementById('med-n').checked=m.night||false;
    document.getElementById('med-dur').value=m.duration||'';
    document.getElementById('med-food').value=m.food||'After food';
    document.getElementById('med-doc').value=m.doctor||'';
    document.getElementById('med-notes').value=m.notes||'';
    if(m.photo){ const prev=document.getElementById('med-photo-preview'); if(prev) prev.innerHTML=`<img src="${m.photo}" style="width:100%;border-radius:10px;margin-top:8px"/>`; }
    // Override save to update instead
    const btn=document.querySelector('#scan-content .btn');
    if(btn){ btn.textContent='✅ Update Medicine'; btn.onclick=function(){ updateMedicine(id); }; }
  }, 100);
}
function updateMedicine(id){
  const name=document.getElementById('med-name')?.value.trim();
  if(!name){ alert('Please enter the medicine name.'); return; }
  const meds=getMeds();
  const idx=meds.findIndex(m=>m.id===id);
  if(idx<0) return;
  meds[idx]={...meds[idx], name, use:document.getElementById('med-use')?.value.trim()||'', dosage:document.getElementById('med-dose')?.value.trim()||'', morning:document.getElementById('med-m')?.checked||false, afternoon:document.getElementById('med-a')?.checked||false, night:document.getElementById('med-n')?.checked||false, duration:document.getElementById('med-dur')?.value.trim()||'Ongoing', food:document.getElementById('med-food')?.value||'As directed', doctor:document.getElementById('med-doc')?.value.trim()||'', notes:document.getElementById('med-notes')?.value.trim()||'', photo:window._medPhotoData||meds[idx].photo||'' };
  saveMeds(meds);
  window._editMedId=null; window._medPhotoData=null;
  alert('✅ Medicine updated!');
  go('vault');
}

function saveContact(existingIdx){
  if(window._contactSaving) return; window._contactSaving=true;
  const name  = document.getElementById('ac-name')?.value.trim();
  const phone = document.getElementById('ac-phone')?.value.trim();
  if(!name){ window._contactSaving=false; alert('Please enter a name.'); return; }
  const contacts = getImportantContacts();
  // Duplicate check for new entries only
  if(existingIdx === null || existingIdx === undefined){
    const dup = contacts.find(ct=>ct.name.toLowerCase()===name.toLowerCase() && ct.phone===phone);
    if(dup){ window._contactSaving=false; alert('⚠️ A contact named "'+name+'" with this phone number already exists.'); return; }
  }
  const contact = {
    name,
    rel:   document.getElementById('ac-rel')?.value  || 'Other',
    phone: phone || '',
    note:  document.getElementById('ac-note')?.value.trim() || ''
  };
  if(existingIdx !== null && existingIdx !== undefined){ contacts[existingIdx] = contact; }
  else{ contacts.push(contact); }
  saveImportantContacts(contacts);
  document.getElementById('add-contact-overlay')?.remove();
  window._contactSaving=false;
  rEmergency();
}

function deleteContact(idx){
  if(!confirm('Remove this contact?')) return;
  const contacts = getImportantContacts();
  contacts.splice(idx, 1);
  saveImportantContacts(contacts);
  rEmergency();
}

async function sendChat(preset){
  const inp=$('chat-inp');
  const msg=preset||(inp?inp.value.trim():'');
  if(!msg||isChatLoading)return;
  isChatLoading=true;
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  chatHistory.push({role:'user',text:msg,time:now});
  if(inp)inp.value='';
  const msgs=$('chat-msgs');
  if(msgs){ msgs.innerHTML=chatHistory.map(m=>msgHTML(m)).join('')+typingHTML(); msgs.scrollTop=msgs.scrollHeight; }
  // Small delay for natural feel
  await new Promise(r=>setTimeout(r,400));
  const reply = localChatReply(msg);
  chatHistory.push({role:'bot',text:reply,time:now});
  isChatLoading=false;
  if(msgs){ msgs.innerHTML=chatHistory.map(m=>msgHTML(m)).join(''); msgs.scrollTop=msgs.scrollHeight; }
}

/* -- Shared health score calculator (used by profile card AND score screen) -- */
function calcHealthScore(){
  const meds     = getMeds().filter(m=>m.active!==false);
  const reports  = getReports();
  const vitals   = getVitals();
  const walks    = getWalks();
  const vaccines = getVaccines();
  const medScore      = Math.min(meds.length * 10, 25);
  const reportScore   = Math.min(reports.length * 10, 20);
  const vitalScore    = Math.min(vitals.length * 5, 20);
  const walkScore     = Math.min(walks.length * 3, 15);
  const vaccScore     = Math.min(vaccines.filter(v=>v.status==='done').length * 2, 10);
  const profileScore  = (U.name&&U.age&&U.blood&&U.allergies) ? 10 : 5;
  return Math.min(medScore+reportScore+vitalScore+walkScore+vaccScore+profileScore, 100);
}

function saveExpense(){
  if(window._expSaving) return; window._expSaving = true;
  const name=document.getElementById('exp-name')?.value.trim();
  if(!name){ window._expSaving=false; alert('Please enter a description.'); return; }
  const date=document.getElementById('exp-date')?.value||today();
  const amt=document.getElementById('exp-amt')?.value||'0';
  // Duplicate check: same name + same date + same amount
  const dup=getExpenses().find(e=>e.name.toLowerCase()===name.toLowerCase()&&e.date===date&&e.amount===amt);
  if(dup){ window._expSaving=false; alert('⚠️ An identical expense "'+name+'" on '+fmtDate(date)+' already exists.'); return; }
  const exp={ id:'e'+Date.now(), name, amount:amt, date, status:document.getElementById('exp-status')?.value||'Paid' };
  const exps=getExpenses(); exps.push(exp); saveExpenses(exps);
  document.getElementById('exp-overlay')?.remove();
  window._expSaving=false;
  rInsurance();
}

/* Add days to a date string, return new date string */
function addDays(dateStr, days){
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

/* Days between two date strings */
function daysBetween(a, b){
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

/* Calculate child's age as readable string */
function calcChildAge(dob){
  const ms  = Date.now() - new Date(dob).getTime();
  const days= Math.floor(ms/86400000);
  if(days < 30)  return days + 'd';
  if(days < 365) return Math.floor(days/30) + 'm ' + (days%30) + 'd';
  const yrs = Math.floor(days/365);
  const mos = Math.floor((days%365)/30);
  return yrs + 'y ' + (mos>0?mos+'m':'');
}

/* -- Vaccine Reminder Engine -------------------------------------------------
 * Scans ALL child members' schedules and collects upcoming vaccines that are
 * due in exactly 3 days (i.e. dueDate = today + 3). Fires a notification for
 * each one. Called at app open and pushed to SW for background firing.
 */
function checkVaccineReminders(){
  if(Notification.permission !== 'granted') return;
  if(loadKey('hv_vac_reminders_on') !== '1') return;

  const today_ = today();
  const in3    = addDays(today_, 3);   // reminder fires 3 days before

  (U.members || []).forEach(mem => {
    // Only child members
    const role = (mem.role||'').toLowerCase();
    const age  = parseInt(mem.age)||0;
    if(role !== 'child' && age >= 18) return;

    const key  = 'hv_childvac_' + mem.id;
    let data;
    try { data = JSON.parse(localStorage.getItem(key)||'{}'); } catch(e){ data={}; }
    const dob     = data.dob;
    const records = data.records || {};
    if(!dob) return;

    INDIA_VAC_SCHEDULE.forEach(vac => {
      if(records[vac.id]?.date) return; // already given -- skip
      const dueDate = addDays(dob, vac.offset);
      if(dueDate !== in3) return;       // not due in exactly 3 days -- skip

      // Fire notification
      const title = `💉 Vaccine Due in 3 Days`;
      const body  = `${mem.name}: ${vac.name} is due on ${fmtDate(dueDate)}`;
      fireNotification(title, body, 'vac-' + mem.id + '-' + vac.id);
    });
  });
}

/* Build a flat list of all upcoming (not yet given, due in future) vaccine
   dates across all child members, for the SW to check each morning. */
function buildVacReminderList(){
  const list = [];
  (U.members || []).forEach(mem => {
    const role = (mem.role||'').toLowerCase();
    const age  = parseInt(mem.age)||0;
    if(role !== 'child' && age >= 18) return;

    const key  = 'hv_childvac_' + mem.id;
    let data;
    try { data = JSON.parse(localStorage.getItem(key)||'{}'); } catch(e){ data={}; }
    const dob     = data.dob;
    const records = data.records || {};
    if(!dob) return;

    INDIA_VAC_SCHEDULE.forEach(vac => {
      if(records[vac.id]?.date) return;
      const dueDate = addDays(dob, vac.offset);
      if(dueDate < today()) return; // already past
      list.push({
        memberId:  mem.id,
        memberName:mem.name || 'Child',
        vacId:     vac.id,
        vacName:   vac.name,
        dueDate,
        // reminder fires 3 days before = due date - 3
        reminderDate: addDays(dueDate, -3)
      });
    });
  });
  return list;
}

/* Push the full vaccine reminder list to the SW */
function pushVacRemindersToSW(){
  if(!('serviceWorker' in navigator)) return;
  if(loadKey('hv_vac_reminders_on') !== '1') return;
  const list = buildVacReminderList();
  navigator.serviceWorker.ready.then(reg => {
    if(reg.active) reg.active.postMessage({
      type: 'SET_VAC_REMINDERS',
      reminders: list,
      clientId:  getClientId()
    });
  }).catch(()=>{});
}

  if(window._vacEntrySaving) return; window._vacEntrySaving=true;
  const dateVal = document.getElementById('ve-date')?.value;
  if(!dateVal){ window._vacEntrySaving=false; alert('Please enter the date the vaccine was given.'); return; }

  if(!data.records) data.records = {};

    clinic: document.getElementById('ve-clinic')?.value.trim() || '',

  };
  saveChildVacData(data);
  pushVacRemindersToSW();

  let el = btn;
  while(el && el !== document.body){ if(el.style?.position==='fixed'){ el.remove(); break; } el=el.parentElement; }

  rChildVaccines();

  const data = getChildVacData();
  if(data.records) delete data.records[vacId];
  saveChildVacData(data);
  pushVacRemindersToSW(); // update SW after removing a record
  btn.closest('[style*=fixed]').remove();
  rChildVaccines();
}

function deleteFamilyMember(id){
  if(!confirm('Remove this family member? Their health data stays saved on this device.')) return;
  U.members = (U.members||[]).filter(function(m){ return m.id!==id; });
  if((U.activeMember||'self')===id) U.activeMember='self';
  saveUser(); rFamily();
}

function saveMemberEdit(id){
  const nameField = document.getElementById('fm-name');
  if(nameField && !nameField.value.trim()){ nameField.focus(); nameField.style.borderColor='var(--red)'; alert('Please enter a name for this family member.'); return; }
  var ov     = document.getElementById('family-edit-ov');
  if(!ov) return;
  var name   = (ov.querySelector('#em-name').value||'').trim() || 'Member';
  var age    = (ov.querySelector('#em-age').value||'').trim();
  var avEl   = ov.querySelector('#av-pick div[style*="E3F2FD"]');
  var avatar = avEl ? avEl.dataset.av : '';
  var roleEl = ov.querySelector('#role-pick div[style*="blue"]');
  var role   = roleEl ? roleEl.dataset.role : 'Member';
  var genEl  = ov.querySelector('#gen-pick div[style*="blue"]');
  var gender = genEl ? genEl.dataset.gen : '';

  if(id==='self'){
    U.name=name; U.age=age; U.gender=gender;
    var s=(U.members||[]).find(function(m){ return m.id==='self'; });
    if(s){ s.name=name; s.age=age; s.gender=gender; s.avatar=avatar||smartAvatar('me',gender,age); }
    saveUser(); ov.remove(); rHome(); return;
  }
  var m=(U.members||[]).find(function(x){ return x.id===id; });
  if(!m){ ov.remove(); return; }
  m.name=name; m.age=age; m.gender=gender; m.role=role;
  m.avatar = avatar || smartAvatar(role, gender, age);
  saveUser(); ov.remove();
  if((U.activeMember||'self')===id) rHome(); else rFamily();
}

/* Returns the best-fit emoji for a member based on role + gender + age */
function smartAvatar(role, gender, age){
  var r = (role||'').toLowerCase();
  var g = (gender||'').toLowerCase();
  var a = parseInt(age)||0;

  if(r==='me'){
    if(g==='female') return '👩';
    if(g==='male')   return '👨';
    return '🧑';
  }
  if(r==='child' || r==='baby'){
    if(a<=1)          return '👼';
    if(a<=4)          return '👶';
    if(g==='female')  return a<=12 ? '👧' : '👩';
    if(g==='male')    return a<=12 ? '👦' : '👨';
    return a<=12 ? '🧒' : '🧑';
  }
  if(r==='spouse' || r==='partner'){
    if(g==='female') return '👩';
    if(g==='male')   return '👨';
    return '🧑';
  }
  if(r==='parent' || r==='father' || r==='mother'){
    if(g==='female') return a>=60 ? '👵' : '👩';
    if(g==='male')   return a>=60 ? '👴' : '👨';
    return a>=60 ? '🧓' : '🧑';
  }
  if(r==='grandparent' || r==='grandfather' || r==='grandmother'){
    if(g==='female') return '👵';
    if(g==='male')   return '👴';
    return '🧓';
  }
  if(r==='sibling' || r==='brother' || r==='sister'){
    if(g==='female') return a<18 ? '👧' : '👩';
    if(g==='male')   return a<18 ? '👦' : '👨';
    return a<18 ? '🧒' : '🧑';
  }
  if(r==='elder'){
    if(g==='female') return '👵';
    if(g==='male')   return '👴';
    return '🧓';
  }
  // Other / fallback
  if(g==='female') return '👩';
  if(g==='male')   return '👨';
  return '🧑';
}

function addFamilyMember(){
  var colors=[['#E6F4EA','#1B5E20'],['#FCE4EC','#880E4F'],['#EDE7FE','#311B92'],['#E0F2F1','#004D40'],['#FFF8E1','#F57F17']];
  var ci=(U.members?U.members.length:0)%colors.length;
  var nm={id:'m'+Date.now(),name:'',role:'Child',age:'',gender:'female',avatar:'👶',color:colors[ci][0],textColor:colors[ci][1]};
  if(!U.members) U.members=[];
  U.members.push(nm); saveUser();
  editFamilyMember(nm.id);
}

function buildBodySVG(sex,activePart){
  const f=sex==='female';
  const sk=f?'#FFCBA4':'#F0B88A', sk2=f?'#EBA882':'#D89060', sk3=f?'#D4926A':'#C07840';
  const hr=f?'#3D1F06':'#2A1204', cx=70;
  const gfx=p=>activePart===p?'filter:drop-shadow(0 0 10px rgba(255,130,0,.9))':'';
  const hf=p=>activePart===p?'rgba(255,130,0,.35)':'rgba(255,255,255,.05)';
  const hs=p=>activePart===p?'#FF8800':'rgba(255,255,255,.13)';
  const sw=p=>activePart===p?'2':'1';
  return `<svg viewBox="0 0 140 520" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:170px;height:auto">
<defs>
  <radialGradient id="sg" cx="40%" cy="30%" r="70%"><stop offset="0%" stop-color="${sk}"/><stop offset="100%" stop-color="${sk2}"/></radialGradient>
  <radialGradient id="bg2" cx="50%" cy="45%" r="55%"><stop offset="0%" stop-color="rgba(26,115,232,.07)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
</defs>
<ellipse cx="70" cy="260" rx="78" ry="265" fill="url(#bg2)"/>
<!-- HEAD -->
<g onclick="pickPart('brain',this)" style="cursor:pointer;${gfx('brain')}">
  <ellipse cx="${cx}" cy="33" rx="24" ry="28" fill="${hf('brain')}" stroke="${hs('brain')}" stroke-width="${sw('brain')}"/>
  ${f?`<ellipse cx="${cx}" cy="29" rx="19" ry="22" fill="url(#sg)" stroke="${sk2}" stroke-width=".7"/>
    <path d="M51 19 Q70 7 89 19 Q89 2 70 1 Q51 2 51 19z" fill="${hr}"/>
    <path d="M51 19 Q47 27 49 42 Q53 37 57 33" fill="${hr}"/>
    <path d="M89 19 Q93 27 91 42 Q87 37 83 33" fill="${hr}"/>`
  :`<ellipse cx="${cx}" cy="29" rx="19" ry="22" fill="url(#sg)" stroke="${sk2}" stroke-width=".7"/>
    <path d="M51 16 Q70 11 89 16 Q89 8 70 6 Q51 8 51 16z" fill="${hr}"/>
    <path d="M58 24 L66 22 M74 22 L82 24" fill="none" stroke="${sk3}" stroke-width="1.2"/>
    <path d="M56 46 Q70 53 84 46" fill="none" stroke="${sk3}" stroke-width="1" opacity=".5"/>`}
  <circle cx="62" cy="30" r="2.2" fill="#5D3A1A"/><circle cx="78" cy="30" r="2.2" fill="#5D3A1A"/>
  <path d="M67 37 Q70 41 73 37" fill="none" stroke="${sk3}" stroke-width="1.2" stroke-linecap="round"/>

function setSex(sex){
  bodySex=sex;
  const bf=document.getElementById('btn-female'),bm=document.getElementById('btn-male');
  if(bf){bf.style.background=sex==='female'?'linear-gradient(135deg,#E91E63,#AD1457)':'transparent';bf.style.color=sex==='female'?'#fff':'rgba(255,255,255,.4)';}
  if(bm){bm.style.background=sex==='male'?'linear-gradient(135deg,#1565C0,#0D47A1)':'transparent';bm.style.color=sex==='male'?'#fff':'rgba(255,255,255,.4)';}
  const bm2=document.getElementById('bmodel');
  if(bm2) bm2.innerHTML=buildBodySVG(sex,selPart);
}

function searchBody(q){
  q=(q||'').toLowerCase().trim(); if(!q) return;
  const res=[];
  Object.entries(bpData).forEach(([k,p])=>{
    if(p.n.toLowerCase().includes(q)||p.sub.toLowerCase().includes(q)) res.push({k,si:null,sc:3});
    p.s.forEach((s,i)=>{
      let score=0;
      if(s.t.toLowerCase().includes(q)) score=4;
      else if(s.s.toLowerCase().includes(q)) score=3;
      else if((s.c||'').toLowerCase().includes(q)) score=2;
      else if((s.r||'').toLowerCase().includes(q)) score=1;
      if(score) res.push({k,si:i,sc:score});
    });
  });
  res.sort((a,b)=>b.sc-a.sc);
  if(!res.length) return;
  const best=res[0];
  pickPart(best.k,null);
  if(best.si!==null) setTimeout(()=>showSymptomDetail(best.k,best.si),350);
}

    const t=[m.morning?'M':'',m.afternoon?'A':'',m.night?'N':''].filter(Boolean).join('-');
    return (m.name+(m.dosage?' '+m.dosage:'')+' — '+(t||'As directed')+(m.food?' ('+m.food+')':'')+(m.doctor?' [Dr.'+m.doctor+']':'')).trim();
  }).join('\n');

  const vitalsLines = Object.values(latestV).map(v=>`${v.label||v.type}: ${v.value} (${fmtDate(v.date)})`).join('\n') || 'None recorded';

  const abnormalTests = [];
  reports.slice(-5).forEach(r=>{ (r.results||[]).filter(t=>t.status!=='NORMAL').forEach(t=>{ abnormalTests.push(`${t.name}: ${t.value} ${t.unit} [${t.status}]`); }); });

  const recentSymptoms = getVaultItems().filter(v=>v.type==='symptom').slice(0,3).map(v=>`${v.title} (${fmtDate(v.date)})`);

  const nextAppt = appts[0];
  const apptLine = nextAppt
    ? `Dr. ${nextAppt.doctor} · ${nextAppt.specialty||'General'} · ${new Date(nextAppt.datetime).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})} · ${nextAppt.hospital||''}`
    : 'No upcoming appointment';

  const contactLines = contacts.length
    ? contacts.map(con=>`${con.name} (${con.rel}) · ${con.phone}`).join('\n')
    : (U.ecName ? `${U.ecName} (${U.ecRel||'--'}) · ${U.ecPhone||'--'}` : 'None set');

  window._doctorSummaryText = [
    `HealthVault — Doctor's Visit Summary`,
    `Generated: ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}`,
    '',
    'PATIENT',
    `Name: ${name} | Age: ${age} yrs | Gender: ${gender} | Blood Group: ${blood}`,
    `Allergies: ${allergy}`,
    `Conditions: ${conditions}`,
    '',
    'NEXT APPOINTMENT',
    apptLine,
    '',
    `CURRENT MEDICINES (${meds.length})`,
    medLines||'None',
    '',
    'RECENT VITALS',
    vitalsLines,
    ...(abnormalTests.length ? ['\nABNORMAL LAB VALUES', ...abnormalTests] : []),
    ...(recentSymptoms.length ? ['\nRECENT SYMPTOMS', ...recentSymptoms] : []),
    ...(note ? ['\nNOTES', note] : []),
    '',
    'EMERGENCY CONTACTS',
    contactLines,
    '',
    'Generated by HealthVault'
  ].join('\n');
}

        <button id="wt-stop" onclick="stopWalk()" style="background:var(--red);color:#fff;border:none;border-radius:13px;padding:13px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:none">⏹ Stop & Save</button>
      </div>
    </div>

      <div class="at-stat"><div class="at-sv">${todayKm.toFixed(1)}</div><div class="at-sl">km today</div></div>
      <div class="at-stat"><div class="at-sv">${weekKm.toFixed(1)}</div><div class="at-sl">km this week</div></div>
      <div class="at-stat"><div class="at-sv">${hist.length}</div><div class="at-sl">total walks</div></div>
    </div>
    <div class="sec" style="padding:0">Recent Walks</div>
    ${hist.length===0?'<div class="card" style="cursor:default;text-align:center;color:var(--g4)">No walks yet. Press Start to begin! 🚶</div>':
      hist.slice().reverse().slice(0,8).map(w=>`<div class="vitem"><div class="vico">🏃</div><div style="flex:1"><div class="vt">${w.km.toFixed(2)} km . ${w.duration}</div><div class="vs">${w.date} . ${w.cal} cal</div></div><span class="badge bg">${w.km>=5?'Great!':w.km>=2?'Good':'Short'}</span></div>`).join('')}
    <div class="pb"></div>
  </div></div>`;
}
function startWalk(){
  if(!navigator.geolocation){alert('GPS not available.');return;}
  walkState={active:true,watchId:null,coords:[],startTime:Date.now(),distance:0,calories:0};
  $('wt-start').style.display='none'; $('wt-stop').style.display='';
  $('wt-status').textContent='🟢 GPS tracking active…'; $('wt-status').style.color='var(--green)';
  walkState.watchId=navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy}=pos.coords; if(accuracy>50)return;
    const pts=walkState.coords;
    if(pts.length>0){const prev=pts[pts.length-1];const d=haversine(prev.lat,prev.lng,lat,lng);if(d>0.003&&d<0.1){walkState.distance+=d;walkState.calories=Math.round(walkState.distance*65);if($('wt-dist'))$('wt-dist').textContent=walkState.distance.toFixed(2);if($('wt-cal'))$('wt-cal').textContent=walkState.calories;}}
    pts.push({lat,lng});
  },()=>{},{ enableHighAccuracy:true,maximumAge:2000,timeout:10000});
  walkState._timer=setInterval(()=>{if(!$('wt-time')){clearInterval(walkState._timer);return;}const e=Math.floor((Date.now()-walkState.startTime)/1000);$('wt-time').textContent=Math.floor(e/60)+':'+(e%60<10?'0':'')+e%60;},1000);
}
function stopWalk(){
  if(walkState.watchId!==null)navigator.geolocation.clearWatch(walkState.watchId);
  if(walkState._timer)clearInterval(walkState._timer);
  const e=Math.floor((Date.now()-walkState.startTime)/1000);
  const duration=Math.floor(e/60)+'m '+(e%60)+'s';
  if(walkState.distance>0.01){const hist=getWalks();hist.push({date:new Date().toDateString(),km:walkState.distance,duration,cal:walkState.calories});saveWalks(hist.slice(-365));}
  walkState={active:false,watchId:null,coords:[],startTime:null,distance:0,calories:0};
  rActivity();
}
function haversine(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function selectDocCat(cat, el){
  window._docSelectedCat = cat;
  document.querySelectorAll('#dcat-grid [data-cat]').forEach(function(d){
    d.style.borderColor='var(--g2)'; d.style.color='var(--g5)'; d.style.background='var(--g1)';
  });
  el.style.borderColor='var(--blue)'; el.style.color='var(--blue)'; el.style.background='var(--bl)';
}

function handleDocFile(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    window._docFileData = e.target.result;
    const preview = document.getElementById('doc-preview');
    if(preview){
      preview.innerHTML = `<img src="${e.target.result}" style="width:100%;border-radius:10px;max-height:180px;object-fit:cover;border:.5px solid var(--g2)"/>
        <div style="font-size:11px;color:var(--green);font-weight:700;margin-top:6px;text-align:center">✅ Photo ready -- tap Save below</div>`;
    }
    const saveBtn = document.getElementById('doc-save-btn');
    if(saveBtn){
      saveBtn.innerHTML = `<button onclick="saveDocPhoto()" style="width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px">✅ Save Document</button>`;
    }
  };
  reader.readAsDataURL(file);
}

function saveDocPhoto(){
  const fileData = window._docFileData;
  if(!fileData){ alert('Please take or choose a photo first.'); return; }
  const label = (document.getElementById('dlabel')?.value||'').trim() || (window._docSelectedCat||'Document');
  const docCat = window._docSelectedCat || 'Other';
  const photos = getPhotos();
  photos.push({ id:'ph'+Date.now(), cat:'doc', docCat, data:fileData, label, date:today() });
  savePhotos(photos);
  window._docFileData = null;
  document.getElementById('doc-add-overlay')?.remove();
  rDocLocker();
}

/* == VITALS TRACKER == */
function rVitals(){
  const vitals = getVitals();
  const types = [
    {key:'bp',     icon:'❤️',  label:'Blood Pressure', unit:'mmHg',   placeholder:'e.g. 120/80',  color:'var(--red)'},
    {key:'sugar',  icon:'🩸',  label:'Blood Sugar',    unit:'mg/dL',  placeholder:'e.g. 95',      color:'var(--amber)'},
    {key:'weight', icon:'⚖️',  label:'Weight',         unit:'kg',     placeholder:'e.g. 68',      color:'var(--blue)'},
    {key:'temp',   icon:'🌡️',  label:'Temperature',    unit:'°C',     placeholder:'e.g. 98.6',    color:'var(--orange)'},
    {key:'spo2',   icon:'💨',  label:'SpO2 / Oxygen',  unit:'%',      placeholder:'e.g. 98',      color:'var(--teal)'},
    {key:'pulse',  icon:'💓',  label:'Heart Rate',     unit:'bpm',    placeholder:'e.g. 72',      color:'var(--pink)'},
  ];

  // Get latest reading per type
  const latest = {};
  vitals.forEach(function(v){ if(!latest[v.type] || v.date > latest[v.type].date) latest[v.type]=v; });

  // Normal ranges for each type
  const ranges = {
    bp:    { check: function(v){ const p=v.split('/'); const s=parseInt(p[0]),d=parseInt(p[1]); if(s>140||d>90) return 'HIGH'; if(s<90||d<60) return 'LOW'; return 'NORMAL'; }},
    sugar: { check: function(v){ const n=parseFloat(v); if(n>140) return 'HIGH'; if(n<70) return 'LOW'; return 'NORMAL'; }},
    weight:{ check: function(v){ return 'NORMAL'; }},
    temp:  { check: function(v){ const n=parseFloat(v); if(n>37.5) return 'HIGH'; if(n<36.0) return 'LOW'; return 'NORMAL'; }},
    spo2:  { check: function(v){ const n=parseFloat(v); if(n<95) return 'LOW'; return 'NORMAL'; }},
    pulse: { check: function(v){ const n=parseFloat(v); if(n>100) return 'HIGH'; if(n<60) return 'LOW'; return 'NORMAL'; }},
  };

  SCR.innerHTML=`<div class="sc">
  <div class="brow"><div class="bk" onclick="goBack()">←</div><div style="flex:1"><div class="bk-t">Vitals Tracker</div><div class="bk-s">Log and monitor your health readings</div></div></div>
  <div class="p16" style="padding-top:14px">

    <!-- Quick log cards -->
    <div style="font-size:13px;font-weight:700;color:var(--g6);margin-bottom:10px">📊 Latest Readings</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px">
      ${types.map(function(t){
        const l = latest[t.key];
        const status = l ? ranges[t.key].check(l.value) : null;
        const statusColor = status==='HIGH'?'var(--red)':status==='LOW'?'var(--amber)':'var(--green)';
        return `<div style="background:#fff;border-radius:12px;padding:12px;border:.5px solid var(--g2);cursor:pointer" onclick="showLogVital('${t.key}','${t.label}','${t.unit}','${t.placeholder}','${t.color}')">
          <div style="font-size:20px;margin-bottom:5px">${t.icon}</div>
          <div style="font-size:11px;font-weight:700;color:var(--g5);margin-bottom:4px">${t.label}</div>
          ${l
            ? `<div style="font-size:16px;font-weight:800;color:${statusColor}">${l.value}</div>
               <div style="font-size:10px;color:var(--g4)">${t.unit} . ${fmtDate(l.date)}</div>
               <div style="font-size:10px;font-weight:700;color:${statusColor};margin-top:2px">${status}</div>`
            : `<div style="font-size:13px;color:var(--g4)">-- Tap to log</div>`}
        </div>`;
      }).join('')}
    </div>

    <!-- Recent history -->
    <div style="font-size:13px;font-weight:700;color:var(--g6);margin-bottom:10px">📋 Recent History</div>
    ${vitals.length===0
      ? '<div style="text-align:center;padding:20px;color:var(--g4);background:var(--g1);border-radius:12px;font-size:13px">No readings yet. Tap any card above to log a reading.</div>'
      : vitals.slice().reverse().slice(0,20).map(function(v){
          const t = types.find(function(x){ return x.key===v.type; }) || {icon:'📊',label:v.type,unit:'',color:'var(--blue)'};
          const status = ranges[v.type] ? ranges[v.type].check(v.value) : 'NORMAL';
          const sc = status==='HIGH'?'var(--rl)':status==='LOW'?'var(--al)':'var(--gl)';
          const tc = status==='HIGH'?'#C5221F':status==='LOW'?'#B06000':'#1B5E20';
          return `<div class="vitem" style="position:relative">
            <div class="vico">${t.icon}</div>
            <div style="flex:1">
              <div class="vt">${t.label}: <strong style="color:${tc}">${v.value} ${t.unit}</strong></div>
              <div class="vs">${v.note||''} . ${fmtDate(v.date)}</div>
            </div>
            <span class="badge" style="background:${sc};color:${tc};margin-right:6px">${status}</span>
            <button onclick="deleteVital('${v.id}')" style="background:var(--rl);border:none;border-radius:7px;padding:4px 7px;font-size:11px;cursor:pointer;color:#C5221F">🗑️</button>
          </div>`;
        }).join('')
    }
    <div class="pb"></div>
  </div></div>`;
}

function showLogVital(key, label, unit, placeholder, color){
  document.getElementById('vital-overlay')?.remove(); // prevent stacking
  const overlay = document.createElement('div');
  overlay.id = 'vital-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
  overlay.innerHTML=`<div style="background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:480px">
    <div style="width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:0 auto 18px"></div>
    <div style="font-size:17px;font-weight:800;color:var(--g6);margin-bottom:16px">Log ${label}</div>
    <div class="fld">
      <div class="flbl">Reading (${unit})</div>
      <input class="inp" id="vital-val" placeholder="${placeholder}" type="text" inputmode="decimal" style="font-size:20px;font-weight:700;text-align:center"/>
    </div>
    <div class="fld">
      <div class="flbl">Date</div>
      <input class="inp" id="vital-date" type="date" value="${today()}"/>
    </div>
    <div class="fld">
      <div class="flbl">Note (optional)</div>
      <input class="inp" id="vital-note" placeholder="e.g. After meal, Fasting, Morning…"/>
    </div>
    <button class="btn" onclick="saveVital('${key}','${label}')">✅ Save Reading</button>
    <button class="btn2" onclick="document.getElementById('vital-overlay').remove()">Cancel</button>
  </div>`;
  overlay.addEventListener('click',function(e){ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  setTimeout(function(){ document.getElementById('vital-val')?.focus(); },100);
}

function saveVital(key, label){
  if(window._vitalSaving) return; window._vitalSaving = true;
  const val = (document.getElementById('vital-val')?.value||'').trim();
  if(!val){ window._vitalSaving=false; alert('Please enter a reading.'); return; }
  const entry = {
    id: 'vt'+Date.now(), type:key, label:label,
    value:val, date:document.getElementById('vital-date')?.value||today(),
    note:document.getElementById('vital-note')?.value||''
  };
  const vitals = getVitals();
  vitals.push(entry); saveVitals(vitals);
  const vault=getVaultItems();
  vault.unshift({ id:'v'+Date.now(), type:'vital', icon:'📊', title:label+': '+val, subtitle:entry.note||'Vital reading logged', date:entry.date });
  saveVaultItems(vault);
  if(U.email && !U.isGuest){
    appsScriptPost('saveVital',{ email:U.email, userName:U.name, type:key, value:val, unit:'', note:entry.note }).catch(()=>{});
  }
  document.getElementById('vital-overlay')?.remove();
  window._vitalSaving = false;
  rVitals();
}

function deleteVital(id){
  if(!confirm('Delete this reading?')) return;
  saveVitals(getVitals().filter(function(v){ return v.id!==id; }));
  rVitals();
}

function rSearch(){
  SCR.innerHTML=`<div class="sc">
  <div class="brow"><div class="bk" onclick="goBack()">←</div><div style="flex:1"><div class="bk-t">Search</div><div class="bk-s">Search medicines, reports, vault entries</div></div></div>
  <div style="padding:12px 14px">
    <div class="srch" style="margin:0 0 14px">
      <svg width="16" height="16" fill="none" stroke="var(--g4)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="search-inp" class="inp" placeholder="Search medicines, reports, vault…" style="border:none;background:transparent;padding:0;font-size:14px" oninput="runSearch(this.value)" autofocus/>
    </div>
    <div id="search-results">
      <div style="text-align:center;padding:30px;color:var(--g4)">
        <div style="font-size:32px;margin-bottom:8px">🔍</div>
        <div style="font-size:13px">Type to search across all your health data</div>
      </div>
    </div>
  </div></div>`;
  setTimeout(function(){ document.getElementById('search-inp')?.focus(); },100);
}

function runSearch(q){
  const res = document.getElementById('search-results');
  if(!res) return;
  q = (q||'').toLowerCase().trim();
  if(!q){
    res.innerHTML='<div style="text-align:center;padding:20px;color:var(--g4);font-size:13px">Type to search…</div>';
    return;
  }
  const results = [];

  // Search medicines
  getMeds().forEach(function(m){
    if((m.name+' '+m.dosage+' '+m.notes+' '+m.doctor).toLowerCase().includes(q)){
      results.push({ icon:'💊', title:m.name+' '+m.dosage, subtitle:m.food+' . '+m.duration, action:"go('scan')", cat:'Medicine' });
    }
  });

  // Search reports
  getReports().forEach(function(r){
    if((r.name+' '+r.lab).toLowerCase().includes(q)){
      results.push({ icon:'🧪', title:r.name, subtitle:fmtDate(r.date)+' . '+r.lab, action:"go('lab')", cat:'Lab Report' });
    }
    (r.results||[]).forEach(function(t){
      if(t.name.toLowerCase().includes(q)){
        results.push({ icon:'🔬', title:t.name+': '+t.value+' '+t.unit, subtitle:r.name+' . '+t.status, action:"go('lab')", cat:'Lab Result' });
      }
    });
  });

  // Search vitals
  getVitals().forEach(function(v){
    if((v.label+' '+v.value+' '+v.note).toLowerCase().includes(q)){
      results.push({ icon:'📊', title:v.label+': '+v.value, subtitle:fmtDate(v.date)+' . '+(v.note||''), action:"go('vitals')", cat:'Vital' });
    }
  });

  // Search vault
  getVaultItems().forEach(function(v){
    if((v.title+' '+(v.subtitle||'')).toLowerCase().includes(q)){
      results.push({ icon:v.icon||'📋', title:v.title, subtitle:v.subtitle||'', action:"go('vault')", cat:'Vault' });
    }
  });

  // Search vaccines
  getVaccines().forEach(function(v){
    if((v.name+' '+v.clinic).toLowerCase().includes(q)){
      results.push({ icon:'💉', title:v.name, subtitle:fmtDate(v.date)+' . '+v.clinic, action:"go('vaccines')", cat:'Vaccine' });
    }
  });

  if(!results.length){
    res.innerHTML='<div style="text-align:center;padding:24px;color:var(--g4)"><div style="font-size:28px;margin-bottom:8px">😕</div><div style="font-size:13px">No results found for "<b>'+q+'</b>"</div></div>';
    return;
  }

  res.innerHTML='<div style="font-size:11px;color:var(--g4);margin-bottom:10px;font-weight:700">'+results.length+' results</div>'+
    results.map(function(r){
      return `<div class="vitem" onclick="${r.action}" style="cursor:pointer">
        <div class="vico">${r.icon}</div>
        <div style="flex:1"><div class="vt">${r.title}</div><div class="vs">${r.subtitle}</div></div>
        <div style="font-size:10px;color:var(--g4);background:var(--g1);padding:3px 8px;border-radius:10px;white-space:nowrap">${r.cat}</div>
      </div>`;
    }).join('');
}

/* == HEALTH SCORE == */
function rHealthScore(){
  const meds     = getMeds().filter(m=>m.active!==false);
  const reports  = getReports();
  const vitals   = getVitals();
  const vaccines = getVaccines();
  const walks    = getWalks();

  // Use same formula as calcHealthScore() so profile card and this screen always match
  const medScore      = Math.min(meds.length * 10, 25);
  const reportScore   = Math.min(reports.length * 10, 20);
  const vitalScore    = Math.min(vitals.length * 5, 20);
  const walkScore     = Math.min(walks.length * 3, 15);
  const vaccScore     = Math.min(vaccines.filter(function(v){ return v.status==='done'; }).length * 2, 10);
  const profileScore  = (U.name&&U.age&&U.blood&&U.allergies) ? 10 : 5;

  const total = Math.min(medScore+reportScore+vitalScore+walkScore+vaccScore+profileScore, 100);
  const grade = total>=80?'A':total>=60?'B':total>=40?'C':'D';
  const gradeColor = total>=80?'var(--green)':total>=60?'var(--blue)':total>=40?'var(--amber)':'var(--red)';
  const gradeMsg = total>=80?'Excellent -- you are actively managing your health!':
                   total>=60?'Good -- a few more logs will improve your score':
                   total>=40?'Fair -- try logging vitals and medicines regularly':
                   'Getting started -- add medicines, vitals and reports to improve';

  const components = [
    { label:'Medicines logged',   score:medScore,    max:25, icon:'💊', tip:'Add your current medicines in Medicines tab' },
    { label:'Lab reports logged', score:reportScore, max:20, icon:'🧪', tip:'Upload your lab reports in Lab tab' },
    { label:'Vitals recorded',    score:vitalScore,  max:20, icon:'📊', tip:'Log BP, sugar, weight in Vitals Tracker' },
    { label:'Walks tracked',      score:walkScore,   max:15, icon:'🏃', tip:'Track your walks in Activity Tracker' },
    { label:'Vaccines logged',    score:vaccScore,   max:10, icon:'💉', tip:'Log vaccinations in Vaccines tab' },
    { label:'Profile complete',   score:profileScore,max:10, icon:'👤', tip:'Complete your profile with age, blood group and allergies' },
  ];

  SCR.innerHTML=`<div class="sc">
  <div class="brow"><div class="bk" onclick="goBack()">←</div><div style="flex:1"><div class="bk-t">Health Score</div><div class="bk-s">Your health data completeness score</div></div></div>
  <div class="p16" style="padding-top:20px">

    <!-- Big score circle -->
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:130px;height:130px;border-radius:50%;background:${gradeColor};display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,.15)">
        <div style="font-size:40px;font-weight:900;color:#fff;line-height:1">${total}</div>
        <div style="font-size:14px;color:rgba(255,255,255,.85);font-weight:700">/100</div>
      </div>
      <div style="font-size:28px;font-weight:900;color:${gradeColor};margin-top:12px">Grade ${grade}</div>
      <div style="font-size:13px;color:var(--g5);margin-top:6px;line-height:1.5;max-width:280px;margin-left:auto;margin-right:auto">${gradeMsg}</div>
    </div>

    <!-- Score breakdown -->
    <div style="font-size:13px;font-weight:700;color:var(--g6);margin-bottom:12px">Score Breakdown</div>
    ${components.map(function(c){
      const pct = Math.round((c.score/c.max)*100);
      const barColor = pct>=80?'var(--green)':pct>=50?'var(--blue)':'var(--amber)';
      return `<div style="background:#fff;border-radius:12px;padding:13px;margin-bottom:9px;border:.5px solid var(--g2)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px">${c.icon}</span>
            <span style="font-size:13px;font-weight:700;color:var(--g6)">${c.label}</span>
          </div>
          <span style="font-size:13px;font-weight:800;color:${barColor}">${c.score}/${c.max}</span>
        </div>
        <div style="height:6px;background:var(--g2);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width .5s"></div>
        </div>
        ${c.score<c.max?`<div style="font-size:11px;color:var(--g4);margin-top:6px">💡 ${c.tip}</div>`:'<div style="font-size:11px;color:var(--green);margin-top:6px">✅ Well done!</div>'}
      </div>`;
    }).join('')}

    <div class="card" style="background:var(--bl);border:1px solid #C5D9F8;cursor:default">
      <div style="font-size:12px;font-weight:700;color:var(--bd);margin-bottom:5px">ℹ️ About this score</div>
      <div style="font-size:11px;color:#185EA5;line-height:1.6">This score measures how well you are tracking your health data in HealthVault. It is not a medical assessment of your actual health status.</div>
    </div>
    <div class="pb"></div>
  </div></div>`;
}

// Strategy:

(function startApp(){
  const saved = loadUser();

  // Case 1: fully valid saved session — go home immediately
  if(saved && saved.name && saved.members){
    U = saved;
    runDailyCleanup();
    // Re-warm SW reminders after app restore
    if('serviceWorker' in navigator){
      navigator.serviceWorker.ready.then(reg=>{
        if(reg.active) reg.active.postMessage({type:'CHECK_ALARMS', clientId:getClientId()});
      }).catch(()=>{});
    }
    go('home');
    return;
  }

  // Case 2: saved user exists but may be missing members (older app version)
  // Fix members array if missing then go home — no cloud call needed
  if(saved && saved.name){
    U = saved;
    if(!U.members || !U.members.length){
      U.members = [{
        id:'self', name:U.name, role:'Me',
        age:U.age||'', gender:U.gender||'', avatar:'🧑',
        color:'#E8F0FE', textColor:'#0D47A1'
      }];
      try{ localStorage.setItem('hv_user', JSON.stringify(U)); }catch(e){}
    }
    runDailyCleanup();
    go('home');
    return;
  }

  // Case 2b: hv_user was cleared (e.g. Safari memory pressure) but accounts registry still exists
  // Try to restore from accounts registry before hitting the cloud
  const lastEmailForRestore = loadKey('hv_last_email');
  if(lastEmailForRestore){
    const accts = loadAccounts();
    if(accts[lastEmailForRestore] && accts[lastEmailForRestore].userData && accts[lastEmailForRestore].userData.name){
      U = accts[lastEmailForRestore].userData;
      if(!U.members || !U.members.length){
        U.members = [{id:'self',name:U.name,role:'Me',age:U.age||'',gender:U.gender||'',avatar:'🧑',color:'#E8F0FE',textColor:'#0D47A1'}];
      }
      try{ localStorage.setItem('hv_user', JSON.stringify(U)); }catch(e){}
      runDailyCleanup();
      go('home');
      return;
    }
  }

  // Case 3: no saved session but we have a last email — try cloud with 4s timeout
  const lastEmail = loadKey('hv_last_email');
  if(lastEmail){
    TB.style.display='none'; SN.style.display='none';
    SCR.innerHTML='<div class="splash sc"><div class="sp-logo"><svg viewBox="0 0 24 24"><path d="M12 2a4 4 0 0 1 4 4v2H8V6a4 4 0 0 1 4-4z"/><path d="M8 8H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-3"/><circle cx="12" cy="15" r="2"/></svg></div><div class="sp-name">HealthVault</div><div class="sp-tag" style="margin-top:24px;font-size:13px">Restoring your session…</div></div>';
    let resolved = false;
    // 4-second timeout — if cloud is slow or offline, go to splash
    const timer = setTimeout(function(){
      if(!resolved){ resolved=true; go('splash'); }
    }, 4000);
    loadUserFromCloud(lastEmail).then(function(cloudUser){
      if(resolved) return;
      resolved = true;
      clearTimeout(timer);
      if(cloudUser && cloudUser.name){
        U = cloudUser;
        if(!U.members || !U.members.length){
          U.members = [{id:'self',name:U.name,role:'Me',age:U.age||'',gender:U.gender||'',avatar:'🧑',color:'#E8F0FE',textColor:'#0D47A1'}];
        }
        try{ localStorage.setItem('hv_user', JSON.stringify(U)); }catch(e){}
        runDailyCleanup();
        go('home');
      } else {
        go('splash');
      }
    }).catch(function(){
      if(!resolved){ resolved=true; clearTimeout(timer); go('splash'); }
    });
    return;
  }

  // Case 4: fresh install
  go('splash');
})();

(function hideStatusOnDevice(){

    const isNarrow     = window.innerWidth <= 480;

                         window.matchMedia('(display-mode:standalone)').matches;

  check();

})();

  window.addEventListener('beforeinstallprompt', (e) => {

    if (!localStorage.getItem('pwa-dismissed')) {
      setTimeout(() => banner.classList.add('show'), 2000);
    }
  });

  // User clicks Install
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    banner.classList.remove('show');
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('PWA install:', outcome);

  });

  // User dismisses banner
  dismissBtn.addEventListener('click', () => {

  });

  // Hide banner if already installed
  window.addEventListener('appinstalled', () => {

  // ── Prevent pull-to-refresh on Android Chrome ──────────────────────────────
  // Android Chrome fires a native pull-to-refresh when the user drags down
  // from the top of the page, reloading the entire PWA and showing a blank screen.
  // Setting overscroll-behavior:none in CSS handles most cases, but the JS
  // below catches any edge cases where the body itself is being dragged.
  (function blockPullToRefresh(){
    var lastY = 0;
    document.addEventListener('touchstart', function(e){
      if(e.touches.length === 1) lastY = e.touches[0].clientY;
    }, {passive: true});
    document.addEventListener('touchmove', function(e){
      var scr = document.getElementById('SCR');
      var y = e.touches[0].clientY;
      var draggingDown = y > lastY;
      // Only block if the scrollable screen div is at the top AND user drags down
      if(draggingDown && scr && scr.scrollTop === 0){
        e.preventDefault();
      }
      lastY = y;
    }, {passive: false});
  })();

function toggleMedTaken(slotId, el){
  const taken=getTakenToday();
  const idx=taken.indexOf(slotId);
  if(idx>=0){ taken.splice(idx,1); el.classList.remove('taken'); el.textContent=''; }
  else{ taken.push(slotId); el.classList.add('taken'); el.textContent='✓'; }
  setTakenToday(taken);
  // Update name strikethrough
  const nameEl=el.closest('.med-slot')?.querySelector('.med-slot-name');
  if(nameEl) nameEl.style.textDecoration=taken.includes(slotId)?'line-through':'none';
  // Update header count
  const widget=el.closest('.med-widget');
  if(widget){
    const allSlots=widget.querySelectorAll('.med-slot');
    const total=allSlots.length;
    const takenNow=getTakenToday().length;
    const pct=total?Math.round((takenNow/total)*100):0;
    const prog=widget.querySelector('.med-widget-prog');
    if(prog) prog.textContent=`${takenNow}/${total} taken · ${pct}%`;
    const bar=widget.querySelector('[style*="height:3px"] > div');
    if(bar) bar.style.width=pct+'%';
  }
  // Tell the SW which slots are fully taken so it won't fire those notifications
  syncTakenSlotsToSW();
}

// Build per-slot taken status and push to SW so it skips already-taken slots
function syncTakenSlotsToSW(){
  if(!('serviceWorker' in navigator)) return;
  const meds    = getMeds().filter(m=>m.active!==false);
  const taken   = getTakenToday();
  const slotKeys= ['morning','afternoon','night'];
  // A slot is fully done if every medicine in that slot has been marked taken
  const doneSots = slotKeys.filter(slot=>{
    const slotMeds = meds.filter(m=>m[slot]);
    if(!slotMeds.length) return false; // no meds in this slot
    return slotMeds.every(m=>taken.includes(m.id+'-'+slot[0]));
  });
  navigator.serviceWorker.ready.then(reg=>{
    if(reg.active) reg.active.postMessage({
      type: 'SET_TAKEN_SLOTS',
      date: today(),
      takenSlots: doneSots,
      clientId: getClientId()
    });
  }).catch(()=>{});
}

/* ══ 2. SWIPE TO DELETE ══ */
function addSwipeDelete(el, onDelete){
  let startX=0, currentX=0, swiping=false;
  const threshold=80, autoThreshold=160;
  el.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;swiping=true;},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!swiping) return;
    currentX=e.touches[0].clientX-startX;
    if(currentX<0){
      el.style.transform=`translateX(${Math.max(currentX,-180)}px)`;
      e.preventDefault();
    }
  },{passive:false});
  el.addEventListener('touchend',()=>{
    swiping=false;
    if(currentX<-autoThreshold){ onDelete(); }
    else if(currentX<-threshold){ el.style.transform='translateX(-80px)'; }
    else{ el.style.transform=''; }
    currentX=0;
  });
}

async function requestNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  const p=await Notification.requestPermission();
  return p==='granted';
}
function fireNotification(title, body, tag){
  if(Notification.permission!=='granted') return;
  // Use a path relative to the current page origin+path so it works on any hostname
  const iconPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/icon-192.png';
  try{
    if('serviceWorker' in navigator && navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification(title,{body,icon:iconPath,tag:tag||'hv',badge:iconPath,vibrate:[200,100,200]});
      });
    } else {
      new Notification(title,{body,icon:iconPath,tag:tag||'hv'});
    }
  }catch(e){}
}

let _reminderTimers=[];
function clearAllReminderTimers(){ _reminderTimers.forEach(t=>clearTimeout(t)); _reminderTimers=[]; }

function scheduleAllMedReminders(){
  clearAllReminderTimers();
  const enabled=loadKey('hv_reminders_on')==='1';
  if(!enabled) return;
  if(Notification.permission!=='granted') return;
  const meds=getMeds();
  const slots=[{key:'morning',hour:8,label:'🌅 Morning'},
               {key:'afternoon',hour:14,label:'☀️ Afternoon'},
               {key:'night',hour:21,label:'🌙 Night'}];
  const now=new Date();

  // If SW is active it handles notifications independently — page-side
  // setTimeout is still set as a fallback for browsers without SW support,
  // but we don't fire if the SW will handle it to avoid duplicates.
  const swActive = 'serviceWorker' in navigator && !!navigator.serviceWorker.controller;

  slots.forEach(slot=>{
    const due=meds.filter(m=>m[slot.key]);
    if(!due.length) return;
    const fireAt=new Date();
    fireAt.setHours(slot.hour,0,0,0);
    // If today's slot already passed, schedule for tomorrow
    if(fireAt<=now) fireAt.setDate(fireAt.getDate()+1);
    const ms=fireAt-now;
    const t=setTimeout(()=>{
      // Re-arm for tomorrow before firing
      scheduleAllMedReminders();
      if(!swActive){
        const names=getMeds().filter(m=>m[slot.key]).map(m=>m.name+(m.dosage?' '+m.dosage:'')).join(', ');
        if(names) fireNotification(`${slot.label} Medicines Due`,names,'med-'+slot.key);
      }
    },ms);
    _reminderTimers.push(t);
  });
}

// ── Reminder toggle helper ────────────────────────────────────────────────────
async function remToggle(key){
  const isOn = loadKey(key)==='1';
  if(!isOn){
    // Request permission if not yet granted
    if(typeof Notification!=='undefined' && Notification.permission!=='granted'){
      const granted = await requestNotifPermission();
      if(!granted){ alert('Please allow notifications in your browser/phone settings to use reminders.'); return; }
    }
    saveKey(key, '1');
    if(key==='hv_reminders_on'){ scheduleAllMedReminders(); pushReminderScheduleToSW(); fireNotification('💊 Medicine Reminders On','You will be reminded at 8AM, 2PM & 9PM.','hv-med-setup'); }
    if(key==='hv_water_on')    { scheduleWaterReminder();   pushWaterScheduleToSW();    fireNotification('💧 Water Reminders On','Stay hydrated! Reminders are now active.','hv-water-setup'); }
    if(key==='hv_tips_notif_on'){ if(typeof pushTipsScheduleToSW==='function') pushTipsScheduleToSW(); fireNotification('💡 Daily Tips On','You will get a health tip every day.','hv-tips-setup'); }
  } else {
    saveKey(key, '0');
    if(key==='hv_reminders_on'){ clearAllReminderTimers(); if('serviceWorker' in navigator) navigator.serviceWorker.ready.then(r=>r.active?.postMessage({type:'CLEAR_MED_SCHEDULE',clientId:getClientId()})); }
    if(key==='hv_water_on')    { if(_waterTimer) clearInterval(_waterTimer); _waterTimer=null; if('serviceWorker' in navigator) navigator.serviceWorker.ready.then(r=>r.active?.postMessage({type:'CLEAR_WATER_SCHEDULE',clientId:getClientId()})); }
    if(key==='hv_tips_notif_on'){ if('serviceWorker' in navigator) navigator.serviceWorker.ready.then(r=>r.active?.postMessage({type:'CLEAR_TIPS_SCHEDULE',clientId:getClientId()})); }
  }
  rReminders();
}

function remSaveWater(){
  const interval = document.getElementById('rem-wint')?.value   || '60';
  const goal     = document.getElementById('rem-wgoal')?.value  || '8';
  const start    = document.getElementById('rem-wstart')?.value || '8';
  const end      = document.getElementById('rem-wend')?.value   || '22';
  saveKey('hv_water_interval', interval);
  saveKey('hv_water_goal',     goal);
  saveKey('hv_water_start',    start);
  saveKey('hv_water_end',      end);
  if(loadKey('hv_water_on')==='1'){ scheduleWaterReminder(); pushWaterScheduleToSW(); }
}

function remSaveTips(){
  const val = document.getElementById('rem-ttime')?.value || '08:00';
  saveKey('hv_tips_notif_time', val);
  if(loadKey('hv_tips_notif_on')==='1' && typeof pushTipsScheduleToSW==='function') pushTipsScheduleToSW();
}

async function toggleReminders(sw){
  const on=loadKey('hv_reminders_on')==='1';
  if(!on){

    saveKey('hv_reminders_on','1');
    scheduleAllMedReminders();

/* ══ 4. WATER TRACKER ══ */
let _waterTimer=null;
function scheduleWaterReminder(){
  if(_waterTimer) clearInterval(_waterTimer);
  const on=loadKey('hv_water_on')==='1';
  if(!on || Notification.permission!=='granted') return;
  // If SW is controlling the page it handles water reminders — skip page-side timer
  // to prevent double notifications. The interval is still set in case SW is absent.
  if('serviceWorker' in navigator && navigator.serviceWorker.controller) return;
  const interval=parseInt(loadKey('hv_water_interval')||'60')*60000;
  _waterTimer=setInterval(()=>{
    const h=new Date().getHours();
    const start=parseInt(loadKey('hv_water_start')||'8');
    const end=parseInt(loadKey('hv_water_end')||'22');
    if(h>=start && h<end){
      const log=getWaterLog();
      const glasses=(log[today()]||0);
      const goal=parseInt(loadKey('hv_water_goal')||'8');
      if(glasses<goal) fireNotification('💧 Time to Drink Water!',`You've had ${glasses} of ${goal} glasses today. Stay hydrated!`,'water');
    }
  },interval);
}
function rWater(){

  const goal=parseInt(loadKey('hv_water_goal')||'8');

  const circumference=2*Math.PI*54;
